<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>שביל הזיכרון 🧠 — משחק זיכרון לילדים</title>
<style>
  /* ---------- Theme ---------- */
  :root{
    --sky:#dfe7ff;
    --sky-2:#eef2ff;
    --cream:#fff8ef;
    --ink:#33335c;
    --ink-soft:#7a7aa0;
    --purple:#8a7bff;
    --purple-deep:#6a58e0;
    --pink:#ff8fab;
    --pink-deep:#f4628a;
    --good:#5fbf6a;
    --sun:#ffd166;
    /* --accent is re-pointed per "world" (level theme) at runtime */
    --accent:#8a7bff;
    --accent-soft:#c9c2ff;
    --shadow:0 6px 0 rgba(0,0,0,.12), 0 12px 24px rgba(0,0,0,.12);
    --radius:22px;
    font-size:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Baloo 2","Trebuchet MS",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, #fff 0 8%, transparent 9%),
      radial-gradient(circle at 85% 18%, #fff 0 6%, transparent 7%),
      linear-gradient(160deg, var(--sky), var(--sky-2) 50%, var(--cream));
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{
    max-width:780px;
    margin:0 auto;
    min-height:100%;
    padding:14px 16px 28px;
    position:relative;
    z-index:1;
  }

  /* ---------- Ambient floating background (inline SVG bokeh + doodles) ---------- */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  #bg .blob{position:absolute; opacity:.5; animation:drift linear infinite; will-change:transform;}
  #bg .doodle{position:absolute; font-size:2rem; opacity:.22; animation:drift2 linear infinite; will-change:transform;}
  @keyframes drift{
    0%{transform:translateY(0) translateX(0) rotate(0);}
    50%{transform:translateY(-26px) translateX(16px) rotate(12deg);}
    100%{transform:translateY(0) translateX(0) rotate(0);}
  }
  @keyframes drift2{
    0%{transform:translateY(0) rotate(0);}
    50%{transform:translateY(-34px) rotate(-14deg);}
    100%{transform:translateY(0) rotate(0);}
  }

  /* ---------- Screens ---------- */
  .screen{display:none; animation:fade .35s ease both;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit; font-weight:800; cursor:pointer; border:none;
    background:var(--purple); color:#fff; border-radius:var(--radius);
    padding:16px 26px; font-size:1.25rem; box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .btn:active{transform:translateY(3px);}
  .btn:hover{filter:brightness(1.05);}
  .btn.big{font-size:1.7rem; padding:20px 44px;}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .btn.green{background:var(--good);}
  .icon-btn{
    background:#fff; border:none; border-radius:50%; width:48px; height:48px;
    font-size:1.4rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.1);
  }
  .icon-btn:active{transform:translateY(2px);}
  .mini-link{background:none; border:none; color:var(--ink-soft); text-decoration:underline; cursor:pointer; font-family:inherit; font-size:.95rem;}

  /* ---------- Title screen ---------- */
  .hero{text-align:center; padding:18px 6px 6px;}
  .logo{
    font-size:clamp(2.4rem,8.5vw,4rem); font-weight:900; line-height:1.05;
    color:var(--purple-deep); text-shadow:0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.12);
    margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:bob 2.2s ease-in-out infinite;}
  .tagline{font-size:1.15rem; color:var(--ink-soft); margin:0 0 16px;}
  /* a little teaser row of mini face-down cards that gently flip */
  .title-cards{display:flex; justify-content:center; gap:10px; margin:10px 0 18px; perspective:600px;}
  .title-cards .tc{
    width:56px; height:72px; border-radius:12px; font-size:2rem;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg,#9a8cff,#6a58e0); color:#fff;
    box-shadow:var(--shadow); transform-style:preserve-3d;
    animation:flipPeek 3.4s ease-in-out infinite;
  }
  .title-cards .tc:nth-child(2){animation-delay:.5s;}
  .title-cards .tc:nth-child(3){animation-delay:1s;}
  .title-cards .tc:nth-child(4){animation-delay:1.5s;}
  @keyframes flipPeek{0%,70%,100%{transform:rotateY(0);} 20%,55%{transform:rotateY(180deg);}}
  .title-actions{display:flex; flex-direction:column; align-items:center; gap:12px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .topbar .spacer{flex:1;}
  .level-tag{font-weight:900; font-size:1.05rem; text-align:center; line-height:1.1;}
  .level-tag small{display:block; font-weight:700; color:var(--ink-soft); font-size:.8rem;}
  .moves-pill{
    background:#fff; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.05rem; white-space:nowrap;
  }

  /* ---------- Progress row ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin:4px 2px 12px;}
  .found-count{font-weight:900; white-space:nowrap; font-size:1.05rem;}
  .bar{
    flex:1; height:18px; background:#fff; border-radius:999px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .bar-fill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--good), var(--sun));
    border-radius:999px; transition:width .3s ease;
  }

  /* ---------- Card board ---------- */
  .board-wrap{
    background:rgba(255,255,255,.55); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px; position:relative; overflow:hidden;
    border:3px solid var(--accent-soft);
  }
  /* a soft themed glow tint behind the board */
  .board-wrap:before{
    content:""; position:absolute; inset:0; z-index:0; opacity:.18;
    background:radial-gradient(circle at 30% 20%, var(--accent), transparent 60%),
              radial-gradient(circle at 80% 90%, var(--accent), transparent 55%);
  }
  .board{
    position:relative; z-index:1;
    display:grid; gap:clamp(6px,2vw,12px);
    /* columns set inline per level; rows auto */
    max-width:100%; margin:0 auto;
  }

  /* ---------- A single card (3D flip) ---------- */
  .card{
    position:relative; aspect-ratio:3/4; cursor:pointer;
    perspective:700px; background:transparent; border:none; padding:0;
    -webkit-tap-highlight-color:transparent;
  }
  .card .inner{
    position:absolute; inset:0; transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.34,1.56,.64,1); /* springy */
  }
  .card.flipped .inner, .card.matched .inner{transform:rotateY(180deg);}
  .card .face{
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:clamp(10px,3vw,16px); display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,.16);
    overflow:hidden;
  }
  /* BACK = patterned SVG with a "?" (shown when face-down) */
  .card .back{
    background:linear-gradient(145deg, var(--accent), var(--accent-soft));
  }
  .card .back svg{width:100%; height:100%; display:block;}
  /* FRONT = the picture (shown after flip, rotated to read correctly) */
  .card .front{
    transform:rotateY(180deg);
    background:radial-gradient(circle at 35% 28%, #ffffff, #f1f0ff 72%, #e4e1ff);
    font-size:clamp(1.6rem,9vw,3rem); line-height:1;
  }
  .card:hover .inner{filter:brightness(1.03);}
  .card.shake .inner{animation:wobble .45s ease;}
  /* matched cards gently float + glow */
  .card.matched{cursor:default;}
  .card.matched .front{
    background:radial-gradient(circle at 35% 28%, #ffffff, #d8ffe0 75%, #bff0c4);
    animation:matchPulse 1.8s ease-in-out infinite;
  }
  .card.matched .inner{animation:floaty 2.4s ease-in-out infinite;}
  .card.pop .front{animation:pop .45s ease;}
  @keyframes matchPulse{0%,100%{box-shadow:0 0 0 0 rgba(95,191,106,.0);} 50%{box-shadow:0 0 0 5px rgba(95,191,106,.35);}}
  @keyframes floaty{0%,100%{transform:rotateY(180deg) translateY(0);} 50%{transform:rotateY(180deg) translateY(-5px);}}

  /* ---------- Level select ---------- */
  .select-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .grid-levels{display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:14px;}
  .level-card{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:14px 10px;
    text-align:center; cursor:pointer; border:3px solid transparent; transition:transform .1s;
  }
  .level-card:active{transform:translateY(2px);}
  .level-card .lc-emoji{font-size:2.6rem;}
  .level-card .lc-name{font-weight:900; margin:4px 0 2px;}
  .level-card .lc-sub{font-size:.82rem; color:var(--ink-soft); min-height:1.6em;}
  .level-card .lc-stars{font-size:1.1rem; letter-spacing:2px; margin-top:6px; color:var(--sun);}
  .level-card.locked{opacity:.55; cursor:not-allowed; background:#eceaf6;}
  .level-card.locked .lc-emoji{filter:grayscale(1);}
  .world-label{grid-column:1/-1; font-weight:900; color:var(--ink-soft); margin:8px 2px 0; font-size:1rem;}

  /* ---------- Complete screen ---------- */
  .complete{
    text-align:center; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 18px; margin-top:30px;
  }
  .complete h2{font-size:2rem; color:var(--purple-deep); margin:4px 0 8px;}
  .stars-big{font-size:3.4rem; letter-spacing:8px; height:1.4em; color:var(--sun);}
  .stars-big .s{display:inline-block; opacity:.25;}
  .stars-big .s.on{opacity:1; animation:pop .5s ease both;}
  .reward-line{font-size:1.3rem; font-weight:800; margin:10px 0 18px;}
  .complete .btn{margin:6px;}

  /* ---------- FX: confetti ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .confetti{position:absolute; font-size:1.6rem; animation:confetti-fall linear forwards;}

  /* ---------- Keyframes ---------- */
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
  @keyframes pop{0%{transform:scale(.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);}}
  @keyframes wobble{0%,100%{transform:translateX(0) rotateY(0);} 20%{transform:translateX(-7px) rotate(-4deg);} 40%{transform:translateX(7px) rotate(4deg);} 60%{transform:translateX(-5px) rotate(-2deg);} 80%{transform:translateX(5px) rotate(2deg);}}
  @keyframes confetti-fall{from{transform:translateY(-30px) rotate(0);} to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}

  @media (max-width:480px){
    .title-cards .tc{width:48px; height:62px; font-size:1.7rem;}
  }
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<div id="app">

  <!-- ============ TITLE ============ -->
  <section class="screen active" id="screen-title">
    <div class="hero">
      <div class="logo"><span class="em">🧠</span> <span data-i18n="title">Memory Lane</span> <span class="em">✨</span></div>
      <p class="tagline" data-i18n="tagline">Flip the cards and find the matching pairs!</p>
      <div class="title-cards" aria-hidden="true">
        <div class="tc">🐶</div><div class="tc">🍎</div><div class="tc">🚗</div><div class="tc">🐠</div>
      </div>
      <div class="title-actions">
        <button class="btn big" id="play-btn" data-i18n="play">▶ Play</button>
        <div style="display:flex; gap:10px; align-items:center;">
          <button class="icon-btn" id="mute-btn-title" data-i18n-title="sound" title="Sound">🔊</button>
          <button class="mini-link" id="lang-btn">English</button>
          <button class="mini-link" id="reset-btn" data-i18n="reset">Reset progress</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ LEVEL SELECT ============ -->
  <section class="screen" id="screen-select">
    <div class="select-head">
      <button class="icon-btn" data-go="title">🏠</button>
      <div class="level-tag" style="flex:1"><span data-i18n="pickLevel">Pick a Level</span><small data-i18n="pickSub">your memory adventure</small></div>
    </div>
    <div class="grid-levels" id="levels-grid"></div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="screen-play">
    <div class="topbar">
      <button class="icon-btn" data-go="select" data-i18n-title="back" title="Back">⬅️</button>
      <div class="spacer"></div>
      <div class="level-tag" id="play-level">Level<small>World</small></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="mute-btn-play" data-i18n-title="sound" title="Sound">🔊</button>
      <div class="moves-pill" id="moves-pill">🔁 0</div>
    </div>

    <div class="progress-row">
      <div class="found-count" id="found-count">✨ 0/0</div>
      <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </section>

  <!-- ============ LEVEL COMPLETE ============ -->
  <section class="screen" id="screen-complete">
    <div class="complete">
      <div style="font-size:3.4rem">🎉</div>
      <h2 id="complete-title" data-i18n="cleared">Level Cleared!</h2>
      <div class="stars-big" id="complete-stars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
      <div class="reward-line" id="complete-reward"></div>
      <div>
        <button class="btn green" id="next-btn"></button>
        <button class="btn ghost" id="replay-btn" data-i18n="replay">↻ Replay</button>
        <button class="btn ghost" data-go="select" data-i18n="map">🏠 Map</button>
      </div>
    </div>
  </section>

</div>
<div id="fx"></div>

<script>
"use strict";

/* =========================================================
   Memory Lane — single-file kids' memory-match game
   A grid of face-down cards. Flip two; identical pictures
   make a pair and stay revealed. Clear the board to finish.
   Boards grow each level. Tweak LEVELS / THEMES below.
   ========================================================= */

// ----- Level configuration (data-driven, language-independent) -----
// rows × cols must be even (an even number of cards).
// themeKey  -> picks the emoji pool + world name + accent colour (see THEMES).
// nameKey   -> level name, looked up in the I18N table (translatable).
const LEVELS = [
  {rows:2, cols:2, themeKey:"animals",  nameKey:"lvl_firstPeek"},   // 2 pairs
  {rows:2, cols:3, themeKey:"animals",  nameKey:"lvl_petParade"},   // 3 pairs
  {rows:3, cols:4, themeKey:"food",     nameKey:"lvl_snackTime"},   // 6 pairs
  {rows:4, cols:4, themeKey:"vehicles", nameKey:"lvl_onTheMove"},   // 8 pairs
  {rows:4, cols:5, themeKey:"sea",      nameKey:"lvl_underTheSea"}, // 10 pairs
  {rows:4, cols:6, themeKey:"space",    nameKey:"lvl_blastOff"},    // 12 pairs
];

// ----- Themed worlds: emoji pool (>= largest board's pairs), accent colour, name -----
// The biggest board is 4×6 = 12 pairs, so each pool has at least 12 distinct pictures.
const THEMES = {
  animals:  {worldKey:"world_animals",  accent:"#ff9f68", soft:"#ffd9c2", emoji:"🐶🐱🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🦉"},
  food:     {worldKey:"world_food",     accent:"#ff7a9c", soft:"#ffcad9", emoji:"🍎🍌🍓🍇🍉🍊🍒🍑🥕🌽🍪🍰🍩🧁🍕🍔"},
  vehicles: {worldKey:"world_vehicles", accent:"#4bb6e8", soft:"#bfe6f7", emoji:"🚗✈️🚂🚁🚀🚌🚓🚒🚑🚜🛵🚲⛵🚢🏎️🛺"},
  sea:      {worldKey:"world_sea",      accent:"#2bc4b6", soft:"#b8efe9", emoji:"🐠🐙🦀🐬🐳🦈🐡🦑🐚🐢🦞🐟🦭🪼🦐🐋"},
  space:    {worldKey:"world_space",    accent:"#9a7bff", soft:"#d6c9ff", emoji:"🚀🪐🌙⭐🌟☄️🛸👽🌍🌝🔭🌞🌠💫🌕👾"},
};

// ----- String table (i18n). Add a language by adding another block. -----
// Card pictures are language-neutral emoji; only the UI chrome is translated.
const I18N = {
  en:{
    dir:"ltr", langName:"English",
    title:"Memory Lane",
    tagline:"Flip the cards and find the matching pairs!",
    play:"▶ Play",
    sound:"Sound",
    reset:"Reset progress",
    pickLevel:"Pick a Level",
    pickSub:"your memory adventure",
    back:"Back",
    findPairs:"Find the pairs!",
    moves:"moves",
    pairs:"pairs",
    found:"found",         // shown in the bar label
    cleared:"Level Cleared!",
    allDone:"You're a Memory Master! 🏆",
    perfect:"Perfect memory!",
    oops_one:"1 mismatch",
    oops_many:"mismatches",  // shown as: 3 mismatches
    movesDone:"moves",       // shown as: 8 moves
    next:"Next ▶",
    replay:"↻ Replay",
    map:"🏠 Map",
    resetConfirm:"Start over? This clears all your stars.",
    resetDone:"Progress reset! 🧹",
    // worlds
    world_animals:"Animal Friends", world_food:"Tasty Treats", world_vehicles:"Things That Go",
    world_sea:"Under the Sea", world_space:"Outer Space",
    // levels
    lvl_firstPeek:"First Peek", lvl_petParade:"Pet Parade", lvl_snackTime:"Snack Time",
    lvl_onTheMove:"On the Move", lvl_underTheSea:"Under the Sea", lvl_blastOff:"Blast Off!",
  },
  he:{
    dir:"rtl", langName:"עברית",
    title:"שביל הזיכרון",
    tagline:"הופכים קלפים ומוצאים את הזוגות התואמים!",
    play:"▶ שחקו",
    sound:"צליל",
    reset:"איפוס התקדמות",
    pickLevel:"בחרו שלב",
    pickSub:"הרפתקת הזיכרון שלך",
    back:"חזרה",
    findPairs:"מצאו את הזוגות!",
    moves:"מהלכים",
    pairs:"זוגות",
    found:"נמצאו",
    cleared:"השלב הושלם!",
    allDone:"אלופי הזיכרון! 🏆",
    perfect:"זיכרון מושלם!",
    oops_one:"החמצה אחת",
    oops_many:"החמצות",
    movesDone:"מהלכים",
    next:"הבא ◀",
    replay:"שוב ↻",
    map:"🏠 מפה",
    resetConfirm:"להתחיל מחדש? כל הכוכבים יימחקו.",
    resetDone:"ההתקדמות אופסה! 🧹",
    world_animals:"חברים מהחי", world_food:"פינוקים טעימים", world_vehicles:"דברים שנוסעים",
    world_sea:"מתחת לים", world_space:"החלל החיצון",
    lvl_firstPeek:"הצצה ראשונה", lvl_petParade:"מצעד חיות", lvl_snackTime:"זמן חטיף",
    lvl_onTheMove:"בתנועה", lvl_underTheSea:"מתחת לים", lvl_blastOff:"שיגור!",
  },
};
const DEFAULT_LANG = "he";

// Look up a translated string for the current language (falls back to English, then the key).
function t(key){
  const L = I18N[save.lang] || I18N[DEFAULT_LANG];
  if(L && L[key]!=null) return L[key];
  if(I18N.en[key]!=null) return I18N.en[key];
  return key;
}
// Friendly mismatch text ("Perfect memory!", "1 mismatch", "3 mismatches").
function mistakesText(m){ return m===0 ? t("perfect") : (m===1 ? t("oops_one") : m+" "+t("oops_many")); }

// ----- Persistent save (progress is language-independent — flat shape) -----
const SAVE_KEY = "memoryLane.save";
const DEFAULT_SAVE = {unlockedLevel:0, starsByLevel:{}, muted:false, lang:DEFAULT_LANG};

function loadSave(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return {...DEFAULT_SAVE};
    const s = {...DEFAULT_SAVE, ...JSON.parse(raw)};
    if(!I18N[s.lang]) s.lang = DEFAULT_LANG;
    return s;
  }catch(e){ return {...DEFAULT_SAVE}; }
}
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }
let save = loadSave();

// ----- Helpers -----
const $ = sel => document.querySelector(sel);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
// Split a theme's emoji string into an array of individual pictures (emoji-safe).
// Intl.Segmenter keeps multi-codepoint emoji (e.g. ✈️, 🏎️) whole; Array.from is the fallback.
function emojiList(str){
  if(typeof Intl !== "undefined" && Intl.Segmenter){
    const seg = new Intl.Segmenter(undefined,{granularity:"grapheme"});
    return [...seg.segment(str)].map(s=>s.segment);
  }
  return Array.from(str);
}

// =========================================================
//  Sound (tiny Web Audio jingles — no files)
// =========================================================
let audioCtx = null;
function beep(freq, start, dur, type="sine", gain=0.15){
  if(save.muted) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const t0 = audioCtx.currentTime + start;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0+dur);
  }catch(e){}
}
function playSound(type){
  if(type==="flip"){ beep(520,0,.07,"square",.07); }
  else if(type==="match"){ beep(660,0,.13,"triangle"); beep(990,.1,.2,"triangle"); }
  else if(type==="mismatch"){ beep(200,0,.16,"sawtooth",.08); }
  else if(type==="level"){ [523,659,784,1046].forEach((f,i)=>beep(f,i*.12,.25,"triangle")); }
  else if(type==="tap"){ beep(440,0,.05,"square",.06); }
}

// =========================================================
//  Screen navigation
// =========================================================
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("#screen-"+name).classList.add("active");
  if(name==="select") renderSelect();
}

// =========================================================
//  Level select
// =========================================================
function renderSelect(){
  const grid = $("#levels-grid");
  grid.innerHTML = "";
  let lastWorld = null;
  LEVELS.forEach((lv,i)=>{
    const theme = THEMES[lv.themeKey];
    // group consecutive levels of the same world under a label
    if(theme.worldKey!==lastWorld){
      lastWorld = theme.worldKey;
      const wl = document.createElement("div");
      wl.className = "world-label";
      wl.textContent = t(theme.worldKey);
      grid.appendChild(wl);
    }
    const locked = i > save.unlockedLevel;
    const stars = save.starsByLevel[i]||0;
    const pairs = (lv.rows*lv.cols)/2;
    const card = document.createElement("div");
    card.className = "level-card"+(locked?" locked":"");
    card.innerHTML = `
      <div class="lc-emoji">${locked?"🔒":emojiList(theme.emoji)[0]}</div>
      <div class="lc-name">${t(lv.nameKey)}</div>
      <div class="lc-sub">${lv.rows}×${lv.cols} • ${pairs} ${t("pairs")}</div>
      <div class="lc-stars">${starString(stars)}</div>`;
    if(!locked) card.addEventListener("click",()=>startLevel(i));
    grid.appendChild(card);
  });
}
function starString(n){ return "★★★".slice(0,n).padEnd(3,"☆"); }

// =========================================================
//  Game state
// =========================================================
const game = {
  levelIndex:0,
  cards:[],         // { el, picture, matched }
  first:null,       // first flipped card awaiting a partner
  busy:false,       // input blocked during the compare window
  found:0,          // pairs found
  totalPairs:0,
  moves:0,          // a "move" = a pair of flips
  mismatches:0,
};

// =========================================================
//  Build + play a level
// =========================================================
function startLevel(i){
  const lv = LEVELS[i];
  const theme = THEMES[lv.themeKey];
  game.levelIndex = i;
  game.first = null;
  game.busy = false;
  game.found = 0;
  game.moves = 0;
  game.mismatches = 0;
  game.totalPairs = (lv.rows*lv.cols)/2;
  game.cards = [];

  // re-point the themed accent colour
  document.documentElement.style.setProperty("--accent", theme.accent);
  document.documentElement.style.setProperty("--accent-soft", theme.soft);

  // header
  $("#play-level").innerHTML = `${t(lv.nameKey)}<small>${t(theme.worldKey)}</small>`;

  // pick pictures: count/2 distinct from the theme, duplicate, shuffle into the grid
  const pool = shuffle(emojiList(theme.emoji).slice());
  const chosen = pool.slice(0, game.totalPairs);
  const deck = shuffle(chosen.concat(chosen));   // each picture twice

  // build the grid
  const board = $("#board");
  board.style.gridTemplateColumns = `repeat(${lv.cols}, 1fr)`;
  // keep the board comfortably within a phone's width: cap by columns
  board.style.maxWidth = Math.min(560, lv.cols*96) + "px";
  board.innerHTML = "";
  deck.forEach((pic)=>{
    const btn = document.createElement("button");
    btn.className = "card";
    btn.type = "button";
    btn.innerHTML = `
      <div class="inner">
        <div class="face back">${cardBackSVG()}</div>
        <div class="face front">${pic}</div>
      </div>`;
    const cardObj = {el:btn, picture:pic, matched:false};
    btn.addEventListener("click", ()=>onCardClick(cardObj));
    board.appendChild(btn);
    game.cards.push(cardObj);
  });

  updateProgressUI();
  showScreen("play");
}

// Cute patterned card-back: a "?" over dotted motif (uses the theme accent via currentColor).
function cardBackSVG(){
  return `<svg viewBox="0 0 60 80" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
        <circle cx="7" cy="7" r="2.2" fill="#ffffff" opacity=".28"/>
      </pattern>
    </defs>
    <rect x="0" y="0" width="60" height="80" fill="url(#dots)"/>
    <circle cx="30" cy="40" r="17" fill="#ffffff" opacity=".22"/>
    <text x="30" y="52" font-size="30" font-weight="900" text-anchor="middle"
          fill="#ffffff" font-family="Comic Sans MS, system-ui, sans-serif">?</text>
  </svg>`;
}

function onCardClick(card){
  // ignore taps that can't do anything
  if(game.busy) return;
  if(card.matched) return;
  if(game.first === card) return;            // same card tapped twice
  if(card.el.classList.contains("flipped")) return;

  // flip this card up
  card.el.classList.add("flipped");
  playSound("flip");

  if(!game.first){
    // first card of a pair
    game.first = card;
    return;
  }

  // second card — this completes a move
  game.moves++;
  $("#moves-pill").textContent = "🔁 " + game.moves;
  const a = game.first, b = card;
  game.first = null;

  if(a.picture === b.picture){
    // MATCH — lock both, celebrate
    game.busy = true;
    setTimeout(()=>{
      [a,b].forEach(c=>{
        c.matched = true;
        c.el.classList.add("matched","pop");
        setTimeout(()=>c.el.classList.remove("pop"), 460);
      });
      playSound("match");
      game.found++;
      updateProgressUI();
      game.busy = false;
      if(game.found >= game.totalPairs) setTimeout(completeLevel, 650);
    }, 280);   // let the flip finish before locking
  }else{
    // MISMATCH — block input, but let the player SEE the second card first.
    // The flip animation is .5s, so we hold both cards face-up for a beat
    // before the "oops" sound + wobble, then flip them back.
    game.busy = true;
    game.mismatches++;
    setTimeout(()=>{
      playSound("mismatch");
      a.el.classList.add("shake"); b.el.classList.add("shake");
      setTimeout(()=>{
        a.el.classList.remove("flipped","shake");
        b.el.classList.remove("flipped","shake");
        game.busy = false;
      }, 650);
    }, 650);   // reveal pause — both cards stay up long enough to read
  }
}

function updateProgressUI(){
  $("#found-count").textContent = `✨ ${game.found}/${game.totalPairs}`;
  $("#moves-pill").textContent = "🔁 " + game.moves;
  const frac = game.totalPairs ? game.found/game.totalPairs : 0;
  $("#bar-fill").style.width = (frac*100) + "%";
}

// =========================================================
//  Level complete
// =========================================================
function completeLevel(){
  const i = game.levelIndex;
  const m = game.mismatches;
  // stars: 0 mismatches = perfect 3; a few = 2; otherwise 1.
  // scale the "few" threshold with board size so big boards stay fair.
  const tol = Math.max(1, Math.round(game.totalPairs/3));
  const stars = m===0 ? 3 : (m<=tol ? 2 : 1);

  // persist progress (best stars; unlock next)
  save.starsByLevel[i] = Math.max(save.starsByLevel[i]||0, stars);
  if(i+1 <= LEVELS.length-1) save.unlockedLevel = Math.max(save.unlockedLevel, i+1);
  persist();

  const isLast = i >= LEVELS.length-1;
  $("#complete-title").textContent = isLast ? t("allDone") : t("cleared");
  $("#complete-reward").textContent = `${game.moves} ${t("movesDone")}  •  ${mistakesText(m)}`;

  // animate stars
  const starEls = document.querySelectorAll("#complete-stars .s");
  starEls.forEach(s=>s.classList.remove("on"));
  showScreen("complete");
  starEls.forEach((s,idx)=>{
    setTimeout(()=>{ if(idx<stars){ s.classList.add("on"); playSound("tap"); } }, 300+idx*250);
  });

  // next button behaviour
  const nextBtn = $("#next-btn");
  if(isLast){
    nextBtn.textContent = t("map");
    nextBtn.onclick = ()=>showScreen("select");
  }else{
    nextBtn.textContent = t("next");
    nextBtn.onclick = ()=>startLevel(i+1);
  }
  $("#replay-btn").onclick = ()=>startLevel(i);

  playSound("level");
  confetti();
}

// =========================================================
//  Visual FX
// =========================================================
function confetti(){
  const fx = $("#fx");
  const emojis = ["🎉","✨","⭐","🌟","🎊","💫","🏅"];
  for(let i=0;i<40;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = pick(emojis);
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}

// ----- Ambient floating background (soft SVG bokeh + drifting doodles) -----
function buildBackground(){
  const bg = $("#bg");
  const colors = ["#ffd166","#ff8fab","#8a7bff","#5fbf6a","#7cc6ff","#ff9f68"];
  const doodles = ["⭐","✨","🌙","💛","🔵","🟣","🟢","❤️"];
  // soft round bokeh blobs
  for(let i=0;i<7;i++){
    const d = document.createElement("div");
    d.className = "blob";
    const size = 60 + Math.random()*140;
    d.style.width = d.style.height = size+"px";
    const col = pick(colors);
    d.style.borderRadius = "50%";
    d.style.background = `radial-gradient(circle at 35% 30%, ${col}, transparent 70%)`;
    d.style.left = Math.random()*100+"vw";
    d.style.top = Math.random()*100+"vh";
    d.style.animationDuration = (10+Math.random()*12)+"s";
    d.style.animationDelay = (-Math.random()*10)+"s";
    bg.appendChild(d);
  }
  // little drifting doodles
  for(let i=0;i<8;i++){
    const d = document.createElement("div");
    d.className = "doodle";
    d.textContent = pick(doodles);
    d.style.left = Math.random()*100+"vw";
    d.style.top = Math.random()*100+"vh";
    d.style.animationDuration = (9+Math.random()*10)+"s";
    d.style.animationDelay = (-Math.random()*9)+"s";
    bg.appendChild(d);
  }
}

// =========================================================
//  Mute toggle
// =========================================================
function refreshMute(){
  const icon = save.muted ? "🔇" : "🔊";
  $("#mute-btn-title").textContent = icon;
  $("#mute-btn-play").textContent = icon;
}
function toggleMute(){ save.muted=!save.muted; persist(); refreshMute(); if(!save.muted) playSound("tap"); }

// =========================================================
//  Language (string table) — applies text + page direction
// =========================================================
function applyLanguage(){
  if(!I18N[save.lang]) save.lang = DEFAULT_LANG;
  const L = I18N[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  // static text + tooltips marked in the HTML
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
  // the toggle shows the OTHER language to switch to
  $("#lang-btn").textContent = I18N[save.lang==="he"?"en":"he"].langName;
  // refresh a visible dynamic screen so its text updates too
  if($("#screen-select").classList.contains("active")) renderSelect();
}
function toggleLanguage(){ save.lang = (save.lang==="he"?"en":"he"); persist(); applyLanguage(); playSound("tap"); }

// =========================================================
//  Wiring + init
// =========================================================
document.addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go) showScreen(go.getAttribute("data-go"));
});
$("#play-btn").addEventListener("click", ()=>{ playSound("tap"); showScreen("select"); });
$("#mute-btn-title").addEventListener("click", toggleMute);
$("#mute-btn-play").addEventListener("click", toggleMute);
$("#lang-btn").addEventListener("click", toggleLanguage);
$("#reset-btn").addEventListener("click", ()=>{
  if(confirm(t("resetConfirm"))){
    const lang = save.lang;                 // keep the chosen language across a reset
    save = {...DEFAULT_SAVE, lang};
    persist(); refreshMute();
    if($("#screen-select").classList.contains("active")) renderSelect();
    alert(t("resetDone"));
  }
});

// init
buildBackground();
refreshMute();
applyLanguage();
</script>
