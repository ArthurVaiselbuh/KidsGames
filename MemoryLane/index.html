<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>שביל הזיכרון 🧠 — משחק זיכרון לילדים</title>
<style>
  /* ---------- Theme ---------- */
  :root{
    --sky:#dfe7ff;
    --sky-2:#eef2ff;
    --cream:#fff8ef;
    --ink:#33335c;
    --ink-soft:#7a7aa0;
    --purple:#8a7bff;
    --purple-deep:#6a58e0;
    --pink:#ff8fab;
    --pink-deep:#f4628a;
    --good:#5fbf6a;
    --sun:#ffd166;
    /* --accent is re-pointed per "world" (level theme) at runtime */
    --accent:#8a7bff;
    --accent-soft:#c9c2ff;
    --shadow:0 6px 0 rgba(0,0,0,.12), 0 12px 24px rgba(0,0,0,.12);
    --radius:22px;
    font-size:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Baloo 2","Trebuchet MS",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, #fff 0 8%, transparent 9%),
      radial-gradient(circle at 85% 18%, #fff 0 6%, transparent 7%),
      linear-gradient(160deg, var(--sky), var(--sky-2) 50%, var(--cream));
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{
    max-width:780px;
    margin:0 auto;
    min-height:100%;
    padding:14px 16px 28px;
    position:relative;
    z-index:1;
  }

  /* ---------- Ambient floating background (inline SVG bokeh + doodles) ---------- */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  #bg .blob{position:absolute; opacity:.5; animation:drift linear infinite; will-change:transform;}
  #bg .doodle{position:absolute; font-size:2rem; opacity:.22; animation:drift2 linear infinite; will-change:transform;}
  @keyframes drift{
    0%{transform:translateY(0) translateX(0) rotate(0);}
    50%{transform:translateY(-26px) translateX(16px) rotate(12deg);}
    100%{transform:translateY(0) translateX(0) rotate(0);}
  }
  @keyframes drift2{
    0%{transform:translateY(0) rotate(0);}
    50%{transform:translateY(-34px) rotate(-14deg);}
    100%{transform:translateY(0) rotate(0);}
  }

  /* ---------- Screens ---------- */
  .screen{display:none; animation:fade .35s ease both;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit; font-weight:800; cursor:pointer; border:none;
    background:var(--purple); color:#fff; border-radius:var(--radius);
    padding:16px 26px; font-size:1.25rem; box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .btn:active{transform:translateY(3px);}
  .btn:hover{filter:brightness(1.05);}
  .btn.big{font-size:1.7rem; padding:20px 44px;}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .btn.green{background:var(--good);}
  .icon-btn{
    background:#fff; border:none; border-radius:50%; width:48px; height:48px;
    font-size:1.4rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.1);
  }
  .icon-btn:active{transform:translateY(2px);}
  .icon-btn.is-off{opacity:.4; filter:grayscale(1);}
  .title-top{display:flex; align-items:center; margin-bottom:4px;}
  a.icon-btn.home-link{display:inline-flex; align-items:center; justify-content:center; text-decoration:none;}
  .mini-link{background:none; border:none; color:var(--ink-soft); text-decoration:underline; cursor:pointer; font-family:inherit; font-size:.95rem;}

  /* ---------- Title screen ---------- */
  .hero{text-align:center; padding:18px 6px 6px;}
  .logo{
    font-size:clamp(2.4rem,8.5vw,4rem); font-weight:900; line-height:1.05;
    color:var(--purple-deep); text-shadow:0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.12);
    margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:bob 2.2s ease-in-out infinite;}
  .tagline{font-size:1.15rem; color:var(--ink-soft); margin:0 0 16px;}
  /* a little teaser row of mini face-down cards that gently flip */
  .title-cards{display:flex; justify-content:center; gap:10px; margin:10px 0 18px; perspective:600px;}
  .title-cards .tc{
    width:56px; height:72px; border-radius:12px; font-size:2rem;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg,#9a8cff,#6a58e0); color:#fff;
    box-shadow:var(--shadow); transform-style:preserve-3d;
    animation:flipPeek 3.4s ease-in-out infinite;
  }
  .title-cards .tc:nth-child(2){animation-delay:.5s;}
  .title-cards .tc:nth-child(3){animation-delay:1s;}
  .title-cards .tc:nth-child(4){animation-delay:1.5s;}
  @keyframes flipPeek{0%,70%,100%{transform:rotateY(0);} 20%,55%{transform:rotateY(180deg);}}
  .title-actions{display:flex; flex-direction:column; align-items:center; gap:12px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .topbar .spacer{flex:1;}
  .level-tag{font-weight:900; font-size:1.05rem; text-align:center; line-height:1.1;}
  .level-tag small{display:block; font-weight:700; color:var(--ink-soft); font-size:.8rem;}
  .moves-pill{
    background:#fff; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.05rem; white-space:nowrap;
  }

  /* ---------- Progress row ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin:4px 2px 12px;}
  .found-count{font-weight:900; white-space:nowrap; font-size:1.05rem;}
  .bar{
    flex:1; height:18px; background:#fff; border-radius:999px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .bar-fill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--good), var(--sun));
    border-radius:999px; transition:width .3s ease;
  }

  /* ---------- Card board ---------- */
  .board-wrap{
    background:rgba(255,255,255,.55); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px; position:relative; overflow:hidden;
    border:3px solid var(--accent-soft);
  }
  /* a soft themed glow tint behind the board */
  .board-wrap:before{
    content:""; position:absolute; inset:0; z-index:0; opacity:.18;
    background:radial-gradient(circle at 30% 20%, var(--accent), transparent 60%),
              radial-gradient(circle at 80% 90%, var(--accent), transparent 55%);
  }
  .board{
    position:relative; z-index:1;
    display:grid; gap:clamp(6px,2vw,12px);
    /* columns set inline per level; rows auto */
    max-width:100%; margin:0 auto;
  }

  /* ---------- A single card (3D flip) ---------- */
  .card{
    position:relative; aspect-ratio:3/4; cursor:pointer;
    perspective:700px; background:transparent; border:none; padding:0;
    -webkit-tap-highlight-color:transparent;
  }
  .card .inner{
    position:absolute; inset:0; transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.34,1.56,.64,1); /* springy */
  }
  .card.flipped .inner, .card.matched .inner{transform:rotateY(180deg);}
  .card .face{
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:clamp(10px,3vw,16px); display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 8px rgba(0,0,0,.16);
    overflow:hidden;
  }
  /* BACK = patterned SVG (shown when face-down). The player's chosen back colour
     drives --card-back; the full-bleed SVG paints over it, this is just a fallback. */
  .card .back{
    background:var(--card-back, var(--accent));
  }
  .card .back svg{width:100%; height:100%; display:block;}
  /* FRONT = the picture (shown after flip, rotated to read correctly) */
  .card .front{
    transform:rotateY(180deg);
    background:radial-gradient(circle at 35% 28%, #ffffff, #f1f0ff 72%, #e4e1ff);
    font-size:clamp(1.6rem,9vw,3rem); line-height:1;
  }
  /* filter on .face, not .inner: a filter on .inner flattens its preserve-3d and
     collapses the flip (a flipped card would snap face-down while hovered) */
  .card:hover .face{filter:brightness(1.04);}
  .card.shake .inner{animation:wobble .45s ease;}
  /* matched cards gently float + glow */
  .card.matched{cursor:default;}
  .card.matched .front{
    background:radial-gradient(circle at 35% 28%, #ffffff, #d8ffe0 75%, #bff0c4);
    animation:matchPulse 1.8s ease-in-out infinite;
  }
  .card.matched .inner{animation:floaty 2.4s ease-in-out infinite;}
  .card.pop .front{animation:pop .45s ease;}
  @keyframes matchPulse{0%,100%{box-shadow:0 0 0 0 rgba(95,191,106,.0);} 50%{box-shadow:0 0 0 5px rgba(95,191,106,.35);}}
  @keyframes floaty{0%,100%{transform:rotateY(180deg) translateY(0);} 50%{transform:rotateY(180deg) translateY(-5px);}}

  /* ---------- Level select ---------- */
  .select-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .grid-levels{display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:14px;}
  .level-card{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:14px 10px;
    text-align:center; cursor:pointer; border:3px solid transparent; transition:transform .1s;
  }
  .level-card:active{transform:translateY(2px);}
  .level-card .lc-emoji{font-size:2.6rem;}
  .level-card .lc-name{font-weight:900; margin:4px 0 2px;}
  .level-card .lc-sub{font-size:.82rem; color:var(--ink-soft); min-height:1.6em;}
  .level-card .lc-stars{font-size:1.1rem; letter-spacing:2px; margin-top:6px; color:var(--sun);}
  .level-card.locked{opacity:.55; cursor:not-allowed; background:#eceaf6;}
  .level-card.locked .lc-emoji{filter:grayscale(1);}
  .world-label{grid-column:1/-1; font-weight:900; color:var(--ink-soft); margin:8px 2px 0; font-size:1rem;}

  /* ---------- Complete screen ---------- */
  .complete{
    text-align:center; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 18px; margin-top:30px;
  }
  .complete h2{font-size:2rem; color:var(--purple-deep); margin:4px 0 8px;}
  .stars-big{font-size:3.4rem; letter-spacing:8px; height:1.4em; color:var(--sun);}
  .stars-big .s{display:inline-block; opacity:.25;}
  .stars-big .s.on{opacity:1; animation:pop .5s ease both;}
  .reward-line{font-size:1.3rem; font-weight:800; margin:10px 0 18px;}
  .complete .btn{margin:6px;}

  /* ---------- FX: confetti ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .confetti{position:absolute; font-size:1.6rem; animation:confetti-fall linear forwards;}

  /* ---------- Keyframes ---------- */
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
  @keyframes pop{0%{transform:scale(.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);}}
  @keyframes wobble{0%,100%{transform:translateX(0) rotateY(0);} 20%{transform:translateX(-7px) rotate(-4deg);} 40%{transform:translateX(7px) rotate(4deg);} 60%{transform:translateX(-5px) rotate(-2deg);} 80%{transform:translateX(5px) rotate(2deg);}}
  @keyframes confetti-fall{from{transform:translateY(-30px) rotate(0);} to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}

  @media (max-width:480px){
    .title-cards .tc{width:48px; height:62px; font-size:1.7rem;}
  }


  /* ---------- Cosmetics customizer (overlay) ---------- */
  .cz-wrap{position:fixed; inset:0; z-index:80; display:none; align-items:center;
    justify-content:center; background:rgba(30,25,55,.5); padding:16px;}
  .cz-wrap.open{display:flex;}
  .cz-card{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px; max-width:380px; width:100%; max-height:90vh; overflow:auto; text-align:center;}
  .cz-title{font-weight:900; font-size:1.4rem; margin:2px 0 8px; color:var(--purple-deep);}
  .cz-preview{display:flex; justify-content:center; margin:4px 0 12px;}
  .cz-preview .pv{width:84px; height:112px; border-radius:14px; overflow:hidden; box-shadow:var(--shadow);}
  .cz-preview .pv svg{width:100%; height:100%; display:block;}
  .cz-row{margin:12px 0; text-align:start;}
  .cz-label{font-weight:800; font-size:.95rem; margin-bottom:7px; color:var(--ink);}
  .cz-opts{display:flex; flex-wrap:wrap; gap:9px;}
  .cz-sw{width:38px; height:38px; border-radius:50%; border:3px solid #fff; cursor:pointer;
    padding:0; box-shadow:0 0 0 2px rgba(0,0,0,.14); transition:transform .08s;
    font-weight:900; color:#fff; font-size:1.1rem; line-height:1;}
  .cz-sw:active{transform:scale(.92);}
  .cz-sw.sel{box-shadow:0 0 0 3px var(--ink);}
  .cz-done{margin-top:10px;}
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<div id="app">

  <!-- ============ TITLE ============ -->
  <section class="screen active" id="screen-title">
    <div class="title-top">
      <a class="icon-btn home-link" href="../index.html" data-i18n-title="allGames" title="All games" aria-label="All games">🎮</a>
    </div>
    <div class="hero">
      <div class="logo"><span class="em">🧠</span> <span data-i18n="title">Memory Lane</span> <span class="em">✨</span></div>
      <p class="tagline" data-i18n="tagline">Flip the cards and find the matching pairs!</p>
      <div class="title-cards" aria-hidden="true">
        <div class="tc">🐶</div><div class="tc">🍎</div><div class="tc">🚗</div><div class="tc">🐠</div>
      </div>
      <div class="title-actions">
        <button class="btn big" id="play-btn" data-i18n="play">▶ Play</button>
        <button class="btn ghost" id="customize-btn" data-i18n="customize">🎨 Customize</button>
        <div style="display:flex; gap:10px; align-items:center;">
          <button class="icon-btn" id="mute-btn-title" data-i18n-title="sound" title="Sound">🔊</button>
          <button class="icon-btn" id="music-btn-title" data-i18n-title="music" title="Music">🎵</button>
          <button class="mini-link" id="lang-btn">English</button>
          <button class="mini-link" id="reset-btn" data-i18n="reset">Reset progress</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ LEVEL SELECT ============ -->
  <section class="screen" id="screen-select">
    <div class="select-head">
      <button class="icon-btn" data-go="title">🏠</button>
      <div class="level-tag" style="flex:1"><span data-i18n="pickLevel">Pick a Level</span><small data-i18n="pickSub">your memory adventure</small></div>
    </div>
    <div class="grid-levels" id="levels-grid"></div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="screen-play">
    <div class="topbar">
      <button class="icon-btn" data-go="select" data-i18n-title="back" title="Back">⬅️</button>
      <div class="spacer"></div>
      <div class="level-tag" id="play-level">Level<small>World</small></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="mute-btn-play" data-i18n-title="sound" title="Sound">🔊</button>
      <button class="icon-btn" id="music-btn-play" data-i18n-title="music" title="Music">🎵</button>
      <div class="moves-pill" id="moves-pill">🔁 0</div>
    </div>

    <div class="progress-row">
      <div class="found-count" id="found-count">✨ 0/0</div>
      <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
  </section>

  <!-- ============ LEVEL COMPLETE ============ -->
  <section class="screen" id="screen-complete">
    <div class="complete">
      <div style="font-size:3.4rem">🎉</div>
      <h2 id="complete-title" data-i18n="cleared">Level Cleared!</h2>
      <div class="stars-big" id="complete-stars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
      <div class="reward-line" id="complete-reward"></div>
      <div>
        <button class="btn green" id="next-btn"></button>
        <button class="btn ghost" id="replay-btn" data-i18n="replay">↻ Replay</button>
        <button class="btn ghost" data-go="select" data-i18n="map">🏠 Map</button>
      </div>
    </div>
  </section>

</div>
<div id="fx"></div>

<!-- ============ COSMETICS CUSTOMIZER ============ -->
<div class="cz-wrap" id="cz" role="dialog" aria-modal="true">
  <div class="cz-card">
    <div class="cz-title" data-i18n="cz_title">Pick your card back</div>
    <div class="cz-preview"><div class="pv" id="cz-preview" aria-hidden="true"></div></div>
    <div id="cz-rows"></div>
    <button class="btn green cz-done" id="cz-done" data-i18n="cz_done">Done</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   Memory Lane — single-file kids' memory-match game
   A grid of face-down cards. Flip two; identical pictures
   make a pair and stay revealed. Clear the board to finish.
   Boards grow each level. Tweak LEVELS / THEMES below.
   ========================================================= */

// ----- Level configuration (data-driven, language-independent) -----
// rows × cols must be even (an even number of cards).
// themeKey  -> picks the emoji pool + world name + accent colour (see THEMES).
// nameKey   -> level name, looked up in the I18N table (translatable).
const LEVELS = [
  {rows:2, cols:2, themeKey:"animals",  nameKey:"lvl_firstPeek"},   // 2 pairs
  {rows:2, cols:3, themeKey:"animals",  nameKey:"lvl_petParade"},   // 3 pairs
  {rows:3, cols:4, themeKey:"food",     nameKey:"lvl_snackTime"},   // 6 pairs
  {rows:4, cols:4, themeKey:"vehicles", nameKey:"lvl_onTheMove"},   // 8 pairs
  {rows:4, cols:5, themeKey:"sea",      nameKey:"lvl_underTheSea"}, // 10 pairs
  {rows:4, cols:6, themeKey:"space",    nameKey:"lvl_blastOff"},    // 12 pairs
];

// ----- Themed worlds: emoji pool (>= largest board's pairs), accent colour, name -----
// The biggest board is 4×6 = 12 pairs, so each pool has at least 12 distinct pictures.
const THEMES = {
  animals:  {worldKey:"world_animals",  accent:"#ff9f68", soft:"#ffd9c2", emoji:"🐶🐱🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐵🐔🐧🦉"},
  food:     {worldKey:"world_food",     accent:"#ff7a9c", soft:"#ffcad9", emoji:"🍎🍌🍓🍇🍉🍊🍒🍑🥕🌽🍪🍰🍩🧁🍕🍔"},
  vehicles: {worldKey:"world_vehicles", accent:"#4bb6e8", soft:"#bfe6f7", emoji:"🚗✈️🚂🚁🚀🚌🚓🚒🚑🚜🛵🚲⛵🚢🏎️🛺"},
  sea:      {worldKey:"world_sea",      accent:"#2bc4b6", soft:"#b8efe9", emoji:"🐠🐙🦀🐬🐳🦈🐡🦑🐚🐢🦞🐟🦭🪼🦐🐋"},
  space:    {worldKey:"world_space",    accent:"#9a7bff", soft:"#d6c9ff", emoji:"🚀🪐🌙⭐🌟☄️🛸👽🌍🌝🔭🌞🌠💫🌕👾"},
};

// ----- String table (i18n). Add a language by adding another block. -----
// Card pictures are language-neutral emoji; only the UI chrome is translated.
const I18N = {
  en:{
    dir:"ltr", langName:"English",
    title:"Memory Lane",
    tagline:"Flip the cards and find the matching pairs!",
    play:"▶ Play",
    sound:"Sound",
    music:"Music",
    reset:"Reset progress",
    allGames:"🎮 All games",
    customize:"🎨 Customize",
    cz_title:"Pick your card back",
    cz_color:"Back colour",
    cz_motif:"Symbol",
    cz_done:"Done",
    pickLevel:"Pick a Level",
    pickSub:"your memory adventure",
    back:"Back",
    findPairs:"Find the pairs!",
    moves:"moves",
    pairs:"pairs",
    found:"found",         // shown in the bar label
    cleared:"Level Cleared!",
    allDone:"You're a Memory Master! 🏆",
    perfect:"Perfect memory!",
    oops_one:"1 mismatch",
    oops_many:"mismatches",  // shown as: 3 mismatches
    movesDone:"moves",       // shown as: 8 moves
    next:"Next ▶",
    replay:"↻ Replay",
    map:"🏠 Map",
    resetConfirm:"Start over? This clears all your stars.",
    resetDone:"Progress reset! 🧹",
    // worlds
    world_animals:"Animal Friends", world_food:"Tasty Treats", world_vehicles:"Things That Go",
    world_sea:"Under the Sea", world_space:"Outer Space",
    // levels
    lvl_firstPeek:"First Peek", lvl_petParade:"Pet Parade", lvl_snackTime:"Snack Time",
    lvl_onTheMove:"On the Move", lvl_underTheSea:"Under the Sea", lvl_blastOff:"Blast Off!",
  },
  he:{
    dir:"rtl", langName:"עברית",
    title:"שביל הזיכרון",
    tagline:"הופכים קלפים ומוצאים את הזוגות התואמים!",
    play:"▶ שחקו",
    sound:"צליל",
    music:"מוזיקה",
    reset:"איפוס התקדמות",
    allGames:"🎮 כל המשחקים",
    customize:"🎨 התאמה אישית",
    cz_title:"בחרו גב לקלפים",
    cz_color:"צבע הגב",
    cz_motif:"סמל",
    cz_done:"סיום",
    pickLevel:"בחרו שלב",
    pickSub:"הרפתקת הזיכרון שלך",
    back:"חזרה",
    findPairs:"מצאו את הזוגות!",
    moves:"מהלכים",
    pairs:"זוגות",
    found:"נמצאו",
    cleared:"השלב הושלם!",
    allDone:"אלופי הזיכרון! 🏆",
    perfect:"זיכרון מושלם!",

const DEFAULT_LANG = "he";

// Look up a translated string for the current language (falls back to English, then the key).
function t(key){
  const L = I18N[save.lang] || I18N[DEFAULT_LANG];
  if(L && L[key]!=null) return L[key];
  if(I18N.en[key]!=null) return I18N.en[key];
  return key;
}
// Friendly mismatch text ("Perfect memory!", "1 mismatch", "3 mismatches").
function mistakesText(m){ return m===0 ? t("perfect") : (m===1 ? t("oops_one") : m+" "+t("oops_many")); }

// ----- Persistent save (progress is language-independent — flat shape) -----
const SAVE_KEY = "memoryLane.save";
// Player-chosen card-back style (shared across levels/languages).
const DEFAULT_COSMETICS = {back:"#8a7bff", motif:"?"};
const DEFAULT_SAVE = {unlockedLevel:0, starsByLevel:{}, muted:false, music:true, lang:DEFAULT_LANG,
  cosmetics:{...DEFAULT_COSMETICS}};

function loadSave(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return {...DEFAULT_SAVE, cosmetics:{...DEFAULT_COSMETICS}};
    const parsed = JSON.parse(raw);
    const s = {...DEFAULT_SAVE, ...parsed};
    s.cosmetics = {...DEFAULT_COSMETICS, ...(parsed.cosmetics||{})};
    if(!I18N[s.lang]) s.lang = DEFAULT_LANG;
    return s;
  }catch(e){ return {...DEFAULT_SAVE, cosmetics:{...DEFAULT_COSMETICS}}; }
}
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }
let save = loadSave();

// ----- Helpers -----
const $ = sel => document.querySelector(sel);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
// Set an element's text and append it to a parent (small DOM-building helper).
function appendEl(parent, tag, className, text){
  const el = document.createElement(tag);
  if(className) el.className = className;
  if(text!=null) el.textContent = text;
  parent.appendChild(el);
  return el;
}
// Split a theme's emoji string into an array of individual pictures (emoji-safe).
// Intl.Segmenter keeps multi-codepoint emoji (e.g. ✈️, 🏎️) whole; Array.from is the fallback.
function emojiList(str){
  if(typeof Intl !== "undefined" && Intl.Segmenter){
    const seg = new Intl.Segmenter(undefined,{granularity:"grapheme"});
    return [...seg.segment(str)].map(s=>s.segment);
  }
  return Array.from(str);
}

// =========================================================
//  Sound (tiny Web Audio jingles — no files)
// =========================================================
// Pure Web Audio: no files, no libraries, no network.
//   tone()  = one ADSR voice (optional detune/glide/filter/echo)
//   noise() = filtered noise burst for percussive cues
//   arp()   = quick chord/arpeggio for happy cues
// A shared compressor + a feedback-delay "sparkle" send keep stacked
// notes from clipping and add a touch of space.
let audioCtx = null, sfxBus = null, musicBus = null, fxDelay = null;
const midi = m => 440 * Math.pow(2, (m - 69) / 12);   // MIDI note → Hz
function audio(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  try{ audioCtx = new AC(); }catch(e){ return null; }
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 26; comp.ratio.value = 3.5;
  comp.attack.value = 0.004; comp.release.value = 0.25; comp.connect(audioCtx.destination);
  fxDelay = audioCtx.createDelay(0.5); fxDelay.delayTime.value = 0.17;
  const fb = audioCtx.createGain(); fb.gain.value = 0.24;
  const wet = audioCtx.createGain(); wet.gain.value = 0.45;
  fxDelay.connect(fb); fb.connect(fxDelay); fxDelay.connect(wet); wet.connect(comp);
  sfxBus = audioCtx.createGain(); sfxBus.gain.value = 0.85; sfxBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 0.0001; musicBus.connect(comp);
  return audioCtx;
}
function audioReady(){ const c = audio(); if(c && c.state === "suspended") c.resume(); return c; }
function tone(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const peak = o.gain != null ? o.gain : 0.15;
  const atk = o.attack != null ? o.attack : 0.012;
  const rel = o.release != null ? o.release : Math.min(dur, 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + atk);
  g.gain.setValueAtTime(peak, t0 + Math.max(atk, dur - rel));
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  let sink = g;
  if(o.cutoff){
    const lp = ctx.createBiquadFilter(); lp.type = o.filter || "lowpass";
    lp.frequency.value = o.cutoff; lp.Q.value = o.q != null ? o.q : 0.7;
    lp.connect(g); sink = lp;
  }
  for(const d of (o.fat ? [-6, 6] : [0])){
    const osc = ctx.createOscillator();
    osc.type = o.type || "sine";
    osc.frequency.setValueAtTime(o.freq, t0);
    if(o.glideTo) osc.frequency.exponentialRampToValueAtTime(o.glideTo, t0 + dur);
    osc.detune.value = (o.detune || 0) + d;
    osc.connect(sink); osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
}
function noise(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const data = buf.getChannelData(0);
  const curve = o.curve != null ? o.curve : 2;
  for(let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, curve);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = o.filter || "lowpass";
  filt.frequency.value = o.cutoff != null ? o.cutoff : 1200;
  filt.Q.value = o.q != null ? o.q : 0.8;
  const g = ctx.createGain(); g.gain.value = o.gain != null ? o.gain : 0.15;
  src.connect(filt); filt.connect(g); g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
  src.start(t0); src.stop(t0 + dur + 0.02);
}
function arp(root, intervals, opts){
  const o = opts || {};
  intervals.forEach((iv, i) => tone({
    freq: midi(root + iv), t: (o.t || 0) + i * (o.step != null ? o.step : 0.09),
    dur: o.dur != null ? o.dur : 0.3, type: o.type || "triangle",
    gain: o.gain != null ? o.gain : 0.13, attack: 0.006, release: 0.22,
    echo: true, fat: o.fat, cutoff: o.cutoff || 2600
  }));
}
// Back-compat: existing call sites use beep(freq,start,dur,type,gain).
function beep(freq, start, dur, type = "sine", gain = 0.15){
  if(save.muted) return;
  tone({ freq, t: start, dur, type, gain, cutoff: (type === "square" || type === "sawtooth") ? 2800 : 0 });
}
function playSound(type){
  if(save.muted) return;
  if(type==="flip"){ tone({freq:480,glideTo:620,dur:0.09,type:"triangle",gain:0.08,attack:0.003,release:0.06,cutoff:3200}); }
  else if(type==="match"){ tone({freq:660,dur:0.12,type:"triangle",gain:0.11,echo:true,cutoff:3000}); tone({freq:990,t:0.1,dur:0.22,type:"triangle",gain:0.1,echo:true,cutoff:3200}); }
  else if(type==="mismatch"){ tone({freq:330,glideTo:200,dur:0.24,type:"sine",gain:0.11,release:0.2,cutoff:1300}); }
  else if(type==="level"){ arp(65,[0,4,7,12,16,19],{step:0.1,gain:0.12,dur:0.4,fat:true}); }
  else if(type==="tap"){ tone({freq:560,dur:0.06,type:"triangle",gain:0.07,attack:0.003,release:0.05,cutoff:3000}); }
}

// Ambient music — generative loop via a lookahead scheduler.
// Bass + pad per bar, sparse pentatonic melody. Own bus, low volume under the SFX.
const MUSIC = { tempo:72, root:65, wave:"triangle", vol:0.38,
  scale:[0,2,4,7,9], prog:[0,-3,5,7], chord:[0,4,7], melodyAt:[2,5,7], shaker:false };
let musicTimer = null, musicBeat = 0, musicNextT = 0, musicPlaying = false;
function musicStep(at, eighth){
  const m = MUSIC, SPB = 8, step = musicBeat % SPB;
  const cr = m.root + m.prog[Math.floor(musicBeat / SPB) % m.prog.length];
  if(step === 0){
    tone({ at, freq: midi(cr - 12), dur: eighth * SPB * 0.92, type: "sine", gain: 0.085, attack: 0.05, release: 0.7, bus: musicBus });
    m.chord.forEach((iv, k) => tone({ at: at + k * 0.012, freq: midi(cr + iv), dur: eighth * SPB * 0.96, type: m.wave, gain: 0.04, attack: 0.3, release: 0.9, fat: true, cutoff: 1900, bus: musicBus }));
  } else if(step === 4){
    tone({ at, freq: midi(cr - 12), dur: eighth * 3, type: "sine", gain: 0.055, attack: 0.04, release: 0.4, bus: musicBus });
  }
  if(m.melodyAt.includes(step) && Math.random() < 0.7){
    const deg = m.scale[Math.floor(Math.random() * m.scale.length)] + (Math.random() < 0.25 ? 12 : 0);
    tone({ at, freq: midi(cr + 12 + deg), dur: 0.34, type: "triangle", gain: 0.05, attack: 0.006, release: 0.3, echo: true, cutoff: 3200, bus: musicBus });
  }
  if(m.shaker && step % 2 === 1) noise({ at, dur: 0.05, gain: 0.012, filter: "highpass", cutoff: 6000, curve: 1, bus: musicBus });
}
function musicTick(){
  const ctx = audioCtx; if(!ctx || !musicPlaying) return;
  const eighth = 60 / MUSIC.tempo / 2;
  while(musicNextT < ctx.currentTime + 0.12){ musicStep(musicNextT, eighth); musicNextT += eighth; musicBeat++; }
}
function startMusic(){
  if(musicPlaying || save.muted || !save.music) return;
  const ctx = audioReady(); if(!ctx) return;
  musicPlaying = true; musicBeat = 0; musicNextT = ctx.currentTime + 0.18;
  musicBus.gain.cancelScheduledValues(ctx.currentTime);
  musicBus.gain.setValueAtTime(0.0001, ctx.currentTime);
  musicBus.gain.exponentialRampToValueAtTime(MUSIC.vol, ctx.currentTime + 1.6);
  musicTimer = setInterval(musicTick, 25);
}
function stopMusic(){
  if(!musicPlaying) return;
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  const ctx = audioCtx; if(!ctx || !musicBus) return;
  const now = ctx.currentTime;
  musicBus.gain.cancelScheduledValues(now);
  musicBus.gain.setValueAtTime(Math.max(0.0001, musicBus.gain.value), now);
  musicBus.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
}
function maybeStartMusic(){ if(save.music && !save.muted) startMusic(); }
// Unlock the AudioContext + start music on the very first interaction.
["pointerdown","keydown"].forEach(ev => window.addEventListener(ev, function k(){ audioReady(); maybeStartMusic(); }, { once:true }));
function refreshMusicBtn(){
  ["#music-btn-title","#music-btn-play"].forEach(sel => { const b = $(sel); if(b){ b.textContent = "🎵"; b.classList.toggle("is-off", !save.music); } });
}
function toggleMusic(){
  save.music = !save.music; persist(); refreshMusicBtn();
  if(save.music){ maybeStartMusic(); if(!save.muted) playSound("tap"); } else stopMusic();
}

// =========================================================
//  Screen navigation
// =========================================================
function showScreen(name){
  // Leaving the board mid-compare: cancel pending flip-back/lock timers and
  // release the input block so a stale callback can't touch the next board.
  if(name!=="play"){ clearGameTimers(); game.busy = false; game.first = null; }
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("#screen-"+name).classList.add("active");
  if(name==="select") renderSelect();
}

// =========================================================
//  Level select
// =========================================================
function renderSelect(){
  const grid = $("#levels-grid");
  grid.innerHTML = "";
  let lastWorld = null;
  LEVELS.forEach((lv,i)=>{
    const theme = THEMES[lv.themeKey];
    // group consecutive levels of the same world under a label
    if(theme.worldKey!==lastWorld){
      lastWorld = theme.worldKey;
      appendEl(grid, "div", "world-label", t(theme.worldKey));
    }
    const locked = i > save.unlockedLevel;
    const stars = save.starsByLevel[i]||0;
    const pairs = (lv.rows*lv.cols)/2;
    const card = document.createElement("div");
    card.className = "level-card"+(locked?" locked":"");
    card.innerHTML = `
      <div class="lc-emoji">${locked?"🔒":emojiList(theme.emoji)[0]}</div>
      <div class="lc-name">${t(lv.nameKey)}</div>
      <div class="lc-sub">${lv.rows}×${lv.cols} • ${pairs} ${t("pairs")}</div>
      <div class="lc-stars">${starString(stars)}</div>`;
    if(!locked) card.addEventListener("click",()=>startLevel(i));
    grid.appendChild(card);
  });
}
function starString(n){ return "★★★".slice(0,n).padEnd(3,"☆"); }

// =========================================================
//  Game state
// =========================================================
const game = {
  levelIndex:0,
  cards:[],         // { el, picture, matched }
  first:null,       // first flipped card awaiting a partner
  busy:false,       // input blocked during the compare window
  found:0,          // pairs found
  totalPairs:0,
  moves:0,          // a "move" = a pair of flips
  mismatches:0,
  timers:[],        // pending compare-window timeouts, cancelled when the level resets
};

// Schedule a timeout tied to the current level. Tracking it means a stale
// flip-back / lock can't fire on the next board if the player leaves mid-compare.
function gameTimeout(fn, ms){
  const id = setTimeout(()=>{
    game.timers = game.timers.filter(x=>x!==id);
    fn();
  }, ms);
  game.timers.push(id);
  return id;
}
// Cancel every pending compare-window timeout and release the input block.
function clearGameTimers(){
  game.timers.forEach(clearTimeout);
  game.timers = [];
}

// =========================================================
//  Build + play a level
// =========================================================
function startLevel(i){
  const lv = LEVELS[i];
  const theme = THEMES[lv.themeKey];
  clearGameTimers();   // drop any compare-window timers from the previous board
  game.levelIndex = i;
  game.first = null;
  game.busy = false;
  game.found = 0;
  game.moves = 0;
  game.mismatches = 0;
  game.totalPairs = (lv.rows*lv.cols)/2;
  game.cards = [];

  // re-point the themed accent colour
  document.documentElement.style.setProperty("--accent", theme.accent);
  document.documentElement.style.setProperty("--accent-soft", theme.soft);

  // header
  $("#play-level").innerHTML = `${t(lv.nameKey)}<small>${t(theme.worldKey)}</small>`;

  // pick pictures: count/2 distinct from the theme, duplicate, shuffle into the grid
  const pool = shuffle(emojiList(theme.emoji).slice());
  const chosen = pool.slice(0, game.totalPairs);
  const deck = shuffle(chosen.concat(chosen));   // each picture twice

  // build the grid
  const board = $("#board");
  board.style.gridTemplateColumns = `repeat(${lv.cols}, 1fr)`;
  // keep the board comfortably within a phone's width: cap by columns
  board.style.maxWidth = Math.min(560, lv.cols*96) + "px";
  board.innerHTML = "";
  deck.forEach((pic, idx)=>{
    const cardObj = buildCard(pic, idx);
    board.appendChild(cardObj.el);
    game.cards.push(cardObj);
  });

  updateProgressUI();
  showScreen("play");
}

// Build one card button (face-down) and wire its click. Returns { el, picture, matched }.
function buildCard(pic, idx){
  const btn = document.createElement("button");
  btn.className = "card";
  btn.type = "button";
  // Accessible label: a face-down card the player can flip. State is refreshed on flip/match.
  btn.setAttribute("aria-label", t("findPairs"));
  btn.innerHTML = `
    <div class="inner">
      <div class="face back">${cardBackSVG()}</div>
      <div class="face front">${pic}</div>
    </div>`;
  const cardObj = {el:btn, picture:pic, matched:false};
  btn.addEventListener("click", ()=>onCardClick(cardObj));
  return cardObj;
}
// Reflect a card's flipped/matched state to assistive tech.
function setCardAria(card){
  if(card.matched) card.el.setAttribute("aria-label", card.picture + " — " + t("found"));
  else if(card.el.classList.contains("flipped")) card.el.setAttribute("aria-label", card.picture);
  else card.el.setAttribute("aria-label", t("findPairs"));
}

// Player-customizable card back: a full-bleed colour + dotted motif + chosen symbol.
function cardBackSVG(cz){
  cz = cz || save.cosmetics || DEFAULT_COSMETICS;
  return `<svg viewBox="0 0 60 80" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
        <circle cx="7" cy="7" r="2.2" fill="#ffffff" opacity=".26"/>
      </pattern>
    </defs>
    <rect x="0" y="0" width="60" height="80" fill="${cz.back}"/>
    <rect x="0" y="0" width="60" height="80" fill="url(#dots)"/>
    <circle cx="30" cy="40" r="17" fill="#ffffff" opacity=".20"/>
    <text x="30" y="52" font-size="30" font-weight="900" text-anchor="middle"
          fill="#ffffff" font-family="Comic Sans MS, system-ui, sans-serif">${cz.motif}</text>
  </svg>`;
}

function onCardClick(card){
  // ignore taps that can't do anything
  if(game.busy) return;
  if(card.matched) return;
  if(game.first === card) return;            // same card tapped twice
  if(card.el.classList.contains("flipped")) return;

  // flip this card up
  card.el.classList.add("flipped");
  setCardAria(card);
  playSound("flip");

  if(!game.first){
    // first card of a pair
    game.first = card;
    return;
  }

  // second card — this completes a move. Block input for the whole compare
  // window so a rapid third tap can't start another comparison.
  game.busy = true;
  game.moves++;
  $("#moves-pill").textContent = "🔁 " + game.moves;
  const a = game.first, b = card;
  game.first = null;

  if(a.picture === b.picture){
    // MATCH — lock both, celebrate
    gameTimeout(()=>{
      [a,b].forEach(c=>{
        c.matched = true;
        c.el.classList.add("matched","pop");
        setCardAria(c);
        gameTimeout(()=>c.el.classList.remove("pop"), 460);
      });
      playSound("match");
      game.found++;
      updateProgressUI();
      game.busy = false;
      if(game.found >= game.totalPairs) gameTimeout(completeLevel, 650);
    }, 280);   // let the flip finish before locking
  }else{
    // MISMATCH — input stays blocked, but let the player SEE the second card first.
    // The flip animation is .5s, so we hold both cards face-up for a beat
    // before the "oops" sound + wobble, then flip them back.
    game.mismatches++;
    gameTimeout(()=>{
      playSound("mismatch");
      a.el.classList.add("shake"); b.el.classList.add("shake");
      gameTimeout(()=>{
        a.el.classList.remove("flipped","shake");
        b.el.classList.remove("flipped","shake");
        setCardAria(a); setCardAria(b);
        game.busy = false;
      }, 650);
    }, 650);   // reveal pause — both cards stay up long enough to read
  }
}

function updateProgressUI(){
  $("#found-count").textContent = `✨ ${game.found}/${game.totalPairs}`;
  $("#moves-pill").textContent = "🔁 " + game.moves;
  const frac = game.totalPairs ? game.found/game.totalPairs : 0;
  $("#bar-fill").style.width = (frac*100) + "%";
}

// =========================================================
//  Level complete
// =========================================================
function completeLevel(){
  const i = game.levelIndex;
  const m = game.mismatches;
  // stars: 0 mismatches = perfect 3; a few = 2; otherwise 1.
  // scale the "few" threshold with board size so big boards stay fair.
  const tol = Math.max(1, Math.round(game.totalPairs/3));
  const stars = m===0 ? 3 : (m<=tol ? 2 : 1);

  // persist progress (best stars; unlock next)
  save.starsByLevel[i] = Math.max(save.starsByLevel[i]||0, stars);
  if(i+1 <= LEVELS.length-1) save.unlockedLevel = Math.max(save.unlockedLevel, i+1);
  persist();

  const isLast = i >= LEVELS.length-1;
  $("#complete-title").textContent = isLast ? t("allDone") : t("cleared");
  $("#complete-reward").textContent = `${game.moves} ${t("movesDone")}  •  ${mistakesText(m)}`;

  // animate stars
  const starEls = document.querySelectorAll("#complete-stars .s");
  starEls.forEach(s=>s.classList.remove("on"));
  showScreen("complete");
  starEls.forEach((s,idx)=>{
    setTimeout(()=>{ if(idx<stars){ s.classList.add("on"); playSound("tap"); } }, 300+idx*250);
  });

  // next button behaviour
  const nextBtn = $("#next-btn");
  if(isLast){
    nextBtn.textContent = t("map");
    nextBtn.onclick = ()=>showScreen("select");
  }else{
    nextBtn.textContent = t("next");
    nextBtn.onclick = ()=>startLevel(i+1);
  }
  $("#replay-btn").onclick = ()=>startLevel(i);

  playSound("level");
  confetti();
}

// =========================================================
//  Visual FX
// =========================================================
function confetti(){
  const fx = $("#fx");
  const emojis = ["🎉","✨","⭐","🌟","🎊","💫","🏅"];
  for(let i=0;i<40;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = pick(emojis);
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}

// ----- Ambient floating background (soft SVG bokeh + drifting doodles) -----
function buildBackground(){
  const bg = $("#bg");
  const colors = ["#ffd166","#ff8fab","#8a7bff","#5fbf6a","#7cc6ff","#ff9f68"];
  const doodles = ["⭐","✨","🌙","💛","🔵","🟣","🟢","❤️"];
  // soft round bokeh blobs
  for(let i=0;i<7;i++){
    const d = document.createElement("div");
    d.className = "blob";
    const size = 60 + Math.random()*140;
    d.style.width = d.style.height = size+"px";
    const col = pick(colors);
    d.style.borderRadius = "50%";
    d.style.background = `radial-gradient(circle at 35% 30%, ${col}, transparent 70%)`;
    d.style.left = Math.random()*100+"vw";
    d.style.top = Math.random()*100+"vh";
    d.style.animationDuration = (10+Math.random()*12)+"s";
    d.style.animationDelay = (-Math.random()*10)+"s";
    bg.appendChild(d);
  }
  // little drifting doodles
  for(let i=0;i<8;i++){
    const d = document.createElement("div");
    d.className = "doodle";
    d.textContent = pick(doodles);
    d.style.left = Math.random()*100+"vw";
    d.style.top = Math.random()*100+"vh";
    d.style.animationDuration = (9+Math.random()*10)+"s";
    d.style.animationDelay = (-Math.random()*9)+"s";
    bg.appendChild(d);
  }
}

// =========================================================
//  Mute toggle
// =========================================================
function refreshMute(){
  const icon = save.muted ? "🔇" : "🔊";
  $("#mute-btn-title").textContent = icon;
  $("#mute-btn-play").textContent = icon;
}
function toggleMute(){ save.muted=!save.muted; persist(); refreshMute(); if(save.muted){ stopMusic(); } else { playSound("tap"); maybeStartMusic(); } }

// =========================================================
//  Language (string table) — applies text + page direction
// =========================================================
function applyLanguage(){
  if(!I18N[save.lang]) save.lang = DEFAULT_LANG;
  const L = I18N[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  // static text + tooltips marked in the HTML
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
  // the toggle shows the OTHER language to switch to
  $("#lang-btn").textContent = I18N[save.lang==="he"?"en":"he"].langName;
  // refresh a visible dynamic screen so its text updates too
  if($("#screen-select").classList.contains("active")) renderSelect();
}
function toggleLanguage(){ save.lang = (save.lang==="he"?"en":"he"); persist(); applyLanguage(); playSound("tap"); }

// =========================================================
//  Cosmetics customizer (card-back colour + symbol)
// =========================================================
const COSMETIC_COLORS = ["#8a7bff","#6a58e0","#ff7a9c","#ff5a5a","#ffa64d","#ffd166","#5fbf6a","#2bb5a0","#4bb6e8","#3a3340","#f4628a"];
const COSMETIC_MOTIFS = ["?","★","♥","◆","✦","☻"];

// Apply the chosen back colour to any cards already in the DOM (via CSS var).
function applyCosmetics(){ document.documentElement.style.setProperty("--card-back", save.cosmetics.back); }

function czRow(labelText, opts, key){
  const cur = save.cosmetics[key];
  const row = document.createElement("div"); row.className = "cz-row";
  const lbl = document.createElement("div"); lbl.className = "cz-label"; lbl.textContent = labelText;
  const wrap = document.createElement("div"); wrap.className = "cz-opts";
  opts.forEach(o=>{
    const b = document.createElement("button"); b.type = "button";
    b.className = "cz-sw" + (cur===o.val ? " sel" : "");
    b.style.background = o.bg;
    if(o.label) b.textContent = o.label;
    b.setAttribute("aria-label", o.val);
    b.addEventListener("click", ()=>setCosmetic(key, o.val));
    wrap.appendChild(b);
  });
  row.appendChild(lbl); row.appendChild(wrap); return row;
}
function renderCustomizer(){
  const prev = $("#cz-preview"); if(prev) prev.innerHTML = cardBackSVG(save.cosmetics);
  const rows = $("#cz-rows"); rows.innerHTML = "";
  rows.appendChild(czRow(t("cz_color"), COSMETIC_COLORS.map(c=>({val:c, bg:c})), "back"));
  rows.appendChild(czRow(t("cz_motif"), COSMETIC_MOTIFS.map(m=>({val:m, bg:save.cosmetics.back, label:m})), "motif"));
}
function setCosmetic(key,val){ save.cosmetics[key]=val; persist(); applyCosmetics(); renderCustomizer(); playSound("tap"); }
function openCustomizer(){ renderCustomizer(); $("#cz").classList.add("open"); }
function closeCustomizer(){ $("#cz").classList.remove("open"); }

// =========================================================
//  Wiring + init
// =========================================================
document.addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go) showScreen(go.getAttribute("data-go"));
});
$("#play-btn").addEventListener("click", ()=>{ playSound("tap"); showScreen("select"); });
$("#customize-btn").addEventListener("click", ()=>{ playSound("tap"); openCustomizer(); });
$("#cz-done").addEventListener("click", ()=>{ playSound("tap"); closeCustomizer(); });
$("#cz").addEventListener("click", e=>{ if(e.target.id==="cz") closeCustomizer(); });
$("#mute-btn-title").addEventListener("click", toggleMute);
$("#mute-btn-play").addEventListener("click", toggleMute);
$("#music-btn-title").addEventListener("click", toggleMusic);
$("#music-btn-play").addEventListener("click", toggleMusic);
$("#lang-btn").addEventListener("click", toggleLanguage);
$("#reset-btn").addEventListener("click", ()=>{
  if(confirm(t("resetConfirm"))){
    const lang = save.lang;                 // keep language + cosmetics across a reset
    save = {...DEFAULT_SAVE, lang, cosmetics:{...save.cosmetics}};
    persist(); refreshMute(); applyCosmetics();
    if($("#screen-select").classList.contains("active")) renderSelect();
    alert(t("resetDone"));
  }
});

// init
buildBackground();
applyCosmetics();
refreshMute();
refreshMusicBtn();
applyLanguage();
</script>
</body>
</html>
