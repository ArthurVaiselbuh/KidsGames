<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>מפעל הכדורים ⚙️ — חשבון כיף לילדים</title>
<style>
  /* ---------- Theme ---------- */
  :root{
    --sky:#dff1ff;
    --steel:#eef4f8;
    --steel-2:#dceaf3;
    --ink:#33444f;
    --ink-soft:#6c8090;
    --accent:#ff8a5b;
    --accent-deep:#f4683a;
    --teal:#37c2b4;
    --sun:#ffd166;
    --good:#5fbf6a;
    --panel:#ffffff;
    --belt:#3a4a57;
    --frame:#f4f8fb;          /* tray colour behind block balls */
    --wood:#bd803f;           /* wooden frame around rod / flat / stack */
    --wood-dark:#7d4e22;
    --ball:#ff7aa2;           /* current order ball colour (set per order) */
    --shadow:0 6px 0 rgba(0,0,0,.10), 0 12px 24px rgba(0,0,0,.12);
    --radius:22px;
    font-size:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Baloo 2","Trebuchet MS",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, #fff 0 8%, transparent 9%),
      radial-gradient(circle at 85% 18%, #fff 0 6%, transparent 7%),
      linear-gradient(160deg, var(--sky), var(--steel) 45%, var(--steel-2));
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{ max-width:780px; margin:0 auto; min-height:100%; padding:14px 16px 28px; position:relative; z-index:1; }

  /* ---------- Ambient floating background (gears + bolts + balls) ---------- */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  #bg .blob{position:absolute; border-radius:50%; opacity:.4; filter:blur(.5px); animation:drift linear infinite; will-change:transform;}
  #bg .doodle{position:absolute; opacity:.16; animation:drift2 linear infinite; will-change:transform;}
  @keyframes drift{0%{transform:translate(0,0) rotate(0);}50%{transform:translate(16px,-26px) rotate(12deg);}100%{transform:translate(0,0) rotate(0);}}
  @keyframes drift2{0%{transform:translate(0,0) rotate(0);}50%{transform:translate(0,-34px) rotate(-18deg);}100%{transform:translate(0,0) rotate(0);}}

  /* ---------- Screens ---------- */
  .screen{display:none; animation:fade .35s ease both;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit; font-weight:800; cursor:pointer; border:none;
    background:var(--accent); color:#fff; border-radius:var(--radius);
    padding:16px 26px; font-size:1.25rem; box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease; text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .btn:active{transform:translateY(3px);}
  .btn:hover{filter:brightness(1.05);}
  .btn.big{font-size:1.7rem; padding:20px 44px;}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .btn.green{background:var(--good);}
  .icon-btn{
    background:#fff; border:none; border-radius:50%; width:48px; height:48px;
    font-size:1.4rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.1);
  }
  .icon-btn:active{transform:translateY(2px);}
  .icon-btn.is-off{opacity:.4; filter:grayscale(1);}
  .title-top{display:flex; align-items:center; margin-bottom:4px;}
  a.icon-btn.home-link{display:inline-flex; align-items:center; justify-content:center; text-decoration:none;}

  /* ---------- Title screen ---------- */
  .hero{text-align:center; padding:18px 6px 6px;}
  .logo{
    font-size:clamp(2.4rem,8.5vw,4rem); font-weight:900; line-height:1.05;
    color:var(--accent-deep); text-shadow:0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.12); margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:spin 6s linear infinite;}
  .tagline{font-size:1.15rem; color:var(--ink-soft); margin:0 0 16px;}
  .mascot{
    display:inline-flex; align-items:center; justify-content:center;
    width:9rem; height:9rem; border-radius:50%; animation:bob 2.6s ease-in-out infinite;
    background:radial-gradient(circle at 50% 46%, #fff 0 54%, rgba(255,255,255,0) 72%);
  }
  .mascot .bot{width:7.6rem; height:7.6rem;}
  .title-treats{font-size:1.7rem; letter-spacing:8px; margin:6px 0 18px; opacity:.9;}
  .title-actions{display:flex; flex-direction:column; align-items:center; gap:12px;}
  .mini-link{background:none; border:none; color:var(--ink-soft); text-decoration:underline; cursor:pointer; font-family:inherit; font-size:.95rem;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .topbar .spacer{flex:1;}
  .coins{
    background:#fff; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.15rem; white-space:nowrap;
  }
  .level-tag{font-weight:900; font-size:1.05rem; text-align:center; line-height:1.1;}
  .level-tag small{display:block; font-weight:700; color:var(--ink-soft); font-size:.8rem;}

  /* ---------- Progress ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin:6px 2px 12px;}
  .order-count{font-weight:800; white-space:nowrap;}
  .order-dots{display:flex; gap:6px; flex-wrap:wrap;}
  .order-dots .od{width:14px; height:14px; border-radius:50%; background:#fff; box-shadow:inset 0 2px 3px rgba(0,0,0,.12);}
  .order-dots .od.done{background:var(--good);}
  .order-dots .od.perfect{background:var(--sun);}
  .order-dots .od.cur{box-shadow:0 0 0 3px var(--accent);}

  /* ---------- Room (a 3-D factory floor) ---------- */
  .room{
    position:relative; height:380px; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
    background:linear-gradient(180deg, #d6e6f3 0%, #c4d8e8 33%, #adc1d3 33.2%, #8ea5b9 100%); /* back wall meets floor */
  }
  .room:before{ /* steel beam along the back wall */
    content:""; position:absolute; left:0; right:0; top:0; height:12px; z-index:1;
    background:repeating-linear-gradient(90deg, var(--teal) 0 18px, #2aa79b 18px 36px);
    box-shadow:0 2px 4px rgba(0,0,0,.18);
  }
  .room:after{ /* soft depth vignette */
    content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(130% 75% at 50% 6%, transparent 58%, rgba(0,0,0,.16));
  }
  /* conveyor belt: a trapezoid receding from the player (wide, near) up to the customer (narrow, far) */
  .belt3d{
    position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:74%; height:64%; z-index:2;
    clip-path:polygon(40% 0, 60% 0, 100% 100%, 0% 100%);
    background:#41525f;
    background-image:repeating-linear-gradient(0deg, rgba(0,0,0,.32) 0 11px, rgba(255,255,255,.07) 11px 22px);
    background-size:100% 30px;
    box-shadow:inset 0 0 40px rgba(0,0,0,.38);
    animation:belt3d .85s linear infinite;  /* slats crawl toward the customer */
  }
  @keyframes belt3d{from{background-position:0 0;} to{background-position:0 -30px;}}

  /* ---------- Back-wall scenery: pipes, a door, exit sign, a machine, gears ---------- */
  .room-bg{position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .rb-pipe{position:absolute; top:18px; left:0; right:0; height:8px;
    background:linear-gradient(180deg,#d4dee6,#9fb0bd); box-shadow:0 2px 3px rgba(0,0,0,.16);}
  .rb-door{position:absolute; top:46px; inset-inline-start:54px; width:48px; height:80px; border-radius:5px 5px 0 0;
    background:linear-gradient(180deg,#9a6a3c,#7c5230); border:3px solid #5e3d22; box-shadow:0 4px 8px rgba(0,0,0,.2);}
  .rb-door:after{content:""; position:absolute; top:46%; inset-inline-end:6px; width:6px; height:6px; border-radius:50%; background:#ffd166;}
  .rb-exit{position:absolute; top:28px; inset-inline-start:56px; background:#2f9e57; color:#fff; font-weight:900;
    font-size:.66rem; padding:2px 8px; border-radius:3px; letter-spacing:1px; border:1px solid #1d6f3b;
    box-shadow:0 0 8px rgba(70,220,120,.6);}
  .rb-machine{position:absolute; top:50px; inset-inline-end:50px; width:72px; height:58px; border-radius:8px;
    background:linear-gradient(180deg,#b8c6d2,#8fa1b0); border:3px solid #6f8290; box-shadow:0 4px 8px rgba(0,0,0,.18);}
  .rb-gauge{position:absolute; top:9px; left:50%; transform:translateX(-50%); width:24px; height:24px; border-radius:50%;
    background:radial-gradient(circle at 50% 60%, #eaf2f8, #b9c8d4); border:3px solid #6f8290;}
  .rb-gauge:after{content:""; position:absolute; left:50%; top:50%; width:2px; height:9px; background:#c0392b;
    transform-origin:bottom center; animation:needle 3s ease-in-out infinite;}
  @keyframes needle{0%,100%{transform:translate(-50%,-100%) rotate(-35deg);} 50%{transform:translate(-50%,-100%) rotate(40deg);}}
  .rb-led{position:absolute; bottom:9px; width:8px; height:8px; border-radius:50%;}
  .rb-led.l1{left:13px; background:#ff6b6b; animation:led 1.1s infinite;}
  .rb-led.l2{left:32px; background:#ffd166; animation:led 1.4s .3s infinite;}
  .rb-led.l3{left:51px; background:#5fd081; animation:led .9s .15s infinite;}
  @keyframes led{0%,100%{opacity:.3;} 50%{opacity:1; box-shadow:0 0 6px rgba(255,255,255,.7);}}
  .rb-gear{position:absolute; opacity:.5; animation:spin 9s linear infinite;}
  .rb-pipe2{position:absolute; top:18px; inset-inline-end:8px; width:8px; height:96px; border-radius:0 0 4px 4px;
    background:linear-gradient(90deg,#d4dee6,#9fb0bd);}
  .rb-lamp{position:absolute; top:0; left:50%; transform:translateX(-50%); width:2px; height:16px; background:#6f8290;}
  .rb-lamp:after{content:""; position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:30px; height:15px; border-radius:5px 5px 16px 16px; background:linear-gradient(180deg,#dfe8ee,#9fb0bd);
    box-shadow:0 16px 28px 12px rgba(255,221,140,.42);}
  .rb-window{position:absolute; top:22px; left:50%; transform:translateX(-50%); width:90px; height:54px; border-radius:6px; overflow:hidden;
    background:linear-gradient(180deg,#bfe3ff,#e8f6ff); border:4px solid #8fa1b0;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.4), 0 3px 6px rgba(0,0,0,.15);}
  .rb-window:before{content:""; position:absolute; left:0; right:0; top:50%; height:3px; background:#8fa1b0;}
  .rb-window:after{content:""; position:absolute; top:0; bottom:0; left:50%; width:3px; background:#8fa1b0;}
  .rb-cloud{position:absolute; top:9px; left:12px; width:30px; height:12px; background:#fff; border-radius:999px;
    box-shadow:13px 4px 0 -2px #fff; opacity:.9; animation:cloudDrift 13s linear infinite;}
  @keyframes cloudDrift{0%{transform:translateX(-14px);} 100%{transform:translateX(64px);}}
  .rb-console{position:absolute; top:108px; inset-inline-end:46px; width:80px; height:16px; border-radius:5px;
    background:linear-gradient(180deg,#9fb0bd,#73838f); border:2px solid #5c6b76; display:flex; align-items:center; gap:6px; padding:0 8px;}
  .rb-console span{width:8px; height:8px; border-radius:2px; background:#cfd9e0; box-shadow:0 0 4px rgba(255,255,255,.4);}
  .rb-console span:nth-child(2){background:#5fd081;}
  .rb-bolt{position:absolute; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #eef3f7, #8a9aa6); box-shadow:0 1px 1px rgba(0,0,0,.3);}
  /* foreground props (in front of the belt, behind the customer) */
  .rb-hazard{position:absolute; left:0; right:0; bottom:0; height:9px; z-index:3; pointer-events:none;
    background:repeating-linear-gradient(45deg,#f4c430 0 12px,#2b2b2b 12px 24px); opacity:.85;}
  .rb-crates{position:absolute; bottom:9px; inset-inline-end:6px; z-index:3; width:74px; height:62px; pointer-events:none;}
  .rb-crate{position:absolute; width:34px; height:30px; border-radius:4px;
    background:linear-gradient(180deg,#c98f53,#9a6a3c); border:2px solid #6e4824;
    box-shadow:0 3px 5px rgba(0,0,0,.25), inset 0 0 0 2px rgba(255,255,255,.10);}
  .rb-crate:before{content:""; position:absolute; left:0; right:0; top:46%; height:2px; background:#6e4824;}
  .rb-crate:after{content:""; position:absolute; left:46%; top:6%; bottom:6%; width:2px; background:#6e4824;}

  /* ---------- Player's robot, standing by the belt near the buttons ---------- */
  .mascot-play{
    position:absolute; bottom:0; inset-inline-start:6px; width:5.4rem; height:5.4rem; z-index:5;
    transform-origin:50% 100%; animation:botIdle 7s ease-in-out infinite;
  }
  .mascot-play .bot{width:100%; height:100%;}
  /* periodically leans up to glance at the customer at the far end */
  @keyframes botIdle{0%,40%,72%,100%{transform:rotate(0) translateY(0);} 50%,64%{transform:rotate(6deg) translateY(-3px);}}
  .mascot-play.press{animation:botPress .42s ease;}
  @keyframes botPress{0%{transform:translateY(0) rotate(0);} 38%{transform:translateY(4px) rotate(3deg);} 100%{transform:translateY(0) rotate(0);}}
  /* the robot's arm: a tube anchored at its shoulder that extends to the tapped
     button (hand on the far tip), then retracts. width/opacity are animated. */
  .robot-arm{position:fixed; z-index:61; height:13px; border-radius:8px; transform-origin:0 50%;
    pointer-events:none; box-shadow:0 2px 3px rgba(0,0,0,.22), inset 0 1px 1px rgba(255,255,255,.35);
    transition:width .5s ease-out, opacity .5s ease-out;}
  .robot-arm .ra-hand{position:absolute; left:100%; top:50%; line-height:0;}

  /* customer standing at the far end of the belt (clickable / pokeable) */
  .cust-slot{position:absolute; top:52px; left:0; right:0; display:flex; justify-content:center; z-index:4;}
  .customer{width:5.2rem; height:5.2rem; line-height:1; cursor:pointer; animation:custIn .5s ease both;}
  .customer .creature{width:100%; height:100%; display:block; overflow:visible; transform-origin:50% 92%; animation:sway 3.2s ease-in-out infinite;}
  .customer.hop .creature{animation:hop .55s ease;}
  .customer.poked .creature{animation:poke .5s ease;}
  .creature .eye{transform-box:fill-box; transform-origin:center; animation:blink 4.2s infinite;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);} 96%{transform:scaleY(.12);}}
  @keyframes sway{0%,100%{transform:rotate(-2.5deg);} 50%{transform:rotate(2.5deg);}}
  @keyframes poke{0%{transform:scale(1,1);} 22%{transform:scale(1.2,.8) rotate(-4deg);} 52%{transform:scale(.88,1.12) rotate(4deg);} 78%{transform:scale(1.05,.96);} 100%{transform:scale(1,1);}}
  @keyframes custIn{from{opacity:0; transform:translateY(-14px) scale(.82);} to{opacity:1; transform:none;}}
  .poke-react{font-size:1.5rem; animation:pokeReact .6s ease forwards;}
  @keyframes pokeReact{0%{transform:translateY(0) scale(.5); opacity:0;} 30%{transform:translateY(-14px) scale(1.2); opacity:1;} 100%{transform:translateY(-32px) scale(1); opacity:0;}}

  .bubble{
    position:absolute; top:10px; inset-inline-start:10px; max-width:42%; z-index:5;
    background:#fff; border:3px solid var(--steel-2); border-radius:16px; padding:9px 13px;
    font-size:1rem; font-weight:800; display:flex; align-items:center; gap:7px; flex-wrap:wrap;
    box-shadow:0 4px 0 rgba(0,0,0,.08);
  }
  .bubble:after{content:""; position:absolute; bottom:-12px; inset-inline-start:24px; border:7px solid transparent; border-top-color:#fff;}
  .bubble b{color:var(--accent-deep); unicode-bidi:isolate; font-size:1.2rem;}

  /* ---------- Order ticket: still-needed sign on the wall ---------- */
  .ticket{
    position:absolute; top:10px; inset-inline-end:10px; z-index:5; text-align:center;
    background:#fff; border:3px dashed var(--teal); border-radius:14px; padding:6px 14px 8px;
    box-shadow:0 4px 0 rgba(0,0,0,.08);
  }
  .ticket .tk-label{display:block; font-size:.82rem; font-weight:800; color:var(--ink-soft);}
  .ticket .need-num{display:block; font-size:2.2rem; font-weight:900; color:var(--accent-deep); line-height:1; letter-spacing:1px;}
  .ticket.done{border-color:var(--good);}
  .ticket.done .need-num{color:var(--good);}

  /* ---------- Crate: the balls the customer has collected (readable) ---------- */
  .crate{
    position:absolute; top:150px; left:50%; transform:translateX(-50%); z-index:4;
    width:min(80%,440px); min-height:84px; padding:8px 10px 10px;
    display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:center; gap:6px 10px;
    background:rgba(255,255,255,.55); border:2px solid rgba(255,255,255,.7); border-radius:14px;
    box-shadow:0 6px 16px rgba(0,0,0,.16);
  }
  .crate .cart-empty{color:#33444f; font-size:.92rem; align-self:center; opacity:.75;}
  .crate .cart-grp{display:inline-flex; align-items:flex-end; gap:3px; position:relative;}
  .crate .xbadge{font-weight:900; font-size:.9rem; color:var(--ink); align-self:center; margin-inline-start:2px;}
  .crate .blk{animation:pop .35s ease both;}
  /* cart block sizes are tuned so a stack of ten 10-rods reads like one 100-flat */
  .crate .blk.flat{width:50px; height:50px;}
  .crate .blk.cube{--cs:46px;}
  .crate .blk.unit{width:14px; height:14px;}
  /* a stack of 10-rods, framed as one box — at ten high it matches a 100-flat */
  .rod-stack{
    display:inline-flex; flex-direction:column-reverse; width:50px; vertical-align:bottom;
    border:3px solid var(--wood); border-radius:4px; overflow:hidden; background:var(--frame);
    box-shadow:0 3px 5px rgba(0,0,0,.18), inset 0 0 0 1px var(--wood-dark); animation:pop .35s ease both;
  }
  .rod-stack .rline{
    width:100%; height:5px; background-color:var(--frame); background-size:10% 100%;
    background-image:
      radial-gradient(circle at 36% 30%, rgba(255,255,255,.78) 0 13%, rgba(255,255,255,0) 31%),
      radial-gradient(circle, var(--ball) 0 40%, rgba(0,0,0,.28) 45%, rgba(0,0,0,0) 48%);
  }

  /* ---------- Base-10 blocks (the heart of the game) ---------- */
  .blk{display:inline-block; vertical-align:middle;}
  /* unit = a single shiny ball */
  .blk.unit{
    width:30px; height:30px; border-radius:50%; position:relative; overflow:hidden;
    background-color:var(--ball);
    box-shadow:inset -3px -4px 6px rgba(0,0,0,.30), inset 3px 3px 6px rgba(255,255,255,.40), 0 2px 3px rgba(0,0,0,.2);
  }
  .blk.unit::after{content:""; position:absolute; left:20%; top:13%; width:30%; height:26%; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 75%);}
  .blk.unit.big{width:46px; height:46px;}
  .pat-stripe{background-image:repeating-linear-gradient(50deg, rgba(0,0,0,.20) 0 15%, rgba(255,255,255,.16) 15% 30%);}
  .pat-dot{background-image:radial-gradient(rgba(255,255,255,.65) 22%, transparent 24%); background-size:40% 40%;}
  .pat-swirl{background-image:conic-gradient(from 0deg, rgba(255,255,255,.32), rgba(0,0,0,.18), rgba(255,255,255,.32), rgba(0,0,0,.18), rgba(255,255,255,.32));}
  .pat-ring{background-image:radial-gradient(transparent 35%, rgba(255,255,255,.5) 37% 47%, transparent 49%);}
  .pat-solid{}

  /* shared ball-grid fill used by rod / flat / cube faces.
     background-clip:padding-box keeps the 10-ball grid (sized to the padding box)
     from bleeding under the frame as partial dots. */
  .blk.rod, .blk.flat, .face{
    background-color:var(--frame);
    background-clip:padding-box;
    background-image:
      radial-gradient(circle at 36% 30%, rgba(255,255,255,.78) 0 13%, rgba(255,255,255,0) 31%),
      radial-gradient(circle, var(--ball) 0 40%, rgba(0,0,0,.28) 45%, rgba(0,0,0,0) 48%);
  }
  /* rod = a bundled line of 10 balls, in a wooden frame */
  .blk.rod{
    width:104px; height:16px; border-radius:4px; background-size:10% 100%;
    border:3px solid var(--wood);
    box-shadow:0 2px 3px rgba(0,0,0,.2), inset 0 0 0 1px var(--wood-dark);
  }
  /* flat = a box of 10x10 = 100 balls, in a wooden frame */
  .blk.flat{
    width:74px; height:74px; border-radius:4px; background-size:10% 10%;
    border:4px solid var(--wood);
    box-shadow:0 3px 5px rgba(0,0,0,.22), inset 0 0 0 1px var(--wood-dark);
  }
  /* cube = a rotating 3-D stack of 10x10x10 = 1000 balls */
  .blk.cube{--cs:64px; width:var(--cs); height:var(--cs); perspective:260px;}
  .blk.cube .cube-inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; animation:spinCube 7s linear infinite;}
  .blk.cube .face{
    position:absolute; left:0; top:0; width:var(--cs); height:var(--cs);
    background-size:10% 10%; border:3px solid var(--wood); border-radius:3px;
  }
  .face.front{transform:translateZ(calc(var(--cs)/2));}
  .face.back{transform:rotateY(180deg) translateZ(calc(var(--cs)/2));}
  .face.right{transform:rotateY(90deg) translateZ(calc(var(--cs)/2)); filter:brightness(.86);}
  .face.left{transform:rotateY(-90deg) translateZ(calc(var(--cs)/2)); filter:brightness(.86);}
  .face.top{transform:rotateX(90deg) translateZ(calc(var(--cs)/2)); filter:brightness(1.12);}
  .face.bottom{transform:rotateX(-90deg) translateZ(calc(var(--cs)/2)); filter:brightness(.7);}
  @keyframes spinCube{from{transform:rotateX(-22deg) rotateY(-28deg);} to{transform:rotateX(-22deg) rotateY(332deg);}}

  /* ---------- Dispensers (serve buttons) ---------- */
  .dispensers{
    display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:18px 2px 4px;
  }
  .disp{
    position:relative; cursor:pointer; border:none; font-family:inherit;
    background:linear-gradient(180deg,#ffffff,#eef4f9); border-radius:20px;
    box-shadow:var(--shadow), inset 0 0 0 3px rgba(255,255,255,.5);
    padding:12px 8px 10px; display:flex; flex-direction:column; align-items:center; gap:8px;
    min-height:128px; justify-content:center; transition:transform .08s ease, filter .15s;
  }
  .disp:active{transform:translateY(3px);}
  .disp:hover{filter:brightness(1.03);}
  .disp .disp-blk{display:flex; align-items:center; justify-content:center; min-height:74px;}
  .disp .disp-num{font-size:1.5rem; font-weight:900; color:var(--ink); background:#fff;
    border-radius:999px; padding:2px 16px; box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .disp.off{opacity:.34; filter:grayscale(.7); pointer-events:none;}
  .disp.flash{animation:dispflash .3s ease;}
  @keyframes dispflash{0%{transform:scale(1);}45%{transform:scale(.93);}100%{transform:scale(1);}}
  @media (min-width:520px){ .dispensers{grid-template-columns:repeat(var(--ncols,4),1fr);} }

  /* ---------- Level select ---------- */
  .select-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .lang-pill{
    background:#fff; border:none; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.05rem; white-space:nowrap;
    font-family:inherit; color:inherit; cursor:pointer;
  }
  .lang-pill:active{transform:translateY(2px);}
  .grid-levels{display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px;}
  .level-card{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:14px 10px;
    text-align:center; cursor:pointer; border:3px solid transparent; transition:transform .1s;
  }
  .level-card:active{transform:translateY(2px);}
  .level-card .lc-emoji{font-size:2.6rem;}
  .level-card .lc-name{font-weight:900; margin:4px 0 2px;}
  .level-card .lc-world{font-size:.78rem; color:var(--ink-soft); min-height:1.6em;}
  .level-card .lc-stars{font-size:1.1rem; letter-spacing:2px; margin-top:6px;}
  .level-card.locked{opacity:.55; cursor:not-allowed; background:#eef2f5;}
  .level-card.locked .lc-emoji{filter:grayscale(1);}
  .world-label{grid-column:1/-1; font-weight:900; color:var(--ink-soft); margin:8px 2px 0; font-size:1rem;}

  /* ---------- Complete screen ---------- */
  .complete{text-align:center; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:26px 18px; margin-top:30px;}
  .complete h2{font-size:2rem; color:var(--accent-deep); margin:4px 0 8px;}
  .stars-big{font-size:3.4rem; letter-spacing:8px; height:1.4em;}
  .stars-big .s{display:inline-block; opacity:.25;}
  .stars-big .s.on{opacity:1; animation:pop .5s ease both;}
  .reward-line{font-size:1.3rem; font-weight:800; margin:10px 0 18px;}
  .complete .btn{margin:6px;}

  /* ---------- FX ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .confetti{position:absolute; font-size:1.6rem; animation:confetti-fall linear forwards;}
  .fly-coin{position:fixed; font-size:1.6rem; z-index:60; pointer-events:none; animation:fly-coin .7s ease-in forwards;}
  .fly-blk{position:fixed; z-index:60; pointer-events:none; animation:fly-blk .72s cubic-bezier(.45,0,.6,1) forwards;}

  /* ---------- Keyframes ---------- */
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
  @keyframes spin{from{transform:rotate(0);} to{transform:rotate(360deg);}}
  @keyframes pop{0%{transform:scale(.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);}}
  @keyframes hop{0%,100%{transform:translateY(0);} 30%{transform:translateY(-26px) rotate(-6deg);} 60%{transform:translateY(0) rotate(4deg);}}
  @keyframes confetti-fall{from{transform:translateY(-30px) rotate(0);} to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}
  @keyframes fly-coin{from{transform:translate(-50%,-50%) scale(1); opacity:1;} to{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.4); opacity:0;}}
  @keyframes fly-blk{from{transform:translate(-50%,-50%) scale(1); opacity:1;} 70%{opacity:1;} to{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.5); opacity:.55;}}

  @media (max-width:480px){
    .customer{width:4.6rem; height:4.6rem;}
    .bubble{font-size:1rem;}
    .ticket .need-num{font-size:2.5rem;}
    .disp{min-height:118px;}
  }

  /* ---------- Cosmetics customizer (overlay) ---------- */
  .cz-wrap{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:rgba(20,30,40,.45); padding:16px;}
  .cz-wrap.open{display:flex; animation:fade .25s ease both;}
  .cz-card{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; max-width:380px; width:100%; max-height:90vh; overflow:auto; text-align:center;}
  .cz-title{font-weight:900; font-size:1.4rem; margin:2px 0 6px; color:var(--accent-deep);}
  .cz-preview{display:flex; justify-content:center; align-items:flex-end; height:120px; margin:4px 0 10px;}
  .cz-preview .mascot{animation:none; width:120px; height:120px;}
  .cz-row{margin:12px 0; text-align:start;}
  .cz-label{font-weight:800; font-size:.95rem; margin-bottom:7px; color:var(--ink);}
  .cz-opts{display:flex; flex-wrap:wrap; gap:9px;}
  .cz-sw{width:38px; height:38px; border-radius:50%; border:3px solid #fff; cursor:pointer; padding:0; box-shadow:0 0 0 2px rgba(0,0,0,.14); transition:transform .08s;}
  .cz-sw:active{transform:scale(.92);}
  .cz-sw.sel{box-shadow:0 0 0 3px var(--ink);}
  .cz-done{margin-top:10px;}
</style>
</head>

<script>
"use strict";

/* =========================================================
   Ball Factory — single-file kids' place-value game
   A customer orders X balls; serve them with 1 / 10 / 100 / 1000
   dispensers drawn as base-10 blocks. Tweak LEVELS to change difficulty.
   ========================================================= */

// ----- Level configuration (data-driven) -----
// denoms: which dispensers are available. min/max: order size range. orders: customers.
const LEVELS = [
  // ---- Tens Town : ones + tens ----
  {nameKey:"l_firstShift", worldKey:"w_tens", emoji:"🔟", denoms:[1,10],          min:5,    max:29,   orders:5},
  {nameKey:"l_tenTime",    worldKey:"w_tens", emoji:"🔟", denoms:[1,10],          min:12,   max:59,   orders:5},
  {nameKey:"l_fullCrates", worldKey:"w_tens", emoji:"🔟", denoms:[1,10],          min:24,   max:99,   orders:6},
  // ---- Hundred Heights : + hundreds ----
  {nameKey:"l_boxItUp",    worldKey:"w_hund", emoji:"💯", denoms:[1,10,100],      min:60,   max:299,  orders:5},
  {nameKey:"l_bigOrders",  worldKey:"w_hund", emoji:"💯", denoms:[1,10,100],      min:150,  max:599,  orders:6},
  {nameKey:"l_hundredPro", worldKey:"w_hund", emoji:"💯", denoms:[1,10,100],      min:240,  max:999,  orders:6},
  // ---- Thousand Tower : + thousands (rotating cube) ----
  {nameKey:"l_megaCube",   worldKey:"w_thou", emoji:"🧊", denoms:[1,10,100,1000], min:600,  max:2999, orders:5},
  {nameKey:"l_warehouse",  worldKey:"w_thou", emoji:"🧊", denoms:[1,10,100,1000], min:1500, max:5999, orders:6},
  {nameKey:"l_factoryBoss",worldKey:"w_thou", emoji:"🧊", denoms:[1,10,100,1000], min:2400, max:9999, orders:7},
];

// ----- String table (i18n). Add a language by adding another block. -----
const I18N = {
  en:{
    dir:"ltr", langName:"English", langPill:"🇬🇧 EN", changeLang:"Change language",
    title:"Ball Factory",
    tagline:"Fill the orders by counting in 1s, 10s & 100s!",

    l_boxItUp:"Box It Up", l_bigOrders:"Big Orders", l_hundredPro:"Hundreds Pro",
    l_megaCube:"Mega Cube", l_warehouse:"Warehouse", l_factoryBoss:"Factory Boss",
  },
  he:{
    dir:"rtl", langName:"עברית", langPill:"🇮🇱 עב", changeLang:"החלף שפה",
    title:"מפעל הכדורים",
    tagline:"ממלאים הזמנות וסופרים ביחידות, עשרות ומאות!",

    shiftDone:"המשמרת הסתיימה!",
    ordersUp:"כל ההזמנות מולאו! 🎉",
    factoryBoss:"אתם מנהלי המפעל! 🏆",
    coins:"מטבעות",
    perfectAll:"אריזה מושלמת בכל ההזמנות! 📦",
    perfectPacks:"אריזות מושלמות",
    next:"הבא ◀",
    replay:"שוב ↻",
    map:"🏠 מפה",
    resetConfirm:"להתחיל מחדש? כל הכוכבים והמטבעות יימחקו.",
    resetDone:"המפעל אופס! 🧹",
    w_tens:"עיר העשרות", w_hund:"גבעת המאות", w_thou:"מגדל האלפים",
    l_firstShift:"משמרת ראשונה", l_tenTime:"זמן עשרות", l_fullCrates:"ארגזים מלאים",
    l_boxItUp:"לארוז בקופסה", l_bigOrders:"הזמנות גדולות", l_hundredPro:"אלופי המאות",
    l_megaCube:"קובייה ענקית", l_warehouse:"מחסן", l_factoryBoss:"מנהל המפעל",
  },
};
const DEFAULT_LANG = "he";

function t(key){
  const L = I18N[save.lang] || I18N[DEFAULT_LANG];
  if(L && L[key]!=null) return L[key];
  if(I18N.en[key]!=null) return I18N.en[key];
  return key;
}
function packsText(perfect, total){
  return perfect===total ? t("perfectAll") : `${perfect}/${total} ${t("perfectPacks")}`;
}

// ----- Order ball styles: each customer asks for a distinct colour + pattern -----
const BALL_COLORS = ["#ff7aa2","#ff9d4d","#ffd43b","#7ed957","#39c2b4","#4d9bff","#9b6bff","#ff6b6b","#36c6e0","#f368c8"];
const BALL_PATTERNS = ["solid","stripe","dot","swirl","ring"];

// ----- Customers: a procedurally varied factory-themed cast (robots / aliens / monsters) -----
//   kind: "robot" | "alien" | "monster"; shape: "round" | "box"; eyes: 1|2|3; top: "antenna"|"horns"|"bolt"|"none"
const CUSTOMERS = [
  {kind:"robot",   shape:"box",   body:"#9fb6c6", accent:"#ffd166", eyes:2, top:"antenna"},
  {kind:"robot",   shape:"box",   body:"#c0a4e0", accent:"#37c2b4", eyes:1, top:"bolt"},
  {kind:"robot",   shape:"round", body:"#7fcadf", accent:"#ff8a5b", eyes:2, top:"antenna"},
  {kind:"alien",   shape:"round", body:"#8fe388", accent:"#3a7a3a", eyes:3, top:"antenna"},
  {kind:"alien",   shape:"round", body:"#6fd0c0", accent:"#2f7a6e", eyes:1, top:"antenna"},
  {kind:"alien",   shape:"box",   body:"#a0e0ff", accent:"#2f6a8a", eyes:2, top:"bolt"},
  {kind:"monster", shape:"round", body:"#ff9ec2", accent:"#c2447a", eyes:2, top:"horns"},
  {kind:"monster", shape:"round", body:"#ffb877", accent:"#a85a1e", eyes:3, top:"horns"},
  {kind:"monster", shape:"box",   body:"#b6a0ff", accent:"#5e44b0", eyes:2, top:"horns"},
  {kind:"monster", shape:"round", body:"#7be0a8", accent:"#2f8a5a", eyes:1, top:"horns"},
  {kind:"robot",   shape:"box",   body:"#e0a4a4", accent:"#6a2f2f", eyes:2, top:"none"},
  {kind:"alien",   shape:"round", body:"#d6b8ff", accent:"#6e44b0", eyes:2, top:"antenna"},
  {kind:"monster", shape:"box",   body:"#9adcff", accent:"#2f6a8a", eyes:3, top:"horns"},
  {kind:"robot",   shape:"round", body:"#ffd28a", accent:"#a86a1e", eyes:2, top:"bolt"},
];

// Darken a #rrggbb colour (f<1) — used for limbs so they read against the body.
function shade(hex, f){
  f = f==null ? 0.82 : f;
  const n = parseInt(hex.slice(1),16);
  const r = Math.round(((n>>16)&255)*f), g = Math.round(((n>>8)&255)*f), b = Math.round((n&255)*f);
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// Build one customer SVG from a config: a little standing character with head,
// torso, arms (one waving) and legs. Eyes carry class "eye" so CSS blinks them.
function customerSVG(c){
  const st = "rgba(0,0,0,.18)";
  const dark = shade(c.body, 0.82);
  // top decoration (drawn before the head so it looks attached)
  let top = "";
  if(c.top==="antenna"){
    top = `<line x1="50" y1="16" x2="50" y2="5" stroke="#8895a0" stroke-width="3"/>`+
          `<circle cx="50" cy="4" r="4.5" fill="${c.accent}"/>`;
  }else if(c.top==="horns"){
    top = `<path d="M34 22 L28 3 L44 18 Z" fill="${c.accent}" stroke="${st}" stroke-width="2"/>`+
          `<path d="M66 22 L72 3 L56 18 Z" fill="${c.accent}" stroke="${st}" stroke-width="2"/>`;
  }else if(c.top==="bolt"){
    top = `<rect x="46" y="3" width="8" height="12" rx="2" fill="#8895a0"/>`+
          `<circle cx="50" cy="3" r="4.5" fill="${c.accent}"/>`;
  }
  // legs + feet (behind everything)
  const legs = `<rect x="40" y="78" width="7" height="15" rx="3.5" fill="${dark}"/>`+
               `<rect x="53" y="78" width="7" height="15" rx="3.5" fill="${dark}"/>`+
               `<ellipse cx="41" cy="94" rx="7" ry="3.4" fill="${c.accent}"/>`+
               `<ellipse cx="59" cy="94" rx="7" ry="3.4" fill="${c.accent}"/>`;

    return s;
  }catch(e){ return {...DEFAULT_SAVE, cosmetics:{...DEFAULT_COSMETICS}}; }
}

// ----- Runtime state -----
const state = {
  levelIndex:0,
  orderIndex:0,
  remaining:0,
  shownRemaining:0,
  remRAF:0,
  target:0,
  ball:null,         // {color, pattern}
  served:null,       // {denom: count}
  taps:0,
  optimal:0,
  orderDone:false,
  perfectOrders:0,
  levelCoins:0,
  orderResults:[],   // per-order: "perfect" | "ok"
};

// ----- Tunables -----
const BASE_COINS = 10;
const PERFECT_BONUS = 8;

// ----- Helpers -----
const $ = sel => document.querySelector(sel);
const randInt = (lo,hi) => lo + Math.floor(Math.random()*(hi-lo+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// Fewest serves to reach a target with the available denominations (greedy on powers of ten).
function optimalServes(target, denoms){
  const ds = [...denoms].sort((a,b)=>b-a);
  let n = target, taps = 0;
  for(const d of ds){ taps += Math.floor(n/d); n %= d; }
  return taps;
}

// =========================================================
//  Audio engine — synthesized SFX + ambient music (no files)
// =========================================================
let audioCtx = null, sfxBus = null, musicBus = null, fxDelay = null;
const midi = m => 440 * Math.pow(2, (m - 69) / 12);
function audio(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  try{ audioCtx = new AC(); }catch(e){ return null; }
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 26; comp.ratio.value = 3.5;
  comp.attack.value = 0.004; comp.release.value = 0.25; comp.connect(audioCtx.destination);
  fxDelay = audioCtx.createDelay(0.5); fxDelay.delayTime.value = 0.17;
  const fb = audioCtx.createGain(); fb.gain.value = 0.24;
  const wet = audioCtx.createGain(); wet.gain.value = 0.45;
  fxDelay.connect(fb); fb.connect(fxDelay); fxDelay.connect(wet); wet.connect(comp);
  sfxBus = audioCtx.createGain(); sfxBus.gain.value = 0.85; sfxBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 0.0001; musicBus.connect(comp);
  return audioCtx;
}
function audioReady(){ const c = audio(); if(c && c.state === "suspended") c.resume(); return c; }
function tone(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const peak = o.gain != null ? o.gain : 0.15;
  const atk = o.attack != null ? o.attack : 0.012;
  const rel = o.release != null ? o.release : Math.min(dur, 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + atk);
  g.gain.setValueAtTime(peak, t0 + Math.max(atk, dur - rel));
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  let sink = g;
  if(o.cutoff){
    const lp = ctx.createBiquadFilter(); lp.type = o.filter || "lowpass";
    lp.frequency.value = o.cutoff; lp.Q.value = o.q != null ? o.q : 0.7;
    lp.connect(g); sink = lp;
  }
  for(const d of (o.fat ? [-6, 6] : [0])){
    const osc = ctx.createOscillator();
    osc.type = o.type || "sine";
    osc.frequency.setValueAtTime(o.freq, t0);
    if(o.glideTo) osc.frequency.exponentialRampToValueAtTime(o.glideTo, t0 + dur);
    osc.detune.value = (o.detune || 0) + d;
    osc.connect(sink); osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
}
function noise(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const data = buf.getChannelData(0);
  const curve = o.curve != null ? o.curve : 2;
  for(let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, curve);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = o.filter || "lowpass";
  filt.frequency.value = o.cutoff != null ? o.cutoff : 1200;
  filt.Q.value = o.q != null ? o.q : 0.8;
  const g = ctx.createGain(); g.gain.value = o.gain != null ? o.gain : 0.15;
  src.connect(filt); filt.connect(g); g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
  src.start(t0); src.stop(t0 + dur + 0.02);
}
function arp(root, intervals, opts){
  const o = opts || {};
  intervals.forEach((iv, i) => tone({
    freq: midi(root + iv), t: (o.t || 0) + i * (o.step != null ? o.step : 0.09),
    dur: o.dur != null ? o.dur : 0.3, type: o.type || "triangle",
    gain: o.gain != null ? o.gain : 0.13, attack: 0.006, release: 0.22,
    echo: true, fat: o.fat, cutoff: o.cutoff || 2600
  }));
}
function playSound(type){
  if(save.muted) return;
  if(type==="correct"){ arp(72,[0,4,7],{step:0.07,gain:0.12,dur:0.3,cutoff:3000}); }
  else if(type==="level"){ arp(60,[0,4,7,12,16,19],{step:0.1,gain:0.13,dur:0.4,fat:true}); }
  else if(type==="tap"){ tone({freq:660,dur:0.06,type:"triangle",gain:0.07,attack:0.003,release:0.05,cutoff:3000}); }
}
// A serve "clunk": pitch rises with the denomination so 1000 sounds beefier than 1.
function playServe(denom){
  if(save.muted) return;
  const step = Math.log10(denom);                 // 0,1,2,3
  noise({dur:0.08, gain:0.10, filter:"lowpass", cutoff:900+step*500, curve:2});
  tone({freq:300+step*120, dur:0.16, type:"triangle", gain:0.10, attack:0.004, release:0.12, cutoff:2400, echo:true});
}
// A springy "boing" when the customer is poked.
function playPoke(){
  if(save.muted) return;
  tone({freq:360, glideTo:720, dur:0.15, type:"sine", gain:0.12, attack:0.005, release:0.12, cutoff:2200});
}

// Ambient music — brighter, mechanical-but-friendly loop.
const MUSIC = { tempo:118, root:60, wave:"square", vol:0.36,
  scale:[0,2,4,7,9], prog:[0,7,5,7], chord:[0,4,7], melodyAt:[1,3,4,6,7], shaker:true };
let musicTimer = null, musicBeat = 0, musicNextT = 0, musicPlaying = false;
function musicStep(at, eighth){
  const m = MUSIC, SPB = 8, step = musicBeat % SPB;
  const cr = m.root + m.prog[Math.floor(musicBeat / SPB) % m.prog.length];
  if(step === 0){
    tone({ at, freq: midi(cr - 12), dur: eighth * SPB * 0.92, type: "sine", gain: 0.085, attack: 0.05, release: 0.7, bus: musicBus });
    m.chord.forEach((iv, k) => tone({ at: at + k * 0.012, freq: midi(cr + iv), dur: eighth * SPB * 0.96, type: m.wave, gain: 0.03, attack: 0.3, release: 0.9, fat: true, cutoff: 1700, bus: musicBus }));
  } else if(step === 4){
    tone({ at, freq: midi(cr - 12), dur: eighth * 3, type: "sine", gain: 0.055, attack: 0.04, release: 0.4, bus: musicBus });
  }
  if(m.melodyAt.includes(step) && Math.random() < 0.68){
    const deg = m.scale[Math.floor(Math.random() * m.scale.length)] + (Math.random() < 0.25 ? 12 : 0);
    tone({ at, freq: midi(cr + 12 + deg), dur: 0.3, type: "triangle", gain: 0.05, attack: 0.006, release: 0.28, echo: true, cutoff: 3200, bus: musicBus });
  }
  if(m.shaker && step % 2 === 1) noise({ at, dur: 0.05, gain: 0.012, filter: "highpass", cutoff: 6000, curve: 1, bus: musicBus });
}
function musicTick(){
  const ctx = audioCtx; if(!ctx || !musicPlaying) return;
  const eighth = 60 / MUSIC.tempo / 2;
  while(musicNextT < ctx.currentTime + 0.12){ musicStep(musicNextT, eighth); musicNextT += eighth; musicBeat++; }
}
function startMusic(){
  if(musicPlaying || save.muted || !save.music) return;
  const ctx = audioReady(); if(!ctx) return;
  musicPlaying = true; musicBeat = 0; musicNextT = ctx.currentTime + 0.18;
  musicBus.gain.cancelScheduledValues(ctx.currentTime);
  musicBus.gain.setValueAtTime(0.0001, ctx.currentTime);
  musicBus.gain.exponentialRampToValueAtTime(MUSIC.vol, ctx.currentTime + 1.6);
  musicTimer = setInterval(musicTick, 25);
}
function stopMusic(){
  if(!musicPlaying) return;
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  const ctx = audioCtx; if(!ctx || !musicBus) return;
  const now = ctx.currentTime;
  musicBus.gain.cancelScheduledValues(now);
  musicBus.gain.setValueAtTime(Math.max(0.0001, musicBus.gain.value), now);
  musicBus.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
}
function maybeStartMusic(){ if(save.music && !save.muted) startMusic(); }
["pointerdown","keydown"].forEach(ev => window.addEventListener(ev, function k(){ audioReady(); maybeStartMusic(); }, { once:true }));
function refreshMusicBtn(){
  ["#music-btn-title","#music-btn-play"].forEach(sel => { const b = $(sel); if(b){ b.textContent = "🎵"; b.classList.toggle("is-off", !save.music); } });
}
function toggleMusic(){
  save.music = !save.music; persist(); refreshMusicBtn();
  if(save.music){ maybeStartMusic(); if(!save.muted) playSound("tap"); } else stopMusic();
}

// =========================================================
//  Base-10 block rendering (the visual heart of the game)

function patClass(){ return state.ball ? "pat-"+state.ball.pattern : "pat-solid"; }
function cubeFaces(){ return ["front","back","right","left","top","bottom"].map(f=>`<span class="face ${f}"></span>`).join(""); }
// denom -> HTML for the matching base-10 block. `extra` adds size classes (e.g. "sm", "big").
function blockHTML(denom, extra){
  extra = extra || "";
  if(denom>=1000) return `<span class="blk cube ${extra}"><span class="cube-inner">${cubeFaces()}</span></span>`;
  if(denom>=100)  return `<span class="blk flat ${extra}"></span>`;
  if(denom>=10)   return `<span class="blk rod ${extra}"></span>`;
  return `<span class="blk unit ${patClass()} ${extra}"></span>`;
}

function starString(n){ return "★★★".slice(0,n).padEnd(3,"☆"); }

// =========================================================
//  Playing a level
// =========================================================
function startLevel(i){
  state.levelIndex = i;
  state.orderIndex = 0;
  state.perfectOrders = 0;
  state.levelCoins = 0;
  state.orderResults = [];
  const lv = LEVELS[i];
  $("#play-level").innerHTML = `${t(lv.nameKey)}<small>${t(lv.worldKey)}</small>`;
  $("#dispensers").style.setProperty("--ncols", lv.denoms.length);
  showScreen("play");
  nextOrder();
}

function renderOrderDots(){
  const lv = LEVELS[state.levelIndex];
  const wrap = $("#order-dots");
  let html = "";
  for(let i=0;i<lv.orders;i++){
    let cls = "od";
    const r = state.orderResults[i];
    if(r==="perfect") cls += " perfect";
    else if(r==="ok") cls += " done";
    if(i===state.orderIndex) cls += " cur";
    html += `<span class="${cls}"></span>`;
  }
  wrap.innerHTML = html;
}

function nextOrder(){
  const lv = LEVELS[state.levelIndex];
  if(state.orderIndex >= lv.orders){ completeLevel(); return; }

  state.target = randInt(lv.min, lv.max);
  state.remaining = state.target;
  state.shownRemaining = state.target;
  state.ball = { color: pick(BALL_COLORS), pattern: pick(BALL_PATTERNS) };
  state.served = {};
  state.taps = 0;
  state.optimal = optimalServes(state.target, lv.denoms);
  state.orderDone = false;

  // share the order's ball colour with every block on the play screen (stage + dispensers)
  $("#screen-play").style.setProperty("--ball", state.ball.color);

  // top bar + progress
  $("#coins-play").textContent = "🪙 "+save.coins;
  $("#order-count").textContent = `${t("order")} ${state.orderIndex+1}/${lv.orders}`;
  renderOrderDots();

  // customer slides in
  const customer = $("#customer");
  customer.className = "customer";
  void customer.offsetWidth;
  customer.innerHTML = customerSVG(pick(CUSTOMERS));

  // speech bubble: "I'd like 234 balls!" with a sample ball
  $("#bubble").innerHTML =
    `<span>${t("idLike")}</span> <b dir="ltr">${state.target}</b> `+
    `${blockHTML(1,"big")} <span>${t("ballsWord")}!</span>`;

  // ticket + cart
  $("#ticket").classList.remove("done");
  $("#remaining").textContent = state.target;
  renderCart();
  renderDispensers();
}

function renderDispensers(){
  const lv = LEVELS[state.levelIndex];
  const wrap = $("#dispensers");
  wrap.innerHTML = "";
  // largest denomination first so the row reads 1000 · 100 · 10 · 1
  [...lv.denoms].sort((a,b)=>b-a).forEach(d=>{
    const b = document.createElement("button");
    b.className = "disp";
    b.type = "button";
    b.dataset.denom = d;
    b.setAttribute("aria-label", String(d));
    b.innerHTML = `<div class="disp-blk">${blockHTML(d)}</div><div class="disp-num">${d}</div>`;
    b.addEventListener("click", ()=>serve(d, b));
    wrap.appendChild(b);
  });
  updateDispensers();
}
function updateDispensers(){
  document.querySelectorAll("#dispensers .disp").forEach(b=>{
    const d = +b.dataset.denom;
    b.classList.toggle("off", d > state.remaining);
  });
}

// Cart: served blocks grouped by denomination (largest first). 10-rods are stacked
// into a framed box, so a full stack of ten reads just like a 100-flat.
function renderCart(){
  const cart = $("#cart");
  const denoms = Object.keys(state.served).map(Number).filter(d=>state.served[d]>0).sort((a,b)=>b-a);
  if(denoms.length===0){ cart.innerHTML = `<span class="cart-empty">${t("cartEmpty")}</span>`; return; }
  let html = "";
  denoms.forEach(d=>{
    const n = state.served[d];
    if(d===10){
      html += rodStackHTML(n);
    }else if(n<=8){
      html += `<span class="cart-grp">`+ blockHTML(d).repeat(n) +`</span>`;
    }else{
      html += `<span class="cart-grp">${blockHTML(d)}<span class="xbadge">×${n}</span></span>`;
    }
  });
  cart.innerHTML = html;
}
// 1..10 ten-rods stack into one framed box (ten high reads as a 100-flat). Past ten,
// a full box + "×N" would look like 100×N, so fall back to a single rod + "×N".
function rodStackHTML(n){
  if(n>10){
    return `<span class="cart-grp">${blockHTML(10)}<span class="xbadge">×${n}</span></span>`;
  }
  let lines = "";
  for(let i=0;i<n;i++) lines += `<span class="rline"></span>`;
  return `<span class="cart-grp"><span class="rod-stack">${lines}</span></span>`;
}

// Animate the still-needed number from its shown value down to `to`.
function setRemaining(to){
  const el = $("#remaining");
  const from = state.shownRemaining;
  const start = performance.now(), dur = 420;
  cancelAnimationFrame(state.remRAF);
  function step(now){
    const k = Math.min(1, (now-start)/dur);
    const e = 1 - Math.pow(1-k, 3);
    const v = Math.round(from + (to-from)*e);
    el.textContent = v; state.shownRemaining = v;
    if(k<1) state.remRAF = requestAnimationFrame(step);
    else { el.textContent = to; state.shownRemaining = to; }
  }
  state.remRAF = requestAnimationFrame(step);
}

// A block flies from the tapped dispenser into the cart.
function flyBlock(denom, fromEl){
  const r = fromEl.getBoundingClientRect();
  const cart = $("#cart").getBoundingClientRect();
  const sx = r.left + r.width/2, sy = r.top + r.height/2;
  const tx = cart.left + cart.width/2, ty = cart.top + cart.height/2;
  const f = document.createElement("div");
  f.className = "fly-blk";
  f.style.setProperty("--ball", state.ball.color);
  f.innerHTML = blockHTML(denom);
  f.style.left = sx+"px"; f.style.top = sy+"px";
  f.style.setProperty("--dx", (tx-sx)+"px");
  f.style.setProperty("--dy", (ty-sy)+"px");
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 760);
}

// A small robot hand/claw (tinted to the player's robot).
function handSVG(){
  const cz = save.cosmetics || DEFAULT_COSMETICS;
  const st = "rgba(0,0,0,.22)";
  return `<svg viewBox="0 0 44 44" width="40" height="40">`+
    `<rect x="18" y="22" width="8" height="20" rx="4" fill="#8895a0" stroke="${st}" stroke-width="1.5"/>`+
    `<circle cx="22" cy="18" r="12" fill="${cz.body}" stroke="${st}" stroke-width="2"/>`+
    `<circle cx="13" cy="13" r="4" fill="${cz.body}" stroke="${st}" stroke-width="1.5"/>`+
  `</svg>`;
}
// The robot reaches out: an arm anchored at its shoulder stretches all the way to the
// tapped button (hand on the tip), then retracts and fades.
function robotPress(btn){
  const robot = $("#play-robot");
  if(!robot) return;
  robot.classList.remove("press"); void robot.offsetWidth; robot.classList.add("press");
  setTimeout(()=>robot.classList.remove("press"), 440);

  const cz = save.cosmetics || DEFAULT_COSMETICS;
  const br = btn.getBoundingClientRect(), rr = robot.getBoundingClientRect();
  // anchor at the hand of the robot's inner arm (the one toward the belt), not its head
  const rtl = document.documentElement.dir === "rtl";
  const sx = rr.left + rr.width*(rtl ? 0.20 : 0.80);
  const sy = rr.top + rr.height*0.80;
  const bx = br.left + br.width/2,   by = br.top + br.height*0.4;      // hand target on button
  const len = Math.hypot(bx-sx, by-sy);
  const ang = Math.atan2(by-sy, bx-sx) * 180/Math.PI;

  const arm = document.createElement("div");
  arm.className = "robot-arm";
  arm.style.left = sx+"px";
  arm.style.top = (sy-6.5)+"px";
  arm.style.width = len+"px";
  arm.style.transform = `rotate(${ang}deg)`;
  arm.style.background = `linear-gradient(180deg, ${cz.body}, ${shade(cz.body,0.78)})`;
  // hand kept upright by counter-rotating it against the arm angle
  arm.innerHTML = `<span class="ra-hand" style="transform:translate(-50%,-50%) rotate(${-ang}deg)">${handSVG()}</span>`;
  document.body.appendChild(arm);
  requestAnimationFrame(()=>{ arm.style.width = "14px"; arm.style.opacity = "0"; });   // retract
  setTimeout(()=>arm.remove(), 540);
}

function serve(denom, btn){
  if(state.orderDone) return;
  if(denom > state.remaining) return;       // never over-serve
  state.taps++;
  btn.classList.remove("flash"); void btn.offsetWidth; btn.classList.add("flash");
  robotPress(btn);
  playServe(denom);
  flyBlock(denom, btn);

  state.remaining -= denom;
  state.served[denom] = (state.served[denom]||0) + 1;
  setRemaining(state.remaining);
  updateDispensers();
  setTimeout(renderCart, 620);              // block "lands" in the crate

  if(state.remaining === 0){
    state.orderDone = true;
    $("#ticket").classList.add("done");
    setTimeout(orderComplete, 950);
  }
}

function orderComplete(){
  const perfect = state.taps === state.optimal;
  if(perfect) state.perfectOrders++;
  state.orderResults[state.orderIndex] = perfect ? "perfect" : "ok";

  const earned = BASE_COINS + (perfect ? PERFECT_BONUS : 0);
  state.levelCoins += earned;
  save.coins += earned;
  persist();
  $("#coins-play").textContent = "🪙 "+save.coins;

  playSound("correct");
  $("#customer").classList.add("hop");
  flyCoins($("#cart"));
  sparkle();
  renderOrderDots();

  state.orderIndex++;
  setTimeout(nextOrder, 950);
}

// =========================================================
//  Level complete
// =========================================================
function completeLevel(){
  const i = state.levelIndex;
  const lv = LEVELS[i];
  const ratio = state.perfectOrders / lv.orders;
  const stars = ratio>=1 ? 3 : (ratio>=0.5 ? 2 : 1);

  save.starsByLevel[i] = Math.max(save.starsByLevel[i]||0, stars);
  if(i+1 <= LEVELS.length-1) save.unlockedLevel = Math.max(save.unlockedLevel, i+1);
  persist();

  const isLast = i >= LEVELS.length-1;
  $("#complete-title").textContent = isLast ? t("factoryBoss") : t("ordersUp");
  $("#complete-reward").textContent = `🪙 +${state.levelCoins} ${t("coins")}  •  ${packsText(state.perfectOrders, lv.orders)}`;

  const starEls = document.querySelectorAll("#complete-stars .s");
  starEls.forEach(s=>s.classList.remove("on"));
  showScreen("complete");
  starEls.forEach((s,idx)=>{ setTimeout(()=>{ if(idx<stars){ s.classList.add("on"); playSound("tap"); } }, 300+idx*250); });

  const nextBtn = $("#next-btn");
  if(isLast){ nextBtn.textContent = t("map"); nextBtn.onclick = ()=>showScreen("select"); }
  else{ nextBtn.textContent = t("next"); nextBtn.onclick = ()=>startLevel(i+1); }
  $("#replay-btn").onclick = ()=>startLevel(i);

  playSound("level");
  confetti();
}

// =========================================================
//  Visual FX
// =========================================================
function confetti(){
  const fx = $("#fx");
  const emojis = ["🎉","✨","⭐","🔵","🟢","🎊","🟠"];
  for(let i=0;i<40;i++){
    const c = document.createElement("div");
    c.className="confetti";
    c.textContent = pick(emojis);
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}
function sparkle(){
  const fx = $("#fx");
  const r = $("#cart").getBoundingClientRect();
  for(let i=0;i<10;i++){
    const s = document.createElement("div");
    s.className="confetti";
    s.textContent = pick(["✨","⭐","💫"]);
    s.style.left = (r.left + Math.random()*r.width)+"px";
    s.style.top = (r.top)+"px";
    s.style.animationDuration = "1s";
    fx.appendChild(s);
    setTimeout(()=>s.remove(), 1100);
  }
}
function flyCoins(fromEl){
  const r = fromEl.getBoundingClientRect();
  const target = $("#coins-play").getBoundingClientRect();
  for(let i=0;i<6;i++){
    const c = document.createElement("div");
    c.className="fly-coin";
    c.textContent="🪙";
    c.style.left=(r.left+r.width/2)+"px";
    c.style.top=(r.top+r.height/2)+"px";
    c.style.setProperty("--dx",(target.left - r.left + (Math.random()*30-15))+"px");
    c.style.setProperty("--dy",(target.top - r.top + (Math.random()*20-10))+"px");
    c.style.animationDelay=(i*0.05)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 800);
  }
}

// =========================================================
//  Mute toggle + wiring
// =========================================================
function refreshMute(){
  const icon = save.muted ? "🔇" : "🔊";
  $("#mute-btn-title").textContent = icon;
  $("#mute-btn-play").textContent = icon;
}
function toggleMute(){ save.muted=!save.muted; persist(); refreshMute(); if(save.muted){ stopMusic(); } else { playSound("tap"); maybeStartMusic(); } }

// =========================================================
//  Language (string table) — applies text + page direction
// =========================================================
function applyLanguage(){
  if(!I18N[save.lang]) save.lang = DEFAULT_LANG;
  const L = I18N[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{
    const label = t(el.dataset.i18nTitle);
    el.title = label; el.setAttribute("aria-label", label);
  });
  $("#lang-btn").textContent = I18N[save.lang==="he"?"en":"he"].langName;
  if($("#screen-select").classList.contains("active")) renderSelect();
}
function toggleLanguage(){ save.lang = (save.lang==="he"?"en":"he"); persist(); applyLanguage(); playSound("tap"); }

document.addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go) showScreen(go.getAttribute("data-go"));
});
$("#play-btn").addEventListener("click", ()=>{ playSound("tap"); showScreen("select"); });
$("#mute-btn-title").addEventListener("click", toggleMute);
$("#mute-btn-play").addEventListener("click", toggleMute);
$("#music-btn-title").addEventListener("click", toggleMusic);
$("#music-btn-play").addEventListener("click", toggleMusic);
$("#lang-btn").addEventListener("click", toggleLanguage);
$("#lang-pill-select").addEventListener("click", toggleLanguage);

// Poke the customer — a squash-and-stretch wobble + a little reaction symbol.
function pokeCustomer(){
  const c = $("#customer");
  if(!c || !c.firstChild) return;
  c.classList.remove("poked"); void c.offsetWidth; c.classList.add("poked");
  setTimeout(()=>c.classList.remove("poked"), 520);
  playPoke();
  const room = $("#room");
  if(room){
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:absolute; left:0; right:0; top:40px; display:flex; justify-content:center; z-index:6; pointer-events:none;";
    const r = document.createElement("div"); r.className = "poke-react";
    r.textContent = pick(["❗","😆","💢","✨","❓","😮","🤖"]);
    wrap.appendChild(r); room.appendChild(wrap);
    setTimeout(()=>wrap.remove(), 640);
  }
}
$("#customer").addEventListener("click", pokeCustomer);
$("#customer").addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); pokeCustomer(); } });
$("#reset-btn").addEventListener("click", ()=>{
  if(confirm(t("resetConfirm"))){
    const lang = save.lang;
    save = {...DEFAULT_SAVE, lang, cosmetics:{...save.cosmetics}};
    persist(); refreshMute(); applyCosmetics(); renderSelect();
    alert(t("resetDone"));
  }
});

// =========================================================
//  Ambient floating background (gears + bolts + balls)
// =========================================================
function buildBackground(){
  const bg = $("#bg");
  if(!bg) return;
  const tints = ["#cfe6ff","#d8f0e4","#ffe6c2","#e3dcff","#cdeefa"];
  const doodles = ["⚙️","🔩","🔵","🟢","🟠","🟣","🔧"];
  let html = "";
  for(let i=0;i<7;i++){
    const size = randInt(60,150);
    html += `<span class="blob" style="`+
      `left:${randInt(-4,96)}%; top:${randInt(-4,96)}%;`+
      `width:${size}px; height:${size}px; background:${pick(tints)};`+
      `animation-duration:${randInt(14,26)}s; animation-delay:-${randInt(0,12)}s;"></span>`;
  }
  for(let i=0;i<9;i++){
    html += `<span class="doodle" style="`+
      `left:${randInt(2,94)}%; top:${randInt(2,94)}%; font-size:${randInt(20,40)}px;`+
      `animation-duration:${randInt(16,30)}s; animation-delay:-${randInt(0,14)}s;">${pick(doodles)}</span>`;
  }
  bg.innerHTML = html;
}

// =========================================================
//  Cosmetics customizer (factory robot)
// =========================================================
const COSMETIC_OPTS = [
  {key:"body", labelKey:"cz_body",
    colors:["#9fb6c6","#c0a4e0","#7fcadf","#8fe388","#ffb877","#ff9ec2","#ffd28a","#b6a0ff","#e0a4a4","#ffffff"]},
  {key:"visor", labelKey:"cz_visor",
    colors:["#37c2b4","#ff8a5b","#ffd166","#4d9bff","#9b6bff","#ff6b6b","#5fbf6a","#f368c8"]},
];
function updateCzPreview(){ const p=$("#cz-preview"); if(p) p.innerHTML = robotSVG(save.cosmetics); }
function renderCustomizer(){
  updateCzPreview();
  const rows = $("#cz-rows");
  rows.innerHTML = "";
  COSMETIC_OPTS.forEach(cat=>{
    const cur = save.cosmetics[cat.key];
    const row = document.createElement("div"); row.className = "cz-row";
    const lbl = document.createElement("div"); lbl.className = "cz-label"; lbl.textContent = t(cat.labelKey);
    const opts = document.createElement("div"); opts.className = "cz-opts";
    cat.colors.forEach(val=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "cz-sw" + (cur===val?" sel":"");
      b.style.background = val;
      b.setAttribute("aria-label", val);
      b.addEventListener("click", ()=>setCosmetic(cat.key, val));
      opts.appendChild(b);
    });
    row.appendChild(lbl); row.appendChild(opts); rows.appendChild(row);
  });
}
function setCosmetic(key,val){ save.cosmetics[key]=val; persist(); applyCosmetics(); renderCustomizer(); playSound("tap"); }
function applyCosmetics(){
  const m=$("#mascot"); if(m) m.innerHTML = robotSVG(save.cosmetics);
  const p=$("#play-robot"); if(p) p.innerHTML = robotSVG(save.cosmetics);
}
function openCustomizer(){ renderCustomizer(); $("#cz").classList.add("open"); }
function closeCustomizer(){ $("#cz").classList.remove("open"); }

$("#customize-btn").addEventListener("click", ()=>{ playSound("tap"); openCustomizer(); });
$("#cz-done").addEventListener("click", ()=>{ playSound("tap"); closeCustomizer(); });
$("#cz").addEventListener("click", e=>{ if(e.target.id==="cz") closeCustomizer(); });

// init
buildBackground();
applyCosmetics();
refreshMute();
refreshMusicBtn();
applyLanguage();
</script>
</body>
</html>
