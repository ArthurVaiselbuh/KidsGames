<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>מילים מבולגנות 🔤 — בנו את המשפט!</title>
<style>
  /* ---------- Theme ---------- */
  :root{
    --paper:#fff8ef;
    --paper-2:#f3e9fb;
    --ink:#3a2c52;
    --ink-soft:#7a6a95;
    --grape:#8b5cf6;
    --grape-deep:#6d3edb;
    --pink:#ff8fab;
    --pink-deep:#f4628a;
    --sun:#ffd166;
    --mint:#7be0c0;
    --sky:#7cc6ff;
    --good:#5fbf6a;
    /* per-tier accent colours (set on the play screen via data-tier) */
    --accent:#8b5cf6;
    --accent-deep:#6d3edb;
    --shadow:0 6px 0 rgba(0,0,0,.12), 0 12px 24px rgba(0,0,0,.12);
    --radius:22px;
    font-size:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Baloo 2","Trebuchet MS",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 14% 12%, #fff 0 7%, transparent 8%),
      radial-gradient(circle at 84% 18%, #fff 0 5%, transparent 6%),
      linear-gradient(160deg, var(--paper-2), #fef3ff 50%, var(--paper));
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{
    max-width:820px;
    margin:0 auto;
    min-height:100%;
    padding:14px 16px 26px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
  }

  /* ---------- Ambient drifting-letters background ---------- */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  .drift{
    position:absolute; font-weight:900; color:var(--grape);
    opacity:.10; will-change:transform; user-select:none;
    animation:drift linear infinite;
  }
  @keyframes drift{
    from{transform:translateY(110vh) rotate(0);}
    to{transform:translateY(-20vh) rotate(var(--spin,180deg));}
  }

  /* ---------- Screens ---------- */
  .screen{display:none; animation:fade .35s ease both; flex:1; flex-direction:column;}
  .screen.active{display:flex;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit; font-weight:800; cursor:pointer; border:none;
    background:var(--grape); color:#fff; border-radius:var(--radius);
    padding:16px 26px; font-size:1.25rem; box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .btn:active{transform:translateY(3px);}
  .btn:hover{filter:brightness(1.05);}
  .btn.big{font-size:1.7rem; padding:20px 44px;}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .btn.green{background:var(--good);}
  .icon-btn{
    background:#fff; border:none; border-radius:50%; width:48px; height:48px;
    font-size:1.4rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.1);
  }
  .icon-btn:active{transform:translateY(2px);}
  .icon-btn.is-off{opacity:.4; filter:grayscale(1);}
  .mini-link{background:none; border:none; color:var(--ink-soft); text-decoration:underline; cursor:pointer; font-family:inherit; font-size:.95rem;}

  /* ---------- Title screen ---------- */
  .hero{text-align:center; padding:18px 6px 6px; margin:auto 0;}
  .logo{
    font-size:clamp(2.3rem,8.5vw,4rem); font-weight:900; line-height:1.05;
    color:var(--grape-deep); text-shadow:0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.12);
    margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:bob 2.2s ease-in-out infinite;}
  .tagline{font-size:1.15rem; color:var(--ink-soft); margin:0 0 16px;}
  /* a little jumbled-tile parade on the title */
  .title-tiles{display:flex; justify-content:center; gap:8px; margin:8px 0 18px; flex-wrap:wrap;}
  .title-tiles .wt{
    display:inline-block; padding:10px 14px; border-radius:14px; font-weight:900;
    font-size:1.3rem; color:#fff; box-shadow:var(--shadow);
    animation:bob 2.6s ease-in-out infinite;
  }
  .title-tiles .wt:nth-child(1){background:var(--pink);     transform:rotate(-5deg); animation-delay:0s;}
  .title-tiles .wt:nth-child(2){background:var(--sky);      transform:rotate(4deg);  animation-delay:.2s;}
  .title-tiles .wt:nth-child(3){background:var(--mint);     transform:rotate(-3deg); animation-delay:.4s; color:var(--ink);}
  .title-tiles .wt:nth-child(4){background:var(--sun);      transform:rotate(6deg);  animation-delay:.6s; color:var(--ink);}
  .title-actions{display:flex; flex-direction:column; align-items:center; gap:12px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .topbar .spacer{flex:1;}
  .level-tag{font-weight:900; font-size:1.05rem; text-align:center; line-height:1.1;}
  .level-tag small{display:block; font-weight:700; color:var(--ink-soft); font-size:.8rem;}
  .lang-pill{
    background:#fff; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.05rem; white-space:nowrap;
  }

  /* ---------- Progress row ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin:4px 2px 10px;}
  .round-count{font-weight:900; white-space:nowrap; font-size:1.05rem;}
  .bar{
    flex:1; height:18px; background:#fff; border-radius:999px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .bar-fill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--good), var(--sun));
    border-radius:999px; transition:width .3s ease;
  }

  /* ---------- Play board ---------- */
  .board{
    position:relative; flex:1; display:flex; flex-direction:column;
    background:linear-gradient(180deg, rgba(255,255,255,.7), rgba(255,255,255,.45));
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:16px 14px 20px; overflow:hidden;
  }
  .board-hint{
    text-align:center; font-weight:800; color:var(--ink-soft);
    font-size:1rem; min-height:1.4em; margin-bottom:8px;
  }

  /* the sentence line: empty slots that follow document direction (so Hebrew is RTL) */
  .slots{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center;
    min-height:70px; padding:10px; margin:0 auto 14px; max-width:680px;
  }
  .slot{
    min-width:60px; min-height:54px; border-radius:14px;
    border:3px dashed rgba(122,106,149,.4);
    background:rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .slot.over{   /* a tile is hovering over this landing pad */
    border-color:var(--pad, var(--accent)); background:rgba(139,92,246,.12);
    transform:scale(1.05);
  }
  .slot.hint{   /* gentle hint highlight for the correct word */
    border-color:var(--good); background:rgba(95,191,106,.18);
    animation:hintPulse 1.2s ease;
  }
  @keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(95,191,106,0);} 50%{box-shadow:0 0 0 5px rgba(95,191,106,.4);}}

  /* the jumble tray of loose tiles */
  .tray{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center;
    min-height:64px; padding:12px 10px; margin:0 auto; max-width:680px;
    border-radius:18px; background:rgba(139,92,246,.07);
    border:2px dashed rgba(139,92,246,.25);
  }
  .tray-label{
    text-align:center; font-weight:800; color:var(--ink-soft);
    font-size:.85rem; margin:14px 0 4px;
  }

  /* ---------- Word tiles (scrabble / bubble feel) ---------- */
  .tile{
    display:inline-flex; align-items:center; justify-content:center;
    padding:12px 16px; border-radius:14px;
    font-weight:900; font-size:1.4rem; color:#fff;
    background:var(--tile, var(--accent));
    box-shadow:0 5px 0 rgba(0,0,0,.18), 0 8px 14px rgba(0,0,0,.14);
    text-shadow:0 2px 0 rgba(0,0,0,.18);
    cursor:grab; user-select:none; touch-action:none;
    white-space:nowrap; line-height:1;
    transition:transform .12s ease, filter .12s;
  }
  .tile:active{cursor:grabbing;}
  /* Hebrew tiles carry nikud (vowel points) — give the glyphs a little vertical room
     so the marks above/below the letters aren't cramped or clipped. (LTR is untouched.) */
  [dir="rtl"] .tile{ line-height:1.5; padding-top:9px; padding-bottom:13px; }
  /* each tile gets a slight playful tilt + a colour from its index */
  .tile.c0{background:var(--pink);}
  .tile.c1{background:var(--sky);}
  .tile.c2{background:var(--mint);  color:var(--ink); text-shadow:0 2px 0 rgba(255,255,255,.4);}
  .tile.c3{background:var(--sun);   color:var(--ink); text-shadow:0 2px 0 rgba(255,255,255,.4);}
  .tile.c4{background:var(--grape);}
  .tile.c5{background:var(--pink-deep);}
  .tile.tilt-a{transform:rotate(-3deg);}
  .tile.tilt-b{transform:rotate(2.5deg);}
  .tile.tilt-c{transform:rotate(-1.5deg);}
  .tile.landing{animation:landPop .3s ease;}        /* snap-into-slot pop */
  .tile.dragging{visibility:hidden;}                 /* original hidden while ghost flies */
  .tile.wrong{animation:wobble .4s ease;}
  /* celebratory bob wave on a correct sentence (staggered via inline delay) */
  .tile.celebrate{animation:bobWave .6s ease;}
  @keyframes landPop{0%{transform:scale(.6);} 70%{transform:scale(1.12);} 100%{transform:scale(1);}}
  @keyframes bobWave{0%,100%{transform:translateY(0) rotate(0);} 40%{transform:translateY(-16px) rotate(-4deg);} 70%{transform:translateY(0) rotate(3deg);}}

  /* the floating "ghost" tile that follows the finger/cursor while dragging */
  #ghost{
    position:fixed; left:0; top:0; z-index:80; pointer-events:none;
    transform:translate(-50%,-50%) scale(1.08) rotate(-2deg);
    box-shadow:0 10px 0 rgba(0,0,0,.18), 0 16px 26px rgba(0,0,0,.22);
    display:none;
  }
  #ghost.on{display:inline-flex;}

  /* picture that pops up when a sentence is solved */
  .reveal-pic{
    text-align:center; font-size:3.4rem; min-height:1.2em; margin-top:6px;
  }
  .reveal-pic .em{display:inline-block; animation:pop .5s ease both;}

  .play-actions{display:flex; justify-content:center; gap:12px; margin-top:14px;}

  /* ---------- Level select ---------- */
  .select-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .grid-levels{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
  .level-card{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:14px 10px;
    text-align:center; cursor:pointer; border:3px solid transparent; transition:transform .1s;
  }
  .level-card:active{transform:translateY(2px);}
  .level-card .lc-emoji{font-size:2.6rem;}
  .level-card .lc-name{font-weight:900; margin:4px 0 2px;}
  .level-card .lc-sub{font-size:.82rem; color:var(--ink-soft); min-height:1.6em;}
  .level-card .lc-stars{font-size:1.1rem; letter-spacing:2px; margin-top:6px; color:var(--sun);}
  .level-card.locked{opacity:.55; cursor:not-allowed; background:#efeaf6;}
  .level-card.locked .lc-emoji{filter:grayscale(1);}
  .world-label{grid-column:1/-1; font-weight:900; color:var(--ink-soft); margin:8px 2px 0; font-size:1rem;}

  /* ---------- Complete screen ---------- */
  .complete{
    text-align:center; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 18px; margin:auto 0;
  }
  .complete h2{font-size:2rem; color:var(--grape-deep); margin:4px 0 8px;}
  .stars-big{font-size:3.4rem; letter-spacing:8px; height:1.4em; color:var(--sun);}
  .stars-big .s{display:inline-block; opacity:.25;}
  .stars-big .s.on{opacity:1; animation:pop .5s ease both;}
  .reward-line{font-size:1.3rem; font-weight:800; margin:10px 0 18px;}
  .complete .btn{margin:6px;}

  /* ---------- FX ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .confetti{position:absolute; font-size:1.6rem; animation:confetti-fall linear forwards;}

  /* ---------- Keyframes ---------- */
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);}}
  @keyframes pop{0%{transform:scale(.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);}}
  @keyframes wobble{0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px) rotate(-5deg);} 40%{transform:translateX(8px) rotate(5deg);} 60%{transform:translateX(-6px) rotate(-3deg);} 80%{transform:translateX(6px) rotate(3deg);}}
  @keyframes confetti-fall{from{transform:translateY(-30px) rotate(0);} to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}

  @media (max-width:480px){
    .tile{font-size:1.15rem; padding:10px 12px;}
    .slot{min-width:50px; min-height:48px;}
    .title-tiles .wt{font-size:1.05rem; padding:8px 11px;}
  }


  /* ---------- Cosmetics customizer (overlay) ---------- */
  .cz-wrap{position:fixed; inset:0; z-index:80; display:none; align-items:center;
    justify-content:center; background:rgba(30,20,55,.5); padding:16px;}
  .cz-wrap.open{display:flex;}
  .cz-card{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px; max-width:380px; width:100%; max-height:90vh; overflow:auto; text-align:center;}
  .cz-title{font-weight:900; font-size:1.4rem; margin:2px 0 8px; color:var(--accent-deep);}
  .cz-preview{display:flex; justify-content:center; gap:8px; margin:6px 0 12px;}
  .cz-preview .tile{cursor:default;}
  .cz-row{margin:12px 0; text-align:start;}
  .cz-label{font-weight:800; font-size:.95rem; margin-bottom:7px; color:var(--ink);}
  .cz-opts{display:flex; flex-wrap:wrap; gap:9px;}
  .cz-sw{width:38px; height:38px; border-radius:50%; border:3px solid #fff; cursor:pointer;
    padding:0; box-shadow:0 0 0 2px rgba(0,0,0,.14); transition:transform .08s;}
  .cz-sw:active{transform:scale(.92);}
  .cz-sw.sel{box-shadow:0 0 0 3px var(--ink);}
  .cz-sw.auto{background:conic-gradient(#ff8fab,#ffd166,#5fbf6a,#4bb6e8,#8b5cf6,#ff8fab);}
  .cz-done{margin-top:10px;}
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<div id="app">

  <!-- ============ TITLE ============ -->
  <section class="screen active" id="screen-title">
    <div class="hero">
      <div class="logo"><span class="em">🔤</span> <span data-i18n="title">Chaos Words</span> <span class="em">✨</span></div>
      <p class="tagline" data-i18n="tagline">Drag the mixed-up words to build the sentence!</p>
      <div class="title-tiles">
        <span class="wt">words</span><span class="wt">the</span><span class="wt">mix</span><span class="wt">up</span>
      </div>
      <div class="title-actions">
        <button class="btn big" id="play-btn" data-i18n="play">▶ Play</button>
        <button class="btn ghost" id="customize-btn" data-i18n="customize">🎨 Customize</button>
        <div style="display:flex; gap:10px; align-items:center;">
          <button class="icon-btn" id="mute-btn-title" data-i18n-title="sound" title="Sound">🔊</button>
          <button class="icon-btn" id="music-btn-title" data-i18n-title="music" title="Music">🎵</button>
          <button class="mini-link" id="lang-btn">עברית</button>
          <button class="mini-link" id="reset-btn" data-i18n="reset">Reset progress</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ LEVEL SELECT ============ -->
  <section class="screen" id="screen-select">
    <div class="select-head">
      <button class="icon-btn" data-go="title" data-i18n-title="map" title="Map">🏠</button>
      <div class="level-tag" style="flex:1"><span data-i18n="pickLevel">Pick a Level</span><small data-i18n="pickSub">your word adventure</small></div>
      <div class="lang-pill" id="lang-pill-select">🇬🇧 EN</div>
    </div>
    <div class="grid-levels" id="levels-grid"></div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="screen-play">
    <div class="topbar">
      <button class="icon-btn" data-go="select" data-i18n-title="back" title="Back">⬅️</button>
      <div class="spacer"></div>
      <div class="level-tag" id="play-level">Level<small>World</small></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="mute-btn-play" data-i18n-title="sound" title="Sound">🔊</button>
      <button class="icon-btn" id="music-btn-play" data-i18n-title="music" title="Music">🎵</button>
    </div>

    <div class="progress-row">
      <div class="round-count" id="round-count">📝 1/5</div>
      <div class="bar" role="progressbar" aria-label="Level progress"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div class="board" id="board">
      <div class="board-hint" id="board-hint" data-i18n="hint" role="status" aria-live="polite">Drag the words into the right order!</div>
      <div class="slots" id="slots" role="list" aria-label="Sentence slots"></div>
      <div class="reveal-pic" id="reveal-pic" aria-hidden="true"></div>
      <div class="tray-label" data-i18n="trayLabel">Mixed-up words</div>
      <div class="tray" id="tray" role="list" aria-label="Mixed-up words"></div>
      <div class="play-actions">
        <button class="btn ghost" id="shuffle-btn" data-i18n="reshuffle">🔀 Shuffle</button>
        <button class="btn ghost" id="hint-btn" data-i18n="hintBtn">💡 Hint</button>
      </div>
    </div>
  </section>

  <!-- ============ LEVEL COMPLETE ============ -->
  <section class="screen" id="screen-complete">
    <div class="complete">
      <div style="font-size:3.4rem" id="complete-emoji">🎉</div>
      <h2 id="complete-title" data-i18n="cleared">Level Cleared!</h2>
      <div class="stars-big" id="complete-stars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
      <div class="reward-line" id="complete-reward"></div>
      <div>
        <button class="btn green" id="next-btn"></button>
        <button class="btn ghost" id="replay-btn" data-i18n="replay">↻ Replay</button>
        <button class="btn ghost" data-go="select" data-i18n="map">🏠 Map</button>
      </div>
    </div>
  </section>

</div>
<!-- floating drag ghost (filled in by JS) -->
<div id="ghost" class="tile" aria-hidden="true"></div>
<div id="fx" aria-hidden="true"></div>

<!-- ============ COSMETICS CUSTOMIZER ============ -->
<div class="cz-wrap" id="cz" role="dialog" aria-modal="true">
  <div class="cz-card">
    <div class="cz-title" data-i18n="cz_title">Style your tiles</div>
    <div class="cz-preview" id="cz-preview" aria-hidden="true"></div>
    <div id="cz-rows"></div>
    <button class="btn green cz-done" id="cz-done" data-i18n="cz_done">Done</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   Chaos Words — single-file kids' sentence-building game.
   A scrambled sentence is dealt each round; the player drags
   word tiles into slots to rebuild it. Correct order wins.
   Tweak LEVELS + SENTENCES below to change difficulty/content.
   ========================================================= */

// ----- Level configuration (data-driven, language-independent) -----
// tier      -> which difficulty pool of SENTENCES to draw from ("easy"/"medium"/"hard").
// worldKey  -> i18n key for the world (difficulty tier) label.
// nameKey   -> i18n key for the level name.
// rounds    -> how many sentences to solve to clear the level.
// accent/accentDeep -> per-tier tile + glow colours.
const LEVELS = [
  // ---- Short Sentences (easy: 3–4 words) ----
  {nameKey:"lvl_firstWords", worldKey:"world_short", emoji:"🐣", tier:"easy",   rounds:5, accent:"#ff8fab", accentDeep:"#f4628a"},
  {nameKey:"lvl_easyGo",     worldKey:"world_short", emoji:"🌷", tier:"easy",   rounds:5, accent:"#ff8fab", accentDeep:"#f4628a"},
  // ---- Longer Sentences (medium: 5–6 words) ----
  {nameKey:"lvl_growing",    worldKey:"world_long",  emoji:"🌻", tier:"medium", rounds:5, accent:"#5aa9f7", accentDeep:"#3a7fd6"},
  {nameKey:"lvl_storyTime",  worldKey:"world_long",  emoji:"📖", tier:"medium", rounds:5, accent:"#5aa9f7", accentDeep:"#3a7fd6"},
  // ---- Tricky Sentences (hard: 7–9 words) ----
  {nameKey:"lvl_brainy",     worldKey:"world_tricky",emoji:"🧠", tier:"hard",   rounds:5, accent:"#8b5cf6", accentDeep:"#6d3edb"},
  {nameKey:"lvl_master",     worldKey:"world_tricky",emoji:"🏆", tier:"hard",   rounds:5, accent:"#8b5cf6", accentDeep:"#6d3edb"},
];

// ----- Sentence database (bilingual, by language + difficulty tier) -----
// Each entry is a clean, space-separated sentence (no punctuation).
// The engine splits on spaces to get the ordered word list; duplicates are fine.
// An optional matching emoji can be appended after "|" to pop up on success.
const SENTENCES = {
  en:{
    easy:[
      "the cat is happy|🐱","I like red apples|🍎","the dog can run|🐶","we play all day|🎈",
      "the sun is hot|☀️","my mom is kind|💖","birds can fly high|🐦","the fish can swim|🐟",
      "I see a star|⭐","the cake is sweet|🍰","we love to sing|🎵","the frog is green|🐸",
      "my dad is tall|👨","the ball is round|⚽","I have two hands|✋","the moon is bright|🌙",
      "the bear is big|🐻","we eat good food|🍽️","the bee likes flowers|🐝","I can jump high|🤸",

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// Split a database entry "the cat is happy|🐱" into {words:[...], emoji:"🐱"}.
function parseSentence(entry){
  const [sentence, emoji] = entry.split("|");
  const words = sentence.trim().replace(/\s+/g," ").split(" ");
  return {words, emoji: emoji || ""};
}

// =========================================================
//  Sound (tiny Web Audio jingles — no files)
// =========================================================
// Pure Web Audio: no files, no libraries, no network.
//   tone()  = one ADSR voice (optional detune/glide/filter/echo)
//   noise() = filtered noise burst for percussive cues
//   arp()   = quick chord/arpeggio for happy cues
// A shared compressor + a feedback-delay "sparkle" send keep stacked
// notes from clipping and add a touch of space.
let audioCtx = null, sfxBus = null, musicBus = null, fxDelay = null;
const midi = m => 440 * Math.pow(2, (m - 69) / 12);   // MIDI note → Hz
function audio(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  try{ audioCtx = new AC(); }catch(e){ return null; }
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 26; comp.ratio.value = 3.5;
  comp.attack.value = 0.004; comp.release.value = 0.25; comp.connect(audioCtx.destination);
  fxDelay = audioCtx.createDelay(0.5); fxDelay.delayTime.value = 0.17;
  const fb = audioCtx.createGain(); fb.gain.value = 0.24;
  const wet = audioCtx.createGain(); wet.gain.value = 0.45;
  fxDelay.connect(fb); fb.connect(fxDelay); fxDelay.connect(wet); wet.connect(comp);
  sfxBus = audioCtx.createGain(); sfxBus.gain.value = 0.85; sfxBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 0.0001; musicBus.connect(comp);
  return audioCtx;
}
function audioReady(){ const c = audio(); if(c && c.state === "suspended") c.resume(); return c; }
function tone(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const peak = o.gain != null ? o.gain : 0.15;
  const atk = o.attack != null ? o.attack : 0.012;
  const rel = o.release != null ? o.release : Math.min(dur, 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + atk);
  g.gain.setValueAtTime(peak, t0 + Math.max(atk, dur - rel));
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  let sink = g;
  if(o.cutoff){
    const lp = ctx.createBiquadFilter(); lp.type = o.filter || "lowpass";
    lp.frequency.value = o.cutoff; lp.Q.value = o.q != null ? o.q : 0.7;
    lp.connect(g); sink = lp;
  }
  for(const d of (o.fat ? [-6, 6] : [0])){
    const osc = ctx.createOscillator();
    osc.type = o.type || "sine";
    osc.frequency.setValueAtTime(o.freq, t0);
    if(o.glideTo) osc.frequency.exponentialRampToValueAtTime(o.glideTo, t0 + dur);
    osc.detune.value = (o.detune || 0) + d;
    osc.connect(sink); osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
}
function noise(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const data = buf.getChannelData(0);
  const curve = o.curve != null ? o.curve : 2;
  for(let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, curve);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = o.filter || "lowpass";
  filt.frequency.value = o.cutoff != null ? o.cutoff : 1200;
  filt.Q.value = o.q != null ? o.q : 0.8;
  const g = ctx.createGain(); g.gain.value = o.gain != null ? o.gain : 0.15;
  src.connect(filt); filt.connect(g); g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
  src.start(t0); src.stop(t0 + dur + 0.02);
}
function arp(root, intervals, opts){
  const o = opts || {};
  intervals.forEach((iv, i) => tone({
    freq: midi(root + iv), t: (o.t || 0) + i * (o.step != null ? o.step : 0.09),
    dur: o.dur != null ? o.dur : 0.3, type: o.type || "triangle",
    gain: o.gain != null ? o.gain : 0.13, attack: 0.006, release: 0.22,
    echo: true, fat: o.fat, cutoff: o.cutoff || 2600
  }));
}
// Back-compat: existing call sites use beep(freq,start,dur,type,gain).
function beep(freq, start, dur, type = "sine", gain = 0.15){
  if(save.muted) return;
  tone({ freq, t: start, dur, type, gain, cutoff: (type === "square" || type === "sawtooth") ? 2800 : 0 });
}
function playSound(type){
  if(save.muted) return;
  if(type==="place" || type==="snap"){ tone({freq:523,dur:0.07,type:"triangle",gain:0.09,attack:0.003,release:0.05,cutoff:3000}); tone({freq:784,t:0.05,dur:0.1,type:"triangle",gain:0.08,echo:true,cutoff:3200}); }
  else if(type==="correct" || type==="win"){ arp(67,[0,4,7,12,16],{step:0.09,gain:0.12,dur:0.36,fat:true}); }
  else if(type==="wrong"){ tone({freq:300,glideTo:180,dur:0.22,type:"sine",gain:0.11,release:0.2,cutoff:1400}); }
  else if(type==="tap"){ tone({freq:560,dur:0.06,type:"triangle",gain:0.07,attack:0.003,release:0.05,cutoff:3000}); }
}

// Ambient music — generative loop via a lookahead scheduler.
// Bass + pad per bar, sprinkled pentatonic melody. Own bus, low volume under the SFX.
const MUSIC = { tempo:100, root:67, wave:"triangle", vol:0.40,
  scale:[0,2,4,7,9], prog:[0,5,7,5], chord:[0,4,7], melodyAt:[2,3,5,6,7], shaker:false };
let musicTimer = null, musicBeat = 0, musicNextT = 0, musicPlaying = false;
function musicStep(at, eighth){
  const m = MUSIC, SPB = 8, step = musicBeat % SPB;
  const cr = m.root + m.prog[Math.floor(musicBeat / SPB) % m.prog.length];
  if(step === 0){
    tone({ at, freq: midi(cr - 12), dur: eighth * SPB * 0.92, type: "sine", gain: 0.085, attack: 0.05, release: 0.7, bus: musicBus });
    m.chord.forEach((iv, k) => tone({ at: at + k * 0.012, freq: midi(cr + iv), dur: eighth * SPB * 0.96, type: m.wave, gain: 0.04, attack: 0.3, release: 0.9, fat: true, cutoff: 1900, bus: musicBus }));
  } else if(step === 4){
    tone({ at, freq: midi(cr - 12), dur: eighth * 3, type: "sine", gain: 0.055, attack: 0.04, release: 0.4, bus: musicBus });
  }
  if(m.melodyAt.includes(step) && Math.random() < 0.7){
    const deg = m.scale[Math.floor(Math.random() * m.scale.length)] + (Math.random() < 0.25 ? 12 : 0);
    tone({ at, freq: midi(cr + 12 + deg), dur: 0.34, type: "triangle", gain: 0.05, attack: 0.006, release: 0.3, echo: true, cutoff: 3200, bus: musicBus });
  }
  if(m.shaker && step % 2 === 1) noise({ at, dur: 0.05, gain: 0.012, filter: "highpass", cutoff: 6000, curve: 1, bus: musicBus });
}
function musicTick(){
  const ctx = audioCtx; if(!ctx || !musicPlaying) return;
  const eighth = 60 / MUSIC.tempo / 2;
  while(musicNextT < ctx.currentTime + 0.12){ musicStep(musicNextT, eighth); musicNextT += eighth; musicBeat++; }
}
function startMusic(){
  if(musicPlaying || save.muted || !save.music) return;
  const ctx = audioReady(); if(!ctx) return;
  musicPlaying = true; musicBeat = 0; musicNextT = ctx.currentTime + 0.18;
  musicBus.gain.cancelScheduledValues(ctx.currentTime);
  musicBus.gain.setValueAtTime(0.0001, ctx.currentTime);
  musicBus.gain.exponentialRampToValueAtTime(MUSIC.vol, ctx.currentTime + 1.6);
  musicTimer = setInterval(musicTick, 25);
}
function stopMusic(){
  if(!musicPlaying) return;
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  const ctx = audioCtx; if(!ctx || !musicBus) return;
  const now = ctx.currentTime;
  musicBus.gain.cancelScheduledValues(now);
  musicBus.gain.setValueAtTime(Math.max(0.0001, musicBus.gain.value), now);
  musicBus.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
}
function maybeStartMusic(){ if(save.music && !save.muted) startMusic(); }
// Unlock the AudioContext + start music on the very first interaction.
["pointerdown","keydown"].forEach(ev => window.addEventListener(ev, function k(){ audioReady(); maybeStartMusic(); }, { once:true }));
function refreshMusicBtn(){
  ["#music-btn-title","#music-btn-play"].forEach(sel => { const b = $(sel); if(b){ b.textContent = "🎵"; b.classList.toggle("is-off", !save.music); } });
}
function toggleMusic(){
  save.music = !save.music; persist(); refreshMusicBtn();
  if(save.music){ maybeStartMusic(); if(!save.muted) playSound("tap"); } else stopMusic();
}

// =========================================================
//  Game state
// =========================================================
const game = {
  levelIndex:0,
  roundIndex:0,
  mistakes:0,          // mistakes across the whole level (for stars)
  roundMistakes:0,     // mistakes in the current round (drives the hint)
  target:[],           // the correct ordered list of words
  emoji:"",            // picture to reveal on success
  tiles:[],            // tile objects {id, word, colorClass}
  slots:[],            // slotEl[i] -> tile id currently in slot i, or null
  solved:false,        // current round already solved (lock input)
  pool:[],             // remaining sentence entries for this level (no repeats)
  token:0,             // bumped on every (re)deal; guards deferred timeouts against stale rounds
};

// Start a level: build a no-repeat queue of sentences from this tier's pool.
function startLevel(i){
  game.levelIndex = i;
  game.roundIndex = 0;
  game.mistakes = 0;
  const lv = LEVELS[i];

  // per-tier accent colours
  const board = $("#board");
  document.documentElement.style.setProperty("--accent", lv.accent);
  document.documentElement.style.setProperty("--accent-deep", lv.accentDeep);

  // a shuffled, no-repeat pool of sentences for this tier (deal `rounds` of them)
  game.pool = shuffle([...SENTENCES[save.lang][lv.tier]]);

  $("#play-level").innerHTML = `${t(lv.nameKey)}<small>${t(lv.worldKey)}</small>`;
  showScreen("play");
  nextRound();
}

// Deal the next sentence (or finish the level).
function nextRound(){
  endDrag();   // abandon any in-flight drag so the ghost/listeners don't leak across deals
  const lv = LEVELS[game.levelIndex];
  if(game.roundIndex >= lv.rounds){ completeLevel(); return; }

  // pick a fresh sentence (refill the pool if we somehow run out)
  if(game.pool.length===0) game.pool = shuffle([...SENTENCES[save.lang][lv.tier]]);
  const entry = game.pool.pop();
  const parsed = parseSentence(entry);
  game.target = parsed.words;
  game.emoji = parsed.emoji;
  game.roundMistakes = 0;
  game.solved = false;
  game.token++;        // invalidate any pending timeouts from the previous round/deal

  // build tile objects: each word becomes a positioned token (id + word) so that
  // duplicate words (e.g. "the cat saw the dog") are tracked independently.
  game.tiles = game.target.map((word, idx)=>({
    id: idx,            // stable id within the round
    word,
    colorClass: "c"+(idx%6),
  }));

  // empty all slots
  game.slots = new Array(game.target.length).fill(null);

  // UI chrome
  $("#round-count").textContent = `📝 ${game.roundIndex+1}/${lv.rounds}`;
  $("#bar-fill").style.width = (game.roundIndex/lv.rounds*100)+"%";
  $("#board-hint").textContent = t("hint");
  $("#reveal-pic").innerHTML = "";

  buildSlots();
  dealTray();
}

// Render the empty slot row (one slot per word, in logical order).
function buildSlots(){
  const slotsEl = $("#slots");
  slotsEl.innerHTML = "";
  for(let i=0;i<game.target.length;i++){
    const s = document.createElement("div");
    s.className = "slot";
    s.dataset.slot = i;          // logical index — validation is index-based (RTL-safe)
    s.setAttribute("role", "listitem");
    slotsEl.appendChild(s);
  }
}

// Render the shuffled tiles into the tray, guaranteeing a non-solved start.
function dealTray(){
  // a scramble order that is NOT already the solved order (reshuffle if it is)
  let order = game.tiles.map(t=>t.id);
  if(order.length>1){
    let tries=0;
    do{ shuffle(order); tries++; }
    while(tries<40 && order.every((id,pos)=> game.tiles[id].word === game.target[pos]));
  }
  const trayEl = $("#tray");
  trayEl.innerHTML = "";
  order.forEach(id=>{
    trayEl.appendChild(makeTileEl(game.tiles[id]));
  });
}

// Build one draggable tile element.
function makeTileEl(tile){
  const el = document.createElement("div");
  const tilt = ["tilt-a","tilt-b","tilt-c"][tile.id%3];
  el.className = `tile ${tile.colorClass} ${tilt}`;
  el.textContent = tile.word;
  el.dataset.id = tile.id;
  el.setAttribute("role", "listitem");
  el.setAttribute("aria-label", tile.word);
  el.addEventListener("pointerdown", onPointerDown);
  return el;
}

// =========================================================
//  Pointer-based drag & drop (mouse + touch).
//  We move tiles between the tray and the logical slots using a
//  floating ghost element; the original tile is hidden while dragging.
// =========================================================
const drag = { active:false, el:null, fromSlot:null, pointerId:null, overSlot:null };
const ghostEl = $("#ghost");

function onPointerDown(e){
  if(game.solved) return;            // round already won — ignore
  if(drag.active) return;            // ignore a second finger while a drag is in progress
  if(e.button!=null && e.button!==0) return;   // primary button / touch only
  const el = e.currentTarget;
  e.preventDefault();
  startDrag(el, e);
}

function startDrag(el, e){
  drag.active = true;
  drag.el = el;
  drag.pointerId = e.pointerId;
  // which slot (if any) did this tile come from?
  drag.fromSlot = el.parentElement.classList.contains("slot") ? +el.parentElement.dataset.slot : null;

  // set up the floating ghost to mirror the tile (colour/tilt classes, minus drag-state ones)
  ghostEl.textContent = el.textContent;
  ghostEl.className = el.className.replace(/\b(dragging|landing|wrong|celebrate)\b/g,"").trim() + " on";
  moveGhost(e.clientX, e.clientY);

  el.classList.add("dragging");

  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp);
  window.addEventListener("pointercancel", onPointerUp);
}

function moveGhost(x,y){
  ghostEl.style.left = x+"px";
  ghostEl.style.top = y+"px";
}

// Highlight a single landing pad, clearing the previous one (avoids re-scanning the DOM).
function setOverSlot(slot){
  if(drag.overSlot===slot) return;
  if(drag.overSlot) drag.overSlot.classList.remove("over");
  if(slot) slot.classList.add("over");
  drag.overSlot = slot;
}

function onPointerMove(e){
  if(!drag.active || e.pointerId!==drag.pointerId) return;
  moveGhost(e.clientX, e.clientY);
  setOverSlot(slotUnder(e.clientX, e.clientY));
}

// Which slot element (if any) is under this point?
function slotUnder(x,y){
  const els = document.elementsFromPoint(x,y);
  for(const el of els){
    if(el.classList && el.classList.contains("slot")) return el;
    // also allow dropping on a tile that's sitting inside a slot
    if(el.classList && el.classList.contains("tile") && el.parentElement && el.parentElement.classList.contains("slot")){
      return el.parentElement;
    }
  }
  return null;   // not over any slot (caller decides whether it's the tray or dead space)
}

function onPointerUp(e){
  if(!drag.active || e.pointerId!==drag.pointerId) return;
  const el = drag.el;
  const fromSlot = drag.fromSlot;
  endDrag();   // tears down listeners, ghost and the .over highlight first

  // pointercancel (or a pointerup fired outside the window) has no reliable
  // drop coordinates — treat it as "leave the tile where it logically belongs"
  if(e.type==="pointercancel"){
    if(fromSlot!==null) returnToTray(el, fromSlot);
    return;
  }

  const targetSlot = slotUnder(e.clientX, e.clientY);
  if(targetSlot){
    dropIntoSlot(el, targetSlot, fromSlot);
  }else if(isOverTray(e.clientX, e.clientY) || fromSlot!==null){
    // dropped on the tray (or anywhere off a slot) → send the tile back to the tray
    returnToTray(el, fromSlot);
  }
  // else: dropped in dead space coming from the tray → leave it in the tray (no-op)
}

// Tear down an in-flight drag: remove window listeners, hide the ghost, clear the
// highlight and the original tile's drag state. Safe to call even if no drag is active.
function endDrag(){
  window.removeEventListener("pointermove", onPointerMove);
  window.removeEventListener("pointerup", onPointerUp);
  window.removeEventListener("pointercancel", onPointerUp);
  ghostEl.classList.remove("on");
  setOverSlot(null);
  if(drag.el) drag.el.classList.remove("dragging");
  drag.active = false;
  drag.el = null; drag.fromSlot = null; drag.pointerId = null;
}

// Is this point over the tray region?
function isOverTray(x,y){
  const r = $("#tray").getBoundingClientRect();
  return x>=r.left && x<=r.right && y>=r.top && y<=r.bottom;
}

// Place a tile into a slot; if occupied, swap the resident tile back appropriately.
// fromSlot is the slot the dragged tile came from (or null if it came from the tray).
function dropIntoSlot(el, slotEl, fromSlot){
  const slotIdx = +slotEl.dataset.slot;
  const resident = slotEl.querySelector(".tile");

  // clear the tile's old position bookkeeping
  if(fromSlot!==null) game.slots[fromSlot] = null;

  if(resident && resident!==el){
    // swap: move the resident either to the dragged tile's old slot, or to the tray
    if(fromSlot!==null){
      // place resident into the slot we came from
      const fromSlotEl = $(`.slot[data-slot="${fromSlot}"]`);
      fromSlotEl.appendChild(resident);
      game.slots[fromSlot] = +resident.dataset.id;
    }else{
      // we came from the tray → bump the resident back to the tray
      $("#tray").appendChild(resident);
    }
  }

  slotEl.innerHTML = "";        // clear (resident already moved out if it existed)
  slotEl.appendChild(el);
  game.slots[slotIdx] = +el.dataset.id;
  popTile(el);
  playSound("snap");
  checkSolved();
}

// Send a tile back to the tray.
function returnToTray(el, fromSlot){
  if(fromSlot!==null) game.slots[fromSlot] = null;
  $("#tray").appendChild(el);
  playSound("tap");
}

// Brief snap-into-slot pop animation, self-cleaning.
function popTile(el){
  el.classList.add("landing");
  setTimeout(()=>el.classList.remove("landing"), 300);
}

// =========================================================
//  Win check + hint
// =========================================================
// When every slot is filled, compare each slot's WORD STRING to the target word
// at that index (handles duplicate words correctly; RTL-safe because it's by index).
function checkSolved(){
  if(game.slots.some(id=>id===null)) return;     // not all filled yet

  const correct = game.slots.every((id,i)=> game.tiles[id].word === game.target[i]);
  if(correct){
    onRoundWin();
  }else{
    game.mistakes++;
    game.roundMistakes++;
    playSound("wrong");
    $("#board-hint").textContent = t("tryAgain");
    // wobble all the filled slots' tiles
    document.querySelectorAll("#slots .tile").forEach(tl=>{
      tl.classList.add("wrong");
      setTimeout(()=>tl.classList.remove("wrong"), 400);
    });
  }
}

function onRoundWin(){
  game.solved = true;
  playSound("correct");
  $("#board-hint").textContent = t("great");

  // celebratory bob-wave stagger across the slot tiles
  const tiles = [...document.querySelectorAll("#slots .tile")];
  tiles.forEach((tl,i)=>{
    setTimeout(()=>{
      tl.classList.add("celebrate");
      setTimeout(()=>tl.classList.remove("celebrate"), 600);
    }, i*90);
  });

  // pop the sentence's picture
  if(game.emoji){
    $("#reveal-pic").innerHTML = `<span class="em">${game.emoji}</span>`;
  }
  confetti();

  $("#bar-fill").style.width = ((game.roundIndex+1)/LEVELS[game.levelIndex].rounds*100)+"%";

  // guard against a re-deal (e.g. language switch / replay) happening during the delay,
  // which would otherwise double-advance the round counter
  const tokenAtWin = game.token;
  setTimeout(()=>{
    if(game.token!==tokenAtWin) return;
    game.roundIndex++; nextRound();
  }, 1500);
}

// Gentle hint: after a couple of wrong tries (or on the Hint button), reveal the
// correct word for the first empty/wrong slot by snapping it into place + glowing.
function showHint(){
  if(game.solved) return;
  // find the first slot whose word is wrong or empty
  let slotIdx = -1;
  for(let i=0;i<game.target.length;i++){
    const id = game.slots[i];
    if(id===null || game.tiles[id].word !== game.target[i]){ slotIdx = i; break; }
  }
  if(slotIdx<0) return;

  // find a tile (anywhere not already correctly placed) whose word matches the target
  const targetWord = game.target[slotIdx];
  let chosen = null;
  // prefer a tile currently in the tray; else any misplaced tile
  const candidates = game.tiles.filter(tl=>{
    if(tl.word!==targetWord) return false;
    const placedAt = game.slots.indexOf(tl.id);
    // skip tiles already sitting correctly
    return !(placedAt>=0 && game.target[placedAt]===tl.word);
  });
  if(candidates.length===0) return;
  chosen = candidates[0];

  const tileEl = document.querySelector(`.tile[data-id="${chosen.id}"]`);
  if(!tileEl) return;
  // if that tile is in another slot, vacate it
  const curParent = tileEl.parentElement;
  if(curParent.classList.contains("slot")){
    game.slots[+curParent.dataset.slot] = null;
  }
  // if the target slot has a wrong tile, bump it to the tray
  const slotEl = $(`.slot[data-slot="${slotIdx}"]`);
  const resident = slotEl.querySelector(".tile");
  if(resident && resident!==tileEl) $("#tray").appendChild(resident);

  slotEl.innerHTML = "";
  slotEl.appendChild(tileEl);
  game.slots[slotIdx] = chosen.id;
  slotEl.classList.add("hint");
  setTimeout(()=>slotEl.classList.remove("hint"), 1200);
  popTile(tileEl);
  $("#board-hint").textContent = t("hintShown");
  playSound("snap");
  game.mistakes++;            // a hint counts like a small mistake (affects stars)
  checkSolved();
}

// Reshuffle the loose (tray) tiles only — a fresh jumble, keeps placed tiles.
function reshuffleTray(){
  if(game.solved) return;
  const trayEl = $("#tray");
  const loose = [...trayEl.querySelectorAll(".tile")];
  shuffle(loose);
  trayEl.innerHTML = "";
  loose.forEach(el=>trayEl.appendChild(el));
  playSound("tap");
}

// =========================================================
//  Level complete
// =========================================================
function completeLevel(){
  const i = game.levelIndex;
  const m = game.mistakes;
  const stars = m===0 ? 3 : (m<=2 ? 2 : 1);

  const p = prog();
  p.starsByLevel[i] = Math.max(p.starsByLevel[i]||0, stars);
  if(i+1 <= LEVELS.length-1) p.unlockedLevel = Math.max(p.unlockedLevel, i+1);
  persist();

  const isLast = i >= LEVELS.length-1;
  $("#complete-emoji").textContent = "🎉";
  $("#complete-title").textContent = isLast ? t("allDone") : t("cleared");
  $("#complete-reward").textContent = `📝 ${LEVELS[i].rounds} ${t("solved")}  •  ${mistakesText(m)}`;

  const starEls = document.querySelectorAll("#complete-stars .s");
  starEls.forEach(s=>s.classList.remove("on"));
  showScreen("complete");
  starEls.forEach((s,idx)=>{
    setTimeout(()=>{ if(idx<stars){ s.classList.add("on"); playSound("tap"); } }, 300+idx*250);
  });

  const nextBtn = $("#next-btn");
  if(isLast){ nextBtn.textContent = t("map"); nextBtn.onclick = ()=>showScreen("select"); }
  else { nextBtn.textContent = t("next"); nextBtn.onclick = ()=>startLevel(i+1); }
  $("#replay-btn").onclick = ()=>startLevel(i);

  playSound("win");
  confetti();
}

// =========================================================
//  Visual FX
// =========================================================
function confetti(){
  const fx = $("#fx");
  const emojis = ["🎉","✨","⭐","🔤","🎊","🥳","💜"];
  for(let i=0;i<40;i++){
    const c = document.createElement("div");
    c.className="confetti";
    c.textContent = pick(emojis);
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}

// ----- Ambient drifting letters in the background -----
function buildBackground(){
  const bg = $("#bg");
  bg.innerHTML = "";
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZאבגדהוזחטיכלמנסעפצקרשת".split("");
  for(let i=0;i<18;i++){
    const d = document.createElement("div");
    d.className = "drift";
    d.textContent = pick(letters);
    d.style.left = Math.random()*100+"vw";
    d.style.fontSize = (1.4 + Math.random()*2.6)+"rem";
    const dur = 14 + Math.random()*18;
    d.style.animationDuration = dur+"s";
    d.style.animationDelay = (-Math.random()*dur)+"s";   // stagger so they start mid-flight
    d.style.setProperty("--spin", (Math.random()*360-180)+"deg");
    d.style.opacity = (0.05 + Math.random()*0.08).toFixed(2);
    bg.appendChild(d);
  }
}

// =========================================================
//  Mute + language + wiring
// =========================================================
function refreshMute(){
  const icon = save.muted ? "🔇" : "🔊";
  $("#mute-btn-title").textContent = icon;
  $("#mute-btn-play").textContent = icon;
}
function toggleMute(){ save.muted=!save.muted; persist(); refreshMute(); if(save.muted){ stopMusic(); } else { playSound("tap"); maybeStartMusic(); } }

function applyLanguage(){
  if(!I18N[save.lang]) save.lang = DEFAULT_LANG;
  const L = I18N[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.title = t(el.dataset.i18nTitle); });
  $("#lang-btn").textContent = L.langName;   // shows the OTHER language to switch to
  if(currentScreen==="select") renderSelect();
  // if a round is in progress, re-deal it in the new language (no crash mid-game)
  if(currentScreen==="play") startLevel(game.levelIndex);
}
function toggleLanguage(){ save.lang = (save.lang==="he"?"en":"he"); persist(); applyLanguage(); playSound("tap"); }

document.addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go) showScreen(go.getAttribute("data-go"));
});
// =========================================================
//  Cosmetics customizer (tile + landing-pad colour; "default" = themed accent)
// =========================================================
const COSMETIC_OPTS = [
  {key:"tile", labelKey:"cz_tile",
    colors:["#8b5cf6","#ff6f91","#ff8a3d","#ffb703","#2bb673","#16a3c9","#5a7bef","#e23b6d","#7a4a8a","#3a3f4a"]},
  {key:"pad", labelKey:"cz_pad",
    colors:["#8b5cf6","#ff6f91","#ff8a3d","#ffb703","#2bb673","#16a3c9","#5a7bef","#e23b6d"]},
];
// Apply chosen colours via CSS vars; "default" falls back to the per-level accent.
function applyCosmetics(){
  const r = document.documentElement.style, c = save.cosmetics;
  if(c.tile==="default") r.removeProperty("--tile"); else r.setProperty("--tile", c.tile);
  if(c.pad==="default")  r.removeProperty("--pad");  else r.setProperty("--pad",  c.pad);
}
function renderCustomizer(){
  const prev = $("#cz-preview");
  if(prev) prev.innerHTML = `<span class="tile">Aa</span><span class="tile">Bb</span>`;
  const rows = $("#cz-rows"); rows.innerHTML = "";
  COSMETIC_OPTS.forEach(cat=>{
    const cur = save.cosmetics[cat.key];
    const row = document.createElement("div"); row.className = "cz-row";
    const lbl = document.createElement("div"); lbl.className = "cz-label"; lbl.textContent = t(cat.labelKey);
    const opts = document.createElement("div"); opts.className = "cz-opts";
    const addSw = (val)=>{
      const b = document.createElement("button"); b.type = "button";
      b.className = "cz-sw" + (val==="default"?" auto":"") + (cur===val ? " sel" : "");
      if(val!=="default") b.style.background = val;
      b.setAttribute("aria-label", val==="default" ? t("cz_auto") : val);
      b.addEventListener("click", ()=>setCosmetic(cat.key, val));
      opts.appendChild(b);
    };
    addSw("default");
    cat.colors.forEach(addSw);
    row.appendChild(lbl); row.appendChild(opts); rows.appendChild(row);
  });
}
function setCosmetic(key,val){ save.cosmetics[key]=val; persist(); applyCosmetics(); renderCustomizer(); playSound("tap"); }
function openCustomizer(){ renderCustomizer(); $("#cz").classList.add("open"); }
function closeCustomizer(){ $("#cz").classList.remove("open"); }

$("#play-btn").addEventListener("click", ()=>{ playSound("tap"); showScreen("select"); });
$("#customize-btn").addEventListener("click", ()=>{ playSound("tap"); openCustomizer(); });
$("#cz-done").addEventListener("click", ()=>{ playSound("tap"); closeCustomizer(); });
$("#cz").addEventListener("click", e=>{ if(e.target.id==="cz") closeCustomizer(); });
$("#mute-btn-title").addEventListener("click", toggleMute);
$("#mute-btn-play").addEventListener("click", toggleMute);
$("#music-btn-title").addEventListener("click", toggleMusic);
$("#music-btn-play").addEventListener("click", toggleMusic);
$("#lang-btn").addEventListener("click", toggleLanguage);
$("#shuffle-btn").addEventListener("click", reshuffleTray);
$("#hint-btn").addEventListener("click", showHint);
$("#reset-btn").addEventListener("click", ()=>{
  if(confirm(t("resetConfirm"))){
    const lang = save.lang, cosmetics = {...save.cosmetics};   // keep language + cosmetics
    save = JSON.parse(JSON.stringify(DEFAULT_SAVE));
    save.lang = lang; save.cosmetics = cosmetics;
    persist(); refreshMute(); applyCosmetics(); applyLanguage();
    alert(t("resetDone"));
  }
});

// init
buildBackground();
applyCosmetics();
refreshMute();
refreshMusicBtn();
applyLanguage();
</script>
