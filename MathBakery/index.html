<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>מאפיית החשבון 🧁 — חשבון כיף לילדים</title>
<style>
  /* ---------- Theme ---------- */
  :root{
    --cream:#fff6e9;
    --cream-2:#ffe9c9;
    --brown:#7a4a2b;
    --brown-soft:#a9744b;
    --pink:#ff8fab;
    --pink-deep:#f4628a;
    --mint:#8fe3c0;
    --sky:#bfe3ff;
    --sun:#ffd166;
    --good:#5fbf6a;
    --shadow:0 6px 0 rgba(0,0,0,.12), 0 12px 24px rgba(0,0,0,.12);
    --radius:22px;
    font-size:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Comic Sans MS","Baloo 2","Trebuchet MS",system-ui,sans-serif;
    color:var(--brown);
    background:
      radial-gradient(circle at 15% 10%, #fff 0 8%, transparent 9%),
      radial-gradient(circle at 85% 20%, #fff 0 6%, transparent 7%),
      linear-gradient(160deg, var(--sky), var(--cream) 45%, var(--cream-2));
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  #app{
    max-width:780px;
    margin:0 auto;
    min-height:100%;
    padding:14px 16px 28px;
    position:relative;
    z-index:1;
  }

  /* ---------- Ambient floating background (soft bokeh + bakery doodles) ---------- */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  #bg .blob{position:absolute; border-radius:50%; opacity:.4; filter:blur(.5px);
    animation:drift linear infinite; will-change:transform;}
  #bg .doodle{position:absolute; opacity:.2; animation:drift2 linear infinite; will-change:transform;}
  @keyframes drift{
    0%{transform:translate(0,0) rotate(0);}
    50%{transform:translate(16px,-26px) rotate(12deg);}
    100%{transform:translate(0,0) rotate(0);}
  }
  @keyframes drift2{
    0%{transform:translate(0,0) rotate(0);}
    50%{transform:translate(0,-34px) rotate(-14deg);}
    100%{transform:translate(0,0) rotate(0);}
  }

  /* ---------- Screens ---------- */
  .screen{display:none; animation:fade .35s ease both;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:inherit; font-weight:800; cursor:pointer; border:none;
    background:var(--pink); color:#fff; border-radius:var(--radius);
    padding:16px 26px; font-size:1.25rem; box-shadow:var(--shadow);
    transition:transform .08s ease, filter .15s ease;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .btn:active{transform:translateY(3px);}
  .btn:hover{filter:brightness(1.05);}
  .btn.big{font-size:1.7rem; padding:20px 44px;}
  .btn.ghost{background:#fff; color:var(--brown); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .btn.green{background:var(--good);}
  .icon-btn{
    background:#fff; border:none; border-radius:50%; width:48px; height:48px;
    font-size:1.4rem; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.1);
  }
  .icon-btn:active{transform:translateY(2px);}
  .icon-btn.is-off{opacity:.4; filter:grayscale(1);}
  .title-top{display:flex; align-items:center; margin-bottom:4px;}
  a.icon-btn.home-link{display:inline-flex; align-items:center; justify-content:center; text-decoration:none;}

  /* ---------- Title screen ---------- */
  .hero{text-align:center; padding:18px 6px 6px;}
  .logo{
    font-size:clamp(2.6rem,9vw,4.2rem); font-weight:900; line-height:1.05;
    color:var(--pink-deep); text-shadow:0 4px 0 #fff, 0 6px 0 rgba(0,0,0,.12);
    margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:bob 2.2s ease-in-out infinite;}
  .tagline{font-size:1.15rem; color:var(--brown-soft); margin:0 0 16px;}
  .baker{
    display:inline-flex; align-items:center; justify-content:center;
    width:9rem; height:9rem; border-radius:50%;
    animation:bob 2.6s ease-in-out infinite;
    background:radial-gradient(circle at 50% 46%, #fff 0 54%, rgba(255,255,255,0) 72%);
  }
  .baker .chef{width:7.4rem; height:7.4rem;}
  .title-treats{font-size:2rem; letter-spacing:6px; margin:6px 0 18px; opacity:.9;}
  .title-actions{display:flex; flex-direction:column; align-items:center; gap:12px;}
  .mini-link{background:none; border:none; color:var(--brown-soft); text-decoration:underline; cursor:pointer; font-family:inherit; font-size:.95rem;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .topbar .spacer{flex:1;}
  .coins{
    background:#fff; border-radius:999px; padding:8px 16px; font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.1); font-size:1.15rem; white-space:nowrap;
  }
  .level-tag{font-weight:900; font-size:1.05rem; text-align:center; line-height:1.1;}
  .level-tag small{display:block; font-weight:700; color:var(--brown-soft); font-size:.8rem;}

  /* ---------- Progress + timer ---------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin:6px 2px 14px;}
  .order-count{font-weight:800; white-space:nowrap;}
  .timer{
    flex:1; height:18px; background:#fff; border-radius:999px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .timer-fill{
    height:100%; width:100%;
    background:linear-gradient(90deg, var(--good), var(--sun));
    border-radius:999px; transition:width .1s linear;
  }

  /* ---------- Customer + bubble ---------- */
  .stage{
    background:linear-gradient(180deg, #fffdf8 0%, #fff4e4 100%);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 16px 20px; position:relative; overflow:hidden;
  }
  /* a cheerful candy-stripe bakery awning across the top of the counter */
  .stage:before{
    content:""; position:absolute; left:0; right:0; top:0; height:14px; z-index:4;
    background:repeating-linear-gradient(90deg, var(--pink) 0 18px, #fff 18px 36px);
    box-shadow:0 2px 4px rgba(0,0,0,.12);
  }
  .counter{
    position:absolute; left:0; right:0; bottom:0; height:42px;
    background:repeating-linear-gradient(45deg, var(--cream-2) 0 14px, #ffdfb0 14px 28px);
    border-top:5px solid var(--brown-soft);
  }
  .customer-row{display:flex; align-items:flex-start; gap:12px; min-height:120px;}
  .customer{width:5.4rem; height:5.4rem; line-height:1; animation:slideIn .5s ease both;}
  .customer.hop{animation:hop .5s ease;}
  /* ---- SVG critter / chef sprites + their tiny idle animations ---- */
  .critter, .chef{width:100%; height:100%; display:block; overflow:visible;}
  .critter{transform-origin:50% 86%; animation:sway 3.2s ease-in-out infinite;}
  .critter .eye, .chef .eye{transform-box:fill-box; transform-origin:center; animation:blink 4.2s infinite;}
  .chef .hand{transform-box:fill-box; transform-origin:70% 100%; animation:wave 2.8s ease-in-out infinite;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);} 96%{transform:scaleY(.12);}}
  @keyframes sway{0%,100%{transform:rotate(-2.5deg);} 50%{transform:rotate(2.5deg);}}
  @keyframes wave{0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(10deg);}}
  .bubble{
    position:relative; background:var(--cream); border:3px solid var(--cream-2);
    border-radius:18px; padding:12px 16px; font-size:1.2rem; font-weight:800;
    max-width:70%;
  }
  /* tail points toward the customer; flips with text direction */
  .bubble:after{
    content:""; position:absolute; left:-14px; top:26px; border:8px solid transparent;
    border-right-color:var(--cream-2);
  }
  [dir="rtl"] .bubble:after{
    left:auto; right:-14px; border-right-color:transparent; border-left-color:var(--cream-2);
  }
  /* keep the math (e.g. 5 + 1) reading left-to-right inside Hebrew text */
  .bubble b{color:var(--pink-deep); unicode-bidi:isolate;}

  /* ---------- Tray / math visual ---------- */
  .tray{
    margin:14px auto 6px; position:relative; z-index:2;
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:6px 10px;
    min-height:70px;
  }
  .treat{font-size:2.1rem; display:inline-block; transition:transform .2s ease, filter .2s ease, opacity .2s;}
  /* logical grouping of one pile (an addend, or the minuend) — no box of its own;
     only a real box of 10 (.ten-box) is ever framed, so small counts read as loose treats */
  .group{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; align-items:center;}
  .op-sign{font-size:2rem; font-weight:900; color:var(--brown); margin:0 4px;}
  /* a "box of 10" ten-frame: 5 across, 2 down — makes numbers to 20 readable */
  .ten-box{display:grid; grid-template-columns:repeat(5,1fr); gap:2px 4px; padding:5px 7px;
    background:rgba(255,255,255,.7); border:2px dashed var(--brown-soft); border-radius:14px;}
  /* loose treats (a pile under 10, no box) stay on one horizontal line — batching looks odd */
  .loose{display:flex; flex-wrap:nowrap; gap:3px; justify-content:center; align-items:center;}
  .ten-box .treat, .loose .treat{font-size:1.7rem;}
  /* empty cell of a partly-filled box of 10 */
  .slot{display:inline-block; width:1.6rem; height:1.6rem; border-radius:50%;
    border:2px dashed rgba(122,74,43,.28); vertical-align:middle;}
  .treat.dough{filter:grayscale(.7) brightness(1.15); opacity:.55;}
  .treat.eaten{opacity:.3; filter:grayscale(1);}
  .eaten-wrap{position:relative; display:inline-block;}
  .eaten-wrap .x{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; color:var(--pink-deep); font-weight:900; pointer-events:none;}
  .grid{display:grid; gap:6px; justify-content:center; padding:8px; background:rgba(255,209,102,.25); border-radius:16px;}
  .tray.baked .treat{filter:none; opacity:1; animation:pop .35s ease both;}
  .tray.baked .treat.eaten{opacity:.25; filter:grayscale(1);}

  /* ---------- Answer choices ---------- */
  .choices{display:flex; flex-wrap:wrap; justify-content:center; gap:14px; margin:18px 4px 4px;}
  .choice{
    position:relative; cursor:pointer; border:none; font-family:inherit;
    width:104px; height:104px; border-radius:28px; font-size:2.4rem; font-weight:900;
    color:var(--brown);
    background:radial-gradient(circle at 35% 28%, #ffeac6, #e0a464);
    box-shadow:var(--shadow), inset 0 0 0 3px rgba(255,255,255,.4);
    transition:transform .08s ease, filter .15s;
  }
  .choice:before{content:"🍪"; position:absolute; inset:0; font-size:5.4rem; opacity:.18; display:flex; align-items:center; justify-content:center;}
  .choice span{position:relative; z-index:2; text-shadow:0 2px 0 rgba(255,255,255,.5);}
  .choice:active{transform:translateY(3px);}
  .choice:hover{filter:brightness(1.05);}
  .choice.wrong{animation:wobble .45s ease;}
  .choice.dim{opacity:.45; filter:grayscale(.5); pointer-events:none;}
  .choice.correct{animation:pop .4s ease; background:radial-gradient(circle at 35% 30%, #bff0c4, #5fbf6a); color:#fff;}

  /* ---------- Level select ---------- */
  .select-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .grid-levels{display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px;}
  .level-card{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:14px 10px;
    text-align:center; cursor:pointer; border:3px solid transparent; transition:transform .1s;
  }
  .level-card:active{transform:translateY(2px);}
  .level-card .lc-emoji{font-size:2.6rem;}
  .level-card .lc-name{font-weight:900; margin:4px 0 2px;}
  .level-card .lc-world{font-size:.78rem; color:var(--brown-soft); min-height:1.6em;}
  .level-card .lc-stars{font-size:1.1rem; letter-spacing:2px; margin-top:6px;}
  .level-card.locked{opacity:.55; cursor:not-allowed; background:#f3ece1;}
  .level-card.locked .lc-emoji{filter:grayscale(1);}
  .world-label{grid-column:1/-1; font-weight:900; color:var(--brown-soft); margin:8px 2px 0; font-size:1rem;}

  /* ---------- Complete screen ---------- */
  .complete{
    text-align:center; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    padding:26px 18px; margin-top:30px;
  }
  .complete h2{font-size:2rem; color:var(--pink-deep); margin:4px 0 8px;}
  .stars-big{font-size:3.4rem; letter-spacing:8px; height:1.4em;}
  .stars-big .s{display:inline-block; opacity:.25;}
  .stars-big .s.on{opacity:1; animation:pop .5s ease both;}
  .reward-line{font-size:1.3rem; font-weight:800; margin:10px 0 18px;}
  .complete .btn{margin:6px;}

  /* ---------- FX: confetti + flying coins ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .confetti{position:absolute; font-size:1.6rem; animation:confetti-fall linear forwards;}
  .fly-coin{position:fixed; font-size:1.6rem; z-index:60; pointer-events:none; animation:fly-coin .7s ease-in forwards;}

  /* ---------- Keyframes ---------- */
  @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
  @keyframes pop{0%{transform:scale(.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);}}
  @keyframes wobble{0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px) rotate(-5deg);} 40%{transform:translateX(9px) rotate(5deg);} 60%{transform:translateX(-7px) rotate(-3deg);} 80%{transform:translateX(7px) rotate(3deg);}}
  @keyframes slideIn{from{transform:translateX(120px) scale(.7); opacity:0;} to{transform:none; opacity:1;}}
  @keyframes hop{0%,100%{transform:translateY(0);} 30%{transform:translateY(-26px) rotate(-6deg);} 60%{transform:translateY(0) rotate(4deg);}}
  @keyframes confetti-fall{from{transform:translateY(-30px) rotate(0);} to{transform:translateY(105vh) rotate(540deg); opacity:.9;}}
  @keyframes fly-coin{from{transform:translate(0,0) scale(1); opacity:1;} to{transform:translate(var(--dx),var(--dy)) scale(.4); opacity:0;}}

  @media (max-width:480px){
    .choice{width:88px; height:88px; font-size:2rem;}
    .customer{width:4.2rem; height:4.2rem;}
    .bubble{font-size:1.05rem; max-width:64%;}
    .treat{font-size:1.7rem;}
  }


  /* ---------- Cosmetics customizer (overlay) ---------- */
  .cz-wrap{position:fixed; inset:0; z-index:80; display:none; align-items:center;
    justify-content:center; background:rgba(40,25,15,.45); padding:16px;}
  .cz-wrap.open{display:flex; animation:fade .25s ease both;}
  .cz-card{background:var(--cream); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px; max-width:380px; width:100%; max-height:90vh; overflow:auto; text-align:center;}
  .cz-title{font-weight:900; font-size:1.4rem; margin:2px 0 6px; color:var(--pink-deep);}
  .cz-preview{display:flex; justify-content:center; align-items:flex-end; height:120px; margin:4px 0 10px;}
  .cz-preview .baker{animation:none; width:120px; height:120px;}
  .cz-row{margin:12px 0; text-align:start;}
  .cz-label{font-weight:800; font-size:.95rem; margin-bottom:7px; color:var(--brown);}
  .cz-opts{display:flex; flex-wrap:wrap; gap:9px;}
  .cz-sw{width:38px; height:38px; border-radius:50%; border:3px solid #fff; cursor:pointer;
    padding:0; box-shadow:0 0 0 2px rgba(0,0,0,.14); transition:transform .08s;}
  .cz-sw:active{transform:scale(.92);}
  .cz-sw.sel{box-shadow:0 0 0 3px var(--brown);}
  .cz-sw.none{background:#fff; position:relative; overflow:hidden;}
  .cz-sw.none:after{content:""; position:absolute; left:46%; top:-20%; width:3px; height:140%;
    background:#e06; transform:rotate(45deg);}
  .cz-done{margin-top:10px;}
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<div id="app">

  <!-- ============ TITLE ============ -->
  <section class="screen active" id="screen-title">
    <div class="title-top">
      <a class="icon-btn home-link" href="../index.html" data-i18n-title="allGames" title="All games" aria-label="All games">🎮</a>
    </div>
    <div class="hero">
      <div class="logo"><span class="em">🧁</span> <span data-i18n="title">Math Bakery</span> <span class="em">🍪</span></div>
      <p class="tagline" data-i18n="tagline">Serve yummy treats by solving math!</p>
      <div class="baker" id="baker" aria-label="Baker" role="img"></div>
      <div class="title-treats">🍩 🥨 🎂 🧁 🍪</div>
      <div class="title-actions">
        <button class="btn big" id="play-btn" data-i18n="play">▶ Play</button>
        <button class="btn ghost" id="customize-btn" data-i18n="customize">🎨 Customize</button>
        <div style="display:flex; gap:10px; align-items:center;">
          <button class="icon-btn" id="mute-btn-title" data-i18n-title="sound" title="Sound">🔊</button>
          <button class="icon-btn" id="music-btn-title" data-i18n-title="music" title="Music">🎵</button>
          <button class="mini-link" id="lang-btn">עברית</button>
          <button class="mini-link" id="reset-btn" data-i18n="reset">Reset progress</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ LEVEL SELECT ============ -->
  <section class="screen" id="screen-select">
    <div class="select-head">
      <button class="icon-btn" data-go="title" aria-label="Home" title="Home">🏠</button>
      <div class="level-tag" style="flex:1"><span data-i18n="pickBakery">Pick a Bakery</span><small data-i18n="pickSub">your math adventure</small></div>
      <div class="coins" id="coins-select">🪙 0</div>
    </div>
    <div class="grid-levels" id="levels-grid"></div>
  </section>

  <!-- ============ PLAY ============ -->
  <section class="screen" id="screen-play">
    <div class="topbar">
      <button class="icon-btn" data-go="select" data-i18n-title="back" title="Back">⬅️</button>
      <div class="spacer"></div>
      <div class="level-tag" id="play-level">Level<small>World</small></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="mute-btn-play" data-i18n-title="sound" title="Sound">🔊</button>
      <button class="icon-btn" id="music-btn-play" data-i18n-title="music" title="Music">🎵</button>
      <div class="coins" id="coins-play">🪙 0</div>
    </div>

    <div class="progress-row">
      <div class="order-count" id="order-count"></div>
      <div class="timer"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <div class="stage">
      <div class="customer-row">
        <div class="customer" id="customer" role="img" aria-label="Customer"></div>
        <div class="bubble" id="bubble" data-i18n="idLike">I'd like…</div>
      </div>
      <div class="tray" id="tray"></div>
      <div class="counter"></div>
    </div>

    <div class="choices" id="choices"></div>
  </section>

  <!-- ============ LEVEL COMPLETE ============ -->
  <section class="screen" id="screen-complete">
    <div class="complete">
      <div style="font-size:3.4rem">🎉</div>
      <h2 id="complete-title" data-i18n="bakeryClosed">Bakery Closed!</h2>
      <div class="stars-big" id="complete-stars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
      <div class="reward-line" id="complete-reward"></div>
      <div>
        <button class="btn green" id="next-btn"></button>
        <button class="btn ghost" id="replay-btn" data-i18n="replay">↻ Replay</button>
        <button class="btn ghost" data-go="select" data-i18n="map">🏠 Map</button>
      </div>
    </div>
  </section>

</div>
<div id="fx"></div>

<!-- ============ COSMETICS CUSTOMIZER ============ -->
<div class="cz-wrap" id="cz" role="dialog" aria-modal="true">
  <div class="cz-card">
    <div class="cz-title" data-i18n="cz_title">Make it yours</div>
    <div class="cz-preview"><div class="baker" id="cz-preview" role="img" aria-label="Baker preview"></div></div>
    <div id="cz-rows"></div>
    <button class="btn green cz-done" id="cz-done" data-i18n="cz_done">Done</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   Math Bakery — single-file kids' math game
   Tweak LEVELS below to change difficulty / add levels.
   ========================================================= */

// ----- Level configuration (data-driven) -----
// op: '+', '-' or '×'.  ops can hold several for a "mixed" level.
// maxSum: cap for addition. maxMinuend: top number for subtraction.
// tables/maxFactor: multiplication. showArray: draw the cookie array grid.
// nameKey / worldKey / treatKey are looked up in the I18N table (see below),
// so all level text is translatable.
const LEVELS = [
  // ---- Cupcake Corner : Addition ----
  {nameKey:"lvl_sweetStart", worldKey:"world_cupcake", emoji:"🧁", treat:"🧁", treatKey:"treat_cupcakes", ops:["+"], maxSum:6,  orders:5, choices:3},
  {nameKey:"lvl_sugarRush",  worldKey:"world_cupcake", emoji:"🧁", treat:"🧁", treatKey:"treat_cupcakes", ops:["+"], maxSum:10, orders:5, choices:3},
  {nameKey:"lvl_frostingFun",worldKey:"world_cupcake", emoji:"🧁", treat:"🧁", treatKey:"treat_cupcakes", ops:["+"], maxSum:20, orders:6, choices:4},
  // ---- Pretzel Place : Subtraction ----
  {nameKey:"lvl_twistTake",  worldKey:"world_pretzel", emoji:"🥨", treat:"🥨", treatKey:"treat_pretzels", ops:["-"], maxMinuend:10, orders:5, choices:3},
  {nameKey:"lvl_saltySub",   worldKey:"world_pretzel", emoji:"🥨", treat:"🥨", treatKey:"treat_pretzels", ops:["-"], maxMinuend:15, orders:5, choices:3},
  {nameKey:"lvl_bigBites",   worldKey:"world_pretzel", emoji:"🥨", treat:"🥨", treatKey:"treat_pretzels", ops:["-"], maxMinuend:20, orders:6, choices:4},

// =========================================================
//  Sound (tiny Web Audio jingles — no files)
// =========================================================
// ---------------------------------------------------------
//  Audio engine — synthesized SFX + ambient music.
//  Pure Web Audio: no files, no libraries, no network.
//    tone()  = one ADSR voice (optional detune/glide/filter/echo)
//    noise() = filtered noise burst for percussive cues
//    arp()   = quick chord/arpeggio for happy cues
//  A shared compressor + a feedback-delay "sparkle" send keep
//  stacked notes from clipping and add a touch of space.
// ---------------------------------------------------------
let audioCtx = null, sfxBus = null, musicBus = null, fxDelay = null;
const midi = m => 440 * Math.pow(2, (m - 69) / 12);   // MIDI note → Hz
function audio(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  try{ audioCtx = new AC(); }catch(e){ return null; }
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 26; comp.ratio.value = 3.5;
  comp.attack.value = 0.004; comp.release.value = 0.25; comp.connect(audioCtx.destination);
  fxDelay = audioCtx.createDelay(0.5); fxDelay.delayTime.value = 0.17;
  const fb = audioCtx.createGain(); fb.gain.value = 0.24;
  const wet = audioCtx.createGain(); wet.gain.value = 0.45;
  fxDelay.connect(fb); fb.connect(fxDelay); fxDelay.connect(wet); wet.connect(comp);
  sfxBus = audioCtx.createGain(); sfxBus.gain.value = 0.85; sfxBus.connect(comp);
  musicBus = audioCtx.createGain(); musicBus.gain.value = 0.0001; musicBus.connect(comp);
  return audioCtx;
}
function audioReady(){ const c = audio(); if(c && c.state === "suspended") c.resume(); return c; }
function tone(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const peak = o.gain != null ? o.gain : 0.15;
  const atk = o.attack != null ? o.attack : 0.012;
  const rel = o.release != null ? o.release : Math.min(dur, 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + atk);
  g.gain.setValueAtTime(peak, t0 + Math.max(atk, dur - rel));
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  let sink = g;
  if(o.cutoff){
    const lp = ctx.createBiquadFilter(); lp.type = o.filter || "lowpass";
    lp.frequency.value = o.cutoff; lp.Q.value = o.q != null ? o.q : 0.7;
    lp.connect(g); sink = lp;
  }
  for(const d of (o.fat ? [-6, 6] : [0])){
    const osc = ctx.createOscillator();
    osc.type = o.type || "sine";
    osc.frequency.setValueAtTime(o.freq, t0);
    if(o.glideTo) osc.frequency.exponentialRampToValueAtTime(o.glideTo, t0 + dur);
    osc.detune.value = (o.detune || 0) + d;
    osc.connect(sink); osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
}
function noise(o){
  const ctx = audioReady(); if(!ctx) return;
  const t0 = (o.at != null) ? o.at : ctx.currentTime + (o.t || 0);
  const dur = o.dur != null ? o.dur : 0.2;
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const data = buf.getChannelData(0);
  const curve = o.curve != null ? o.curve : 2;
  for(let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, curve);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = o.filter || "lowpass";
  filt.frequency.value = o.cutoff != null ? o.cutoff : 1200;
  filt.Q.value = o.q != null ? o.q : 0.8;
  const g = ctx.createGain(); g.gain.value = o.gain != null ? o.gain : 0.15;
  src.connect(filt); filt.connect(g); g.connect(o.bus || sfxBus);
  if(o.echo && fxDelay) g.connect(fxDelay);
  src.start(t0); src.stop(t0 + dur + 0.02);
}
function arp(root, intervals, opts){
  const o = opts || {};
  intervals.forEach((iv, i) => tone({
    freq: midi(root + iv), t: (o.t || 0) + i * (o.step != null ? o.step : 0.09),
    dur: o.dur != null ? o.dur : 0.3, type: o.type || "triangle",
    gain: o.gain != null ? o.gain : 0.13, attack: 0.006, release: 0.22,
    echo: true, fat: o.fat, cutoff: o.cutoff || 2600
  }));
}
// Back-compat: existing call sites use beep(freq,start,dur,type,gain).
function beep(freq, start, dur, type = "sine", gain = 0.15){
  if(save.muted) return;
  tone({ freq, t: start, dur, type, gain, cutoff: (type === "square" || type === "sawtooth") ? 2800 : 0 });
}
function playSound(type){
  if(save.muted) return;
  if(type==="correct"){ arp(72,[0,4,7],{step:0.07,gain:0.12,dur:0.3,cutoff:3000}); }
  else if(type==="wrong"){ tone({freq:300,glideTo:170,dur:0.26,type:"sine",gain:0.13,attack:0.005,release:0.22,cutoff:1400}); }
  else if(type==="level"){ arp(60,[0,4,7,12,16,19],{step:0.1,gain:0.13,dur:0.4,fat:true}); }
  else if(type==="tap"){ tone({freq:660,dur:0.06,type:"triangle",gain:0.07,attack:0.003,release:0.05,cutoff:3000}); }
}

// Ambient music — generative loop via a lookahead scheduler.
// Bass + pad per bar, sprinkled pentatonic melody, optional shaker. Own bus, low volume under the SFX.
const MUSIC = { tempo:104, root:62, wave:"triangle", vol:0.42,
  scale:[0,2,4,7,9], prog:[0,5,7,5], chord:[0,4,7], melodyAt:[2,3,5,6,7], shaker:true };
let musicTimer = null, musicBeat = 0, musicNextT = 0, musicPlaying = false;
function musicStep(at, eighth){
  const m = MUSIC, SPB = 8, step = musicBeat % SPB;
  const cr = m.root + m.prog[Math.floor(musicBeat / SPB) % m.prog.length];
  if(step === 0){
    tone({ at, freq: midi(cr - 12), dur: eighth * SPB * 0.92, type: "sine", gain: 0.085, attack: 0.05, release: 0.7, bus: musicBus });
    m.chord.forEach((iv, k) => tone({ at: at + k * 0.012, freq: midi(cr + iv), dur: eighth * SPB * 0.96, type: m.wave, gain: 0.04, attack: 0.3, release: 0.9, fat: true, cutoff: 1900, bus: musicBus }));
  } else if(step === 4){
    tone({ at, freq: midi(cr - 12), dur: eighth * 3, type: "sine", gain: 0.055, attack: 0.04, release: 0.4, bus: musicBus });
  }
  if(m.melodyAt.includes(step) && Math.random() < 0.7){
    const deg = m.scale[Math.floor(Math.random() * m.scale.length)] + (Math.random() < 0.25 ? 12 : 0);
    tone({ at, freq: midi(cr + 12 + deg), dur: 0.34, type: "triangle", gain: 0.05, attack: 0.006, release: 0.3, echo: true, cutoff: 3200, bus: musicBus });
  }
  if(m.shaker && step % 2 === 1) noise({ at, dur: 0.05, gain: 0.012, filter: "highpass", cutoff: 6000, curve: 1, bus: musicBus });
}
function musicTick(){
  const ctx = audioCtx; if(!ctx || !musicPlaying) return;
  const eighth = 60 / MUSIC.tempo / 2;
  while(musicNextT < ctx.currentTime + 0.12){ musicStep(musicNextT, eighth); musicNextT += eighth; musicBeat++; }
}
function startMusic(){
  if(musicPlaying || save.muted || !save.music) return;
  const ctx = audioReady(); if(!ctx) return;
  musicPlaying = true; musicBeat = 0; musicNextT = ctx.currentTime + 0.18;
  musicBus.gain.cancelScheduledValues(ctx.currentTime);
  musicBus.gain.setValueAtTime(0.0001, ctx.currentTime);
  musicBus.gain.exponentialRampToValueAtTime(MUSIC.vol, ctx.currentTime + 1.6);
  musicTimer = setInterval(musicTick, 25);
}
function stopMusic(){
  if(!musicPlaying) return;
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  const ctx = audioCtx; if(!ctx || !musicBus) return;
  const now = ctx.currentTime;
  musicBus.gain.cancelScheduledValues(now);
  musicBus.gain.setValueAtTime(Math.max(0.0001, musicBus.gain.value), now);
  musicBus.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
}
function maybeStartMusic(){ if(save.music && !save.muted) startMusic(); }
// Unlock the AudioContext + start music on the very first interaction.
["pointerdown","keydown"].forEach(ev => window.addEventListener(ev, function k(){ audioReady(); maybeStartMusic(); }, { once:true }));
function refreshMusicBtn(){
  ["#music-btn-title","#music-btn-play"].forEach(sel => { const b = $(sel); if(b){ b.textContent = "🎵"; b.classList.toggle("is-off", !save.music); } });
}
function toggleMusic(){
  save.music = !save.music; persist(); refreshMusicBtn();
  if(save.music){ maybeStartMusic(); if(!save.muted) playSound("tap"); } else stopMusic();
}

// =========================================================
//  Problem generation
// =========================================================
function generateProblem(level){
  const op = pick(level.ops);
  let a,b,answer,rows=0,cols=0;
  if(op==="+"){
    const cap = level.maxSum;
    a = randInt(1, cap-1);
    b = randInt(1, cap-a);
    answer = a+b;
  }else if(op==="-"){
    a = randInt(2, level.maxMinuend);
    b = randInt(1, a-1);
    answer = a-b;
  }else{ // ×
    a = pick(level.tables);           // rows
    b = randInt(1, level.maxFactor);  // columns
    answer = a*b;
    rows=a; cols=b;
  }
  return {op,a,b,answer,rows,cols};
}

function makeChoices(answer, level){
  const set = new Set([answer]);
  const candidates = shuffle([answer+1,answer-1,answer+2,answer-2,answer+3,answer+10,answer-10]);
  for(const c of candidates){
    if(set.size>=level.choices) break;
    if(c>=0 && !set.has(c)) set.add(c);
  }
  let extra = answer+4;
  while(set.size<level.choices){ if(extra>=0 && !set.has(extra)) set.add(extra); extra++; }
  return shuffle([...set]);
}

// =========================================================
//  Screen navigation
// =========================================================
function showScreen(name){
  // Always stop the speed-bonus timer when navigating; if we're entering the
  // play screen it is (re)started by nextOrder() right after this returns. This
  // prevents the interval leaking when leaving play via the Back button.
  stopTimer();
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("#screen-"+name).classList.add("active");
  if(name==="select") renderSelect();
}

// =========================================================
//  Level select
// =========================================================
function renderSelect(){
  $("#coins-select").textContent = "🪙 "+save.coins;
  const grid = $("#levels-grid");
  grid.innerHTML = "";
  let lastWorld = null;
  LEVELS.forEach((lv,i)=>{
    if(lv.worldKey!==lastWorld){
      lastWorld = lv.worldKey;
      const wl = document.createElement("div");
      wl.className="world-label";
      wl.textContent = t(lv.worldKey);
      grid.appendChild(wl);
    }
    const locked = i > save.unlockedLevel;
    const stars = save.starsByLevel[i]||0;
    const card = document.createElement("div");
    card.className = "level-card"+(locked?" locked":"");
    card.innerHTML = `
      <div class="lc-emoji">${locked?"🔒":lv.emoji}</div>
      <div class="lc-name">${t(lv.nameKey)}</div>
      <div class="lc-world">${lv.ops.join(" ")} • ${lv.orders} ${t("orders")}</div>
      <div class="lc-stars">${starString(stars)}</div>`;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", t(lv.nameKey)+" — "+t(lv.worldKey));
    if(locked){
      card.setAttribute("aria-disabled", "true");
    }else{
      card.tabIndex = 0;
      card.addEventListener("click",()=>startLevel(i));
      card.addEventListener("keydown",e=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); startLevel(i); }
      });
    }
    grid.appendChild(card);
  });
}
function starString(n){ return "★★★".slice(0,n).padEnd(3,"☆"); }

// =========================================================
//  Playing a level
// =========================================================
function startLevel(i){
  state.levelIndex = i;
  state.orderIndex = 0;
  state.levelMistakes = 0;
  state.levelCoins = 0;
  const lv = LEVELS[i];
  $("#play-level").innerHTML = `${t(lv.nameKey)}<small>${t(lv.worldKey)}</small>`;
  showScreen("play");
  nextOrder();
}

function nextOrder(){
  const lv = LEVELS[state.levelIndex];
  if(state.orderIndex >= lv.orders){ completeLevel(); return; }

  state.problem = generateProblem(lv);
  state.answered = false;

  // top bar
  $("#coins-play").textContent = "🪙 "+save.coins;
  $("#order-count").textContent = `${t("order")} ${state.orderIndex+1}/${lv.orders}`;

  // customer + speech bubble (math kept LTR so "5 + 3" reads correctly in any language)
  const customer = $("#customer");
  customer.className = "customer";
  void customer.offsetWidth; // restart slide-in animation
  customer.innerHTML = critterSVG(pick(CUSTOMERS));
  const p = state.problem;
  $("#bubble").innerHTML = `${t("bake")} <b dir="ltr">${p.a} ${p.op} ${p.b}</b> ${t(lv.treatKey)}! 😋`;

  renderTray(lv, p, false);
  renderChoices(lv, p);
  startTimer();
}

function renderTray(lv, p, baked){
  const tray = $("#tray");
  tray.className = "tray"+(baked?" baked":"");
  const treat = lv.treat;
  const dough = baked ? "" : "dough";
  if(p.op==="×"){
    // multiplication keeps the array model (rows x cols) — not boxed
    let cells = "";
    for(let k=0;k<p.rows*p.cols;k++){
      cells += `<span class="treat ${dough}">${treat}</span>`;
    }
    tray.innerHTML = `<div class="grid" style="grid-template-columns:repeat(${p.cols},1fr)">${cells}</div>`;
  }else if(p.op==="+"){
    tray.innerHTML =
      `<div class="group">${boxedTreats(p.a, treat, dough)}</div>`+
      `<span class="op-sign">+</span>`+
      `<div class="group">${boxedTreats(p.b, treat, dough)}</div>`;
  }else{ // subtraction: show all `a` treats, cross out the last `b`
    tray.innerHTML = `<div class="group">${boxedTreats(p.a, treat, dough, p.a - p.b)}</div>`;
  }
}

// Lay out `count` treats as ten-frames — boxes of 10 (2x5), with the last box
// padded by empty slots — so numbers up to 20 read at a glance (e.g. 14 = one
// full box + a box holding 4). Counts under 10 stay loose to keep early levels simple.
// eatenFrom (optional): index from which treats are shown "eaten" (for subtraction).
function boxedTreats(count, treat, dough, eatenFrom){
  const cell = (i)=>{
    if(i >= count) return `<span class="slot"></span>`;        // empty ten-frame slot
    const eaten = (eatenFrom!=null && i >= eatenFrom);
    const cls = eaten ? "eaten" : dough;
    return `<span class="eaten-wrap"><span class="treat ${cls}">${treat}</span>${eaten?'<span class="x">✖</span>':''}</span>`;
  };
  if(count < 10){
    let inner=""; for(let i=0;i<count;i++) inner+=cell(i);
    return `<div class="loose">${inner}</div>`;
  }
  const boxes = Math.ceil(count/10);
  let html="";
  for(let b=0;b<boxes;b++){
    let inner=""; for(let k=0;k<10;k++) inner+=cell(b*10+k);
    html += `<div class="ten-box">${inner}</div>`;
  }
  return html;
}

function renderChoices(lv, p){
  const wrap = $("#choices");
  wrap.innerHTML = "";
  makeChoices(p.answer, lv).forEach(val=>{
    const b = document.createElement("button");
    b.className="choice";
    b.type = "button";
    b.setAttribute("aria-label", String(val));
    b.innerHTML = `<span>${val}</span>`;
    b.addEventListener("click",()=>onAnswer(val,b));
    wrap.appendChild(b);
  });
}

function onAnswer(val, btn){
  if(state.answered) return;
  const p = state.problem;
  if(val===p.answer){
    state.answered = true;
    stopTimer();
    playSound("correct");
    // coins: base + current speed bonus
    const earned = BASE_COINS + state.bonus;
    state.levelCoins += earned;
    save.coins += earned;
    persist();
    $("#coins-play").textContent = "🪙 "+save.coins;
    btn.classList.add("correct");
    document.querySelectorAll(".choice").forEach(c=>{ if(c!==btn) c.classList.add("dim"); });
    // bake the treats + happy customer
    renderTray(LEVELS[state.levelIndex], p, true);
    const cust = $("#customer"); cust.classList.add("hop");
    flyCoins(btn);
    sparkle();
    setTimeout(()=>{ state.orderIndex++; nextOrder(); }, 1050);
  }else{
    // gentle: wobble, no penalty, can keep trying
    if(!btn.classList.contains("dim")){
      state.levelMistakes++;
      playSound("wrong");
      btn.classList.add("wrong","dim");
      setTimeout(()=>btn.classList.remove("wrong"), 500);
    }
  }
}

// ----- gentle timer (speed bonus only) -----
function startTimer(){
  stopTimer();
  const start = performance.now();
  $("#timer-fill").style.width = "100%";
  state.bonus = MAX_BONUS;
  state.timerId = setInterval(()=>{
    const elapsed = performance.now()-start;
    const frac = Math.max(0, 1 - elapsed/TIMER_MS);
    $("#timer-fill").style.width = (frac*100)+"%";
    state.bonus = Math.round(MAX_BONUS*frac);
    if(frac<=0) stopTimer(); // bonus gone — order still continues, no penalty
  },100);
}
function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId=null; } }

// =========================================================
//  Level complete
// =========================================================
function completeLevel(){
  stopTimer();
  const i = state.levelIndex;
  const m = state.levelMistakes;
  const stars = m===0 ? 3 : (m<=2 ? 2 : 1);

  // persist progress
  save.starsByLevel[i] = Math.max(save.starsByLevel[i]||0, stars);
  if(i+1 <= LEVELS.length-1) save.unlockedLevel = Math.max(save.unlockedLevel, i+1);
  persist();

  const isLast = i >= LEVELS.length-1;
  $("#complete-title").textContent = isLast ? t("masterBaker") : t("ordersUp");
  $("#complete-reward").textContent = `🪙 +${state.levelCoins} ${t("coins")}  •  ${mistakesText(m)}`;

  // animate stars
  const starEls = document.querySelectorAll("#complete-stars .s");
  starEls.forEach(s=>s.classList.remove("on"));
  showScreen("complete");
  starEls.forEach((s,idx)=>{
    setTimeout(()=>{ if(idx<stars){ s.classList.add("on"); playSound("tap"); } }, 300+idx*250);
  });

  // next button behaviour
  const nextBtn = $("#next-btn");
  if(isLast){
    nextBtn.textContent = t("map");
    nextBtn.onclick = ()=>showScreen("select");
  }else{
    nextBtn.textContent = t("next");
    nextBtn.onclick = ()=>startLevel(i+1);
  }
  $("#replay-btn").onclick = ()=>startLevel(i);

  playSound("level");
  confetti();
}

// =========================================================
//  Visual FX
// =========================================================
function confetti(){
  const fx = $("#fx");
  const emojis = ["🎉","✨","⭐","🍪","🧁","🎊","🍩"];
  for(let i=0;i<40;i++){
    const c = document.createElement("div");
    c.className="confetti";
    c.textContent = pick(emojis);
    c.style.left = Math.random()*100+"vw";
    c.style.animationDuration = (1.6+Math.random()*1.6)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 3600);
  }
}
function sparkle(){
  const fx = $("#fx");
  const r = $("#tray").getBoundingClientRect();
  for(let i=0;i<10;i++){
    const s = document.createElement("div");
    s.className="confetti";
    s.textContent = pick(["✨","⭐","💛"]);
    s.style.left = (r.left + Math.random()*r.width)+"px";
    s.style.top = (r.top)+"px";
    s.style.animationDuration = "1s";
    fx.appendChild(s);
    setTimeout(()=>s.remove(), 1100);
  }
}
function flyCoins(fromEl){
  const r = fromEl.getBoundingClientRect();
  const target = $("#coins-play").getBoundingClientRect();
  for(let i=0;i<6;i++){
    const c = document.createElement("div");
    c.className="fly-coin";
    c.textContent="🪙";
    c.style.left=(r.left+r.width/2)+"px";
    c.style.top=(r.top+r.height/2)+"px";
    c.style.setProperty("--dx",(target.left - r.left + (Math.random()*30-15))+"px");
    c.style.setProperty("--dy",(target.top - r.top + (Math.random()*20-10))+"px");
    c.style.animationDelay=(i*0.05)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 800);
  }
}

// =========================================================
//  Mute toggle + wiring
// =========================================================
function refreshMute(){
  const icon = save.muted ? "🔇" : "🔊";
  $("#mute-btn-title").textContent = icon;
  $("#mute-btn-play").textContent = icon;
}
function toggleMute(){ save.muted=!save.muted; persist(); refreshMute(); if(save.muted){ stopMusic(); } else { playSound("tap"); maybeStartMusic(); } }

// =========================================================
//  Language (string table) — applies text + page direction
// =========================================================
function applyLanguage(){
  if(!I18N[save.lang]) save.lang = DEFAULT_LANG;
  const L = I18N[save.lang];
  document.documentElement.lang = save.lang;
  document.documentElement.dir = L.dir;
  // static text + tooltips marked in the HTML
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  // icon-only buttons get both a tooltip and an aria-label so the emoji has a name
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{
    const label = t(el.dataset.i18nTitle);
    el.title = label;
    el.setAttribute("aria-label", label);
  });
  // the toggle shows the OTHER language to switch to
  $("#lang-btn").textContent = I18N[save.lang==="he"?"en":"he"].langName;
  // refresh a visible dynamic screen so its text updates too
  if($("#screen-select").classList.contains("active")) renderSelect();
}
function toggleLanguage(){ save.lang = (save.lang==="he"?"en":"he"); persist(); applyLanguage(); playSound("tap"); }

document.addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go) showScreen(go.getAttribute("data-go"));
});
$("#play-btn").addEventListener("click", ()=>{ playSound("tap"); showScreen("select"); });
$("#mute-btn-title").addEventListener("click", toggleMute);
$("#mute-btn-play").addEventListener("click", toggleMute);
$("#music-btn-title").addEventListener("click", toggleMusic);
$("#music-btn-play").addEventListener("click", toggleMusic);
$("#lang-btn").addEventListener("click", toggleLanguage);
$("#reset-btn").addEventListener("click", ()=>{
  if(confirm(t("resetConfirm"))){
    const lang = save.lang;                 // keep language + cosmetics across a reset
    save = {...DEFAULT_SAVE, lang, cosmetics:{...save.cosmetics}};
    persist(); refreshMute(); applyCosmetics(); renderSelect();
    alert(t("resetDone"));
  }
});

// =========================================================
//  Ambient floating background (soft bokeh + bakery doodles)
// =========================================================
function buildBackground(){
  const bg = $("#bg");
  if(!bg) return;
  const tints = ["#ffd9e3","#ffe6c2","#d8f0e4","#cfe6ff","#fff0c2"];
  const treats = ["🧁","🍩","🍪","🥨","🎂","🍰","🥐"];
  let html = "";
  for(let i=0;i<7;i++){                     // soft blurred colour blobs
    const size = randInt(60,150);
    html += `<span class="blob" style="`+
      `left:${randInt(-4,96)}%; top:${randInt(-4,96)}%;`+
      `width:${size}px; height:${size}px; background:${pick(tints)};`+
      `animation-duration:${randInt(14,26)}s; animation-delay:-${randInt(0,12)}s;"></span>`;
  }
  for(let i=0;i<9;i++){                      // faint drifting treat doodles
    html += `<span class="doodle" style="`+
      `left:${randInt(2,94)}%; top:${randInt(2,94)}%; font-size:${randInt(20,40)}px;`+
      `animation-duration:${randInt(16,30)}s; animation-delay:-${randInt(0,14)}s;">${pick(treats)}</span>`;
  }
  bg.innerHTML = html;
}

// =========================================================
//  Cosmetics customizer
// =========================================================
const COSMETIC_OPTS = [
  {key:"kerchief", labelKey:"cz_scarf",
    colors:["#ff8fab","#f4628a","#ff6b6b","#ffa64d","#ffd166","#5fbf6a","#5aa9f7","#8a7bff","#2bb5a0","#ffffff","#3a3340"]},
  {key:"hair", labelKey:"cz_hair", allowNone:true,
    colors:["#7a4a2b","#3a2a1e","#e8c06a","#d2691e","#a23b2e","#6a58e0","#f4628a"]},
];

function updateCzPreview(){ const p=$("#cz-preview"); if(p) p.innerHTML = chefSVG(save.cosmetics); }

function renderCustomizer(){
  updateCzPreview();
  const rows = $("#cz-rows");
  rows.innerHTML = "";
  COSMETIC_OPTS.forEach(cat=>{
    const cur = save.cosmetics[cat.key];
    const row = document.createElement("div"); row.className = "cz-row";
    const lbl = document.createElement("div"); lbl.className = "cz-label"; lbl.textContent = t(cat.labelKey);
    const opts = document.createElement("div"); opts.className = "cz-opts";
    const addSw = (val)=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "cz-sw" + (val==="none"?" none":"") + (cur===val?" sel":"");
      if(val!=="none") b.style.background = val;
      b.setAttribute("aria-label", val==="none" ? t("cz_none") : val);
      b.addEventListener("click", ()=>setCosmetic(cat.key, val));
      opts.appendChild(b);
    };
    if(cat.allowNone) addSw("none");
    cat.colors.forEach(addSw);
    row.appendChild(lbl); row.appendChild(opts); rows.appendChild(row);
  });
}
function setCosmetic(key,val){ save.cosmetics[key]=val; persist(); applyCosmetics(); renderCustomizer(); playSound("tap"); }
function applyCosmetics(){ const b=$("#baker"); if(b) b.innerHTML = chefSVG(save.cosmetics); }
function openCustomizer(){ renderCustomizer(); $("#cz").classList.add("open"); }
function closeCustomizer(){ $("#cz").classList.remove("open"); }

$("#customize-btn").addEventListener("click", ()=>{ playSound("tap"); openCustomizer(); });
$("#cz-done").addEventListener("click", ()=>{ playSound("tap"); closeCustomizer(); });
$("#cz").addEventListener("click", e=>{ if(e.target.id==="cz") closeCustomizer(); });

// init
buildBackground();
applyCosmetics();
refreshMute();
refreshMusicBtn();
applyLanguage();
</script>
